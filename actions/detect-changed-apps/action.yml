name: Detect Changed Apps
description: Detect which frontend apps have changed using git diff (for monorepo CI)

inputs:
  base-ref:
    description: Base ref for comparison (default is the PR base or previous commit)
    required: false
    default: ''

outputs:
  admin:
    description: Whether admin app changed (true/false)
    value: ${{ steps.detect.outputs.admin }}
  patient:
    description: Whether patient app changed (true/false)
    value: ${{ steps.detect.outputs.patient }}
  provider:
    description: Whether provider app changed (true/false)
    value: ${{ steps.detect.outputs.provider }}
  seat:
    description: Whether seat app changed (true/false)
    value: ${{ steps.detect.outputs.seat }}
  shared:
    description: Whether shared library changed (true/false)
    value: ${{ steps.detect.outputs.shared }}
  any:
    description: Whether any app or shared changed (true/false)
    value: ${{ steps.detect.outputs.any }}

runs:
  using: composite
  steps:
    - name: Detect changed paths
      id: detect
      shell: bash
      run: |
        set -euo pipefail

        # Determine base ref
        BASE="${{ inputs.base-ref }}"
        if [[ -z "$BASE" ]]; then
          if [[ -n "${GITHUB_BASE_REF:-}" ]]; then
            BASE="origin/$GITHUB_BASE_REF"
          else
            BASE="HEAD~1"
          fi
        fi

        # Fetch base ref if needed
        git fetch origin --depth=1 "${GITHUB_BASE_REF:-HEAD}" 2>/dev/null || true

        # Get changed files
        CHANGED=$(git diff --name-only "$BASE"...HEAD 2>/dev/null || git diff --name-only "$BASE" HEAD)

        # Helper: check if any changed file matches a pattern
        matches() {
          local pattern="$1"
          echo "$CHANGED" | grep -qE "$pattern"
        }

        # Common patterns that affect all apps
        ROOT_CHANGED=false
        if matches '^(package\.json|yarn\.lock|\.github/)'; then
          ROOT_CHANGED=true
        fi

        SHARED_CHANGED=false
        if matches '^shared/' || [[ "$ROOT_CHANGED" == "true" ]]; then
          SHARED_CHANGED=true
        fi

        # Per-app detection (app dir changed OR shared changed OR root changed)
        for app in admin patient provider seat; do
          if matches "^${app}/" || [[ "$SHARED_CHANGED" == "true" ]] || [[ "$ROOT_CHANGED" == "true" ]]; then
            echo "${app}=true" >> "$GITHUB_OUTPUT"
          else
            echo "${app}=false" >> "$GITHUB_OUTPUT"
          fi
        done

        # Shared output
        echo "shared=${SHARED_CHANGED}" >> "$GITHUB_OUTPUT"

        # Any output
        if matches '^(admin|patient|provider|seat|shared)/' || [[ "$ROOT_CHANGED" == "true" ]]; then
          echo "any=true" >> "$GITHUB_OUTPUT"
        else
          echo "any=false" >> "$GITHUB_OUTPUT"
        fi

        # Log for debugging
        echo "Base ref: $BASE"
        echo "Changed files:"
        echo "$CHANGED" | head -50
        echo "---"
        cat "$GITHUB_OUTPUT"
