name: Slack Notification
description: Send a formatted deployment notification to Slack

inputs:
  webhook-url:
    description: Slack Incoming Webhook URL
    required: true
  status:
    description: Deploy status (success, failure, cancelled, rollback)
    required: true
  environment:
    description: Target environment (dev, stg, prd)
    required: true
  app-name:
    description: Application name
    required: true
  tag:
    description: Deployment tag or version
    required: false
    default: ''
  run-url:
    description: GitHub Actions run URL
    required: false
    default: ''
  actor:
    description: GitHub user who triggered the deploy
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Build payload
      id: build
      shell: bash
      env:
        INPUT_STATUS:  ${{ inputs.status }}
        INPUT_ENV:     ${{ inputs.environment }}
        INPUT_APP:     ${{ inputs.app-name }}
        INPUT_TAG:     ${{ inputs.tag }}
        INPUT_RUN_URL: ${{ inputs.run-url }}
        INPUT_ACTOR:   ${{ inputs.actor }}
      run: |
        # Color coding
        case "$INPUT_STATUS" in
          success)  COLOR="#36a64f"; EMOJI=":white_check_mark:" ;;
          failure)  COLOR="#dc3545"; EMOJI=":x:" ;;
          cancelled) COLOR="#ffc107"; EMOJI=":warning:" ;;
          rollback) COLOR="#ff6600"; EMOJI=":rewind:" ;;
          *)        COLOR="#6c757d"; EMOJI=":question:" ;;
        esac

        # Environment label
        case "$INPUT_ENV" in
          dev) ENV_LABEL="Development" ;;
          stg) ENV_LABEL="Staging" ;;
          prd) ENV_LABEL="Production" ;;
          *)   ENV_LABEL="$INPUT_ENV" ;;
        esac

        # Build fields using jq for safe JSON construction
        FIELDS=$(jq -n \
          --arg app "$INPUT_APP" \
          --arg env "$ENV_LABEL" \
          --arg tag "$INPUT_TAG" \
          --arg actor "$INPUT_ACTOR" \
          '[
            {title: "App", value: $app, short: true},
            {title: "Environment", value: $env, short: true}
          ] + (if $tag != "" then [{title: "Version", value: ("`" + $tag + "`"), short: true}] else [] end)
            + (if $actor != "" then [{title: "Triggered by", value: $actor, short: true}] else [] end)')

        # Build action link
        ACTIONS=""
        if [ -n "$INPUT_RUN_URL" ]; then
          ACTIONS=$(jq -n --arg url "$INPUT_RUN_URL" '[{type: "button", text: "View Run", url: $url}]')
        fi

        # Construct payload safely with jq
        PAYLOAD=$(jq -n \
          --arg color "$COLOR" \
          --arg emoji "$EMOJI" \
          --arg status "$INPUT_STATUS" \
          --arg app "$INPUT_APP" \
          --arg tag "$INPUT_TAG" \
          --arg env_label "$ENV_LABEL" \
          --argjson fields "$FIELDS" \
          --argjson actions "${ACTIONS:-null}" \
          '{
            attachments: [{
              color: $color,
              fallback: ($emoji + " Deploy " + $status + ": " + $app + " " + $tag + " to " + $env_label),
              title: ($emoji + " Deploy " + $status),
              fields: $fields
            } + (if $actions != null then {actions: $actions} else {} end)]
          }')

        delim="EOF_$(openssl rand -hex 8)"
        {
          echo "payload<<${delim}"
          echo "$PAYLOAD"
          echo "${delim}"
        } >> "$GITHUB_OUTPUT"

    - name: POST to Slack
      uses: sonarmd/workflows/actions/slack-post@test/cicd-fix-chain
      with:
        webhook_url: ${{ inputs.webhook-url }}
        payload:     ${{ steps.build.outputs.payload }}
        caller:      slack-notify
