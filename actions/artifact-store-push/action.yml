name: Artifact Store Push
description: |
  Pushes the release tarball (and its checksum/signature siblings) to
  the durable artifact store, keyed by SHA. Pushing the same files
  under the same tag overwrites the manifest with an identical content
  digest at the layer level (annotations may differ).

  Tag scheme: ghcr.io/<owner>/<repo>-release:sha-<SHA>

  Caller workflow MUST grant `packages: write` permission.

inputs:
  sha:
    description: 'Commit SHA to key the artifact under. Defaults to github.sha.'
    required: false
    default: ${{ github.sha }}
  artifact_dir:
    description: |
      Directory containing release.tar.gz and sibling files
      (release.tar.gz.sha512, release.tar.gz.checksum, optional .sig).
    required: false
    default: '.'
  registry:
    description: 'OCI registry hostname.'
    required: false
    default: 'ghcr.io'

outputs:
  reference:
    description: 'Full OCI reference pushed (registry/owner/repo-release:sha-<SHA>).'
    value: ${{ steps.push.outputs.reference }}
  digest:
    description: 'OCI manifest digest of the pushed artifact.'
    value: ${{ steps.push.outputs.digest }}

runs:
  using: composite
  steps:
    - name: Install ORAS
      uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1
      with:
        version: 1.2.0

    - name: Push artifact
      id: push
      shell: bash
      working-directory: ${{ inputs.artifact_dir }}
      env:
        SHA: ${{ inputs.sha }}
        REGISTRY: ${{ inputs.registry }}
        REPO: ${{ github.repository }}
        GH_TOKEN: ${{ github.token }}
        GH_ACTOR: ${{ github.actor }}
      run: |
        set -euo pipefail

        REF="${REGISTRY}/${REPO}-release:sha-${SHA}"
        echo "reference=$REF" >> "$GITHUB_OUTPUT"

        if [ ! -f release.tar.gz ]; then
          echo "::error::artifact-store-push: release.tar.gz not found in $(pwd)"
          exit 1
        fi

        FILES=( "release.tar.gz" )
        for SIBLING in release.tar.gz.sha512 release.tar.gz.checksum release.tar.gz.sig; do
          [ -f "$SIBLING" ] && FILES+=( "$SIBLING" )
        done

        echo "$GH_TOKEN" | oras login "$REGISTRY" \
          -u "$GH_ACTOR" --password-stdin >/dev/null

        echo "artifact-store-push: pushing ${#FILES[@]} file(s) to $REF"
        for F in "${FILES[@]}"; do echo "  - $F"; done

        # Note: no `image.created` annotation - keeping it out makes the
        # manifest deterministic for identical content.
        oras push "$REF" \
          --artifact-type "application/vnd.sonarmd.release.v1+tar" \
          --annotation "org.opencontainers.image.source=https://github.com/${REPO}" \
          --annotation "org.opencontainers.image.revision=${SHA}" \
          "${FILES[@]/%/:application/octet-stream}"

        DIGEST=$(oras manifest fetch --descriptor "$REF" \
          | python3 -c "import json,sys; print(json.load(sys.stdin)['digest'])")
        echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
        echo "artifact-store-push: pushed $REF @ $DIGEST"
