name: 'canary-reconcile'
description: >
  Runs after canary-verify detects orphaned anchor tags. Builds a recovery
  branch by cherry-picking each orphan commit back on top of the current
  (broken) HEAD, pushes the branch, and opens a draft PR for human review.
  Cherry-pick conflicts are committed with markers intact and noted in the PR
  body — the human resolves them in the PR.

  This action never bypasses review: CD stays blocked, the P0 issue stays
  open, and you (the CODEOWNER / tag-ruleset bypass actor) are still the
  final gate. It just removes the manual work of finding, cherry-picking,
  and PR'ing the dropped commits.

inputs:
  missing:
    description: 'Newline-separated lines from canary-verify outputting "<tag> → <sha> ...".'
    required: true
  recovery-branch-prefix:
    description: 'Prefix for the auto-created recovery branch.'
    required: false
    default: 'recovery/canary-'
  pr-assignees:
    description: 'Comma-separated GitHub logins for PR assignment.'
    required: false
    default: 'avespoli-sonarmd'
  pr-labels:
    description: 'Comma-separated labels for the PR.'
    required: false
    default: 'history-recovery,needs-codeowner-review'
  bot-name:
    required: false
    default: 'sonarmd-canary-bot'
  bot-email:
    required: false
    default: 'sonarmd-canary-bot@users.noreply.github.com'
  app-id:
    description: >
      GitHub App ID. Pass `${{ vars.CANARY_APP_ID }}` from the calling workflow.
    required: true
  app-private-key:
    description: >
      GitHub App private key. Pass `${{ secrets.CANARY_APP_PRIVATE_KEY }}` from
      the calling workflow.
    required: true

runs:
  using: 'composite'
  steps:
    # App token mints a credential with the perms needed for contents:write
    # (push the recovery branch) and pull-requests:write (open the PR).
    # Caller workflow's GITHUB_TOKEN doesn't need those — the App provides
    # them out-of-band. continue-on-error: false here because reconcile
    # cannot meaningfully run without it.
    - name: Mint App token (smd-ci-agora)
      id: app-token
      uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b # v2.1.4
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.app-private-key }}

    - name: Checkout with App token (gives us write access for push)
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        token: ${{ steps.app-token.outputs.token }}
        persist-credentials: true

    - name: Extract orphan SHAs from verify output
      id: extract
      shell: bash
      env:
        MISSING: ${{ inputs.missing }}
      run: |
        set -euo pipefail
        # Lines look like: "anchor/abc1234-merge → a1b2c3d4...  subject  [NOT an ancestor...]"
        # Extract the SHA after the arrow.
        shas=$(printf '%s\n' "$MISSING" | awk -F'→' 'NF>=2 {print $2}' | awk '{print $1}' | tr -d ' ' | sort -u)

        if [ -z "$shas" ]; then
          echo "::warning::No SHAs could be extracted from verify output — skipping reconcile."
          echo "have_shas=0" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Sort orphans by commit date so cherry-pick replays in original order.
        ordered=""
        while IFS= read -r sha; do
          [ -z "$sha" ] && continue
          if git cat-file -e "${sha}^{commit}" 2>/dev/null; then
            ts=$(git log -1 --format=%ct "$sha")
            ordered+="$ts $sha"$'\n'
          fi
        done <<< "$shas"

        sorted_shas=$(printf '%s' "$ordered" | sort -n | awk '{print $2}')
        count=$(printf '%s\n' "$sorted_shas" | grep -c . || true)

        {
          echo "shas<<EOF"
          printf '%s\n' "$sorted_shas"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
        echo "count=$count" >> "$GITHUB_OUTPUT"
        echo "have_shas=1"  >> "$GITHUB_OUTPUT"

        echo "Will replay $count orphan commit(s)."

    - name: Build recovery branch via cherry-pick
      id: branch
      if: steps.extract.outputs.have_shas == '1'
      shell: bash
      env:
        SHAS:      ${{ steps.extract.outputs.shas }}
        PREFIX:    ${{ inputs.recovery-branch-prefix }}
        BOT_NAME:  ${{ inputs.bot-name }}
        BOT_EMAIL: ${{ inputs.bot-email }}
      run: |
        set -euo pipefail

        git config user.name  "$BOT_NAME"
        git config user.email "$BOT_EMAIL"

        ts=$(date -u +%Y%m%d-%H%M%S)
        branch="${PREFIX}${ts}"
        git checkout -b "$branch"

        conflicts=()
        applied=()

        while IFS= read -r sha; do
          [ -z "$sha" ] && continue
          if git cherry-pick -x --allow-empty "$sha" 2>/dev/null; then
            applied+=("$sha")
          else
            # Conflict. Commit the conflicted state intact so the human can resolve in the PR.
            git add -A
            short="${sha:0:7}"
            git commit --no-verify -m "RECOVERY: ${short} (CONFLICT — resolve in PR)" -m "Original commit: ${sha}" || true
            git cherry-pick --abort 2>/dev/null || true
            conflicts+=("$sha")
          fi
        done <<< "$SHAS"

        # Save state for the PR step.
        {
          echo "branch=$branch"
          echo "applied_count=${#applied[@]}"
          echo "conflict_count=${#conflicts[@]}"
        } >> "$GITHUB_OUTPUT"
        {
          echo "applied<<EOF"
          printf '%s\n' "${applied[@]}"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
        {
          echo "conflicts<<EOF"
          printf '%s\n' "${conflicts[@]}"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

        git push origin "$branch"
        echo "::notice::Pushed recovery branch $branch (applied=${#applied[@]} conflicts=${#conflicts[@]})"

    - name: Open draft recovery PR
      if: steps.extract.outputs.have_shas == '1'
      uses: actions/github-script@v8
      env:
        BRANCH:         ${{ steps.branch.outputs.branch }}
        APPLIED:        ${{ steps.branch.outputs.applied }}
        CONFLICTS:      ${{ steps.branch.outputs.conflicts }}
        APPLIED_COUNT:  ${{ steps.branch.outputs.applied_count }}
        CONFLICT_COUNT: ${{ steps.branch.outputs.conflict_count }}
        ASSIGNEES:      ${{ inputs.pr-assignees }}
        LABELS:         ${{ inputs.pr-labels }}
        VERIFY_MISSING: ${{ inputs.missing }}
      with:
        github-token: ${{ steps.app-token.outputs.token }}
        script: |
          const { owner, repo } = context.repo;
          const branch  = process.env.BRANCH;
          const base    = context.ref.replace(/^refs\/heads\//, '');
          const applied   = (process.env.APPLIED   || '').trim();
          const conflicts = (process.env.CONFLICTS || '').trim();
          const ac = process.env.APPLIED_COUNT;
          const cc = process.env.CONFLICT_COUNT;

          const title = `[RECOVERY] Replay ${ac} dropped commits on ${base}` + (cc !== '0' ? ` (${cc} conflicts)` : '');
          const body = [
            `## Auto-generated history recovery`,
            ``,
            `\`canary-verify\` detected that anchor tags point to commits no longer reachable from \`${base}\`. This PR cherry-picks the dropped commits back onto a recovery branch for your review.`,
            ``,
            `**Recovery branch:** \`${branch}\`  `,
            `**Cleanly applied:** ${ac}  `,
            `**Conflicts (need manual resolution in this PR):** ${cc}  `,
            ``,
            cc !== '0' ? `> ⚠️ Conflict commits are committed with markers intact. Check out the branch, resolve conflicts, push, then mark this PR ready.` : `> ✅ All commits applied cleanly. Review the diff, mark ready, merge.`,
            ``,
            `### Applied`,
            applied ? '```\n' + applied + '\n```' : '_(none)_',
            ``,
            `### Conflicts`,
            conflicts ? '```\n' + conflicts + '\n```' : '_(none)_',
            ``,
            `### What this PR does NOT do`,
            ``,
            `- Does **not** delete the orphaned anchor tags. They still point at the pre-rewrite SHAs and \`canary-verify\` will keep failing until you (the tag-ruleset bypass actor) delete them with \`git push origin --delete <tag>\`.`,
            `- Does **not** restore the original commit SHAs. Cherry-picks create new commits; the original SHAs remain dangling in the object store.`,
            ``,
            `### Original detection`,
            '```',
            (process.env.VERIFY_MISSING || '').trim(),
            '```',
            ``,
            `### Sequence to fully resolve`,
            ``,
            `1. Review this PR's diff against \`${base}\`.`,
            `2. If conflicts: resolve them on \`${branch}\`, push, mark ready, merge.`,
            `3. If clean: mark ready, merge.`,
            `4. After merge, delete the orphaned anchor tags listed in the linked P0 issue.`,
            `5. Close the P0 issue with a note describing the resolution.`,
          ].join('\n');

          const assignees = (process.env.ASSIGNEES || '').split(',').map(s => s.trim()).filter(Boolean);
          const labels    = (process.env.LABELS    || '').split(',').map(s => s.trim()).filter(Boolean);

          // Don't open a duplicate recovery PR for the same base branch.
          const open = await github.rest.pulls.list({
            owner, repo, base, state: 'open', per_page: 100,
          });
          const dup = open.data.find(p => p.title.startsWith('[RECOVERY]') && p.head.ref.startsWith('recovery/canary-'));
          if (dup) {
            await github.rest.issues.createComment({
              owner, repo, issue_number: dup.number,
              body: `Another canary regression fired on \`${base}\` while this recovery PR is still open. New recovery branch (superseding): \`${branch}\`. Run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
            });
            core.notice(`Existing recovery PR #${dup.number} — commented instead of opening duplicate.`);
            return;
          }

          const pr = await github.rest.pulls.create({
            owner, repo,
            title,
            body,
            head: branch,
            base,
            draft: true,
          });
          if (assignees.length) {
            await github.rest.issues.addAssignees({
              owner, repo, issue_number: pr.data.number, assignees,
            });
          }
          if (labels.length) {
            await github.rest.issues.addLabels({
              owner, repo, issue_number: pr.data.number, labels,
            });
          }
          core.notice(`Opened draft recovery PR #${pr.data.number}: ${pr.data.html_url}`);
