name: Quality Scan
description: |
  Runs cross-file duplication (jscpd) and unused-code detection (knip)
  against the current checkout.

  Configs come from @sonarmd/star-config (installed in node_modules via
  yarn/npm install) when available; sensible defaults apply otherwise.

  Pairs with sonarmd/workflows/actions/security-scan. Coverage threshold
  enforcement is NOT here — that belongs in the test step itself via
  @sonarmd/star-config/quality/coverage imported into jest/vitest config.

  Findings are emitted as workflow-run logs and a markdown report
  attached to the workflow summary. No GHAS, no per-committer meter.

inputs:
  scanners:
    description: "Space-separated list of scanners to run (jscpd, knip). Empty = run all."
    required: false
    default: "jscpd knip"
  fail_on_findings:
    description: "Fail the step when jscpd exceeds its threshold or knip reports issues. Set 'false' for report-only runs."
    required: false
    default: "true"
  star_config_root:
    description: "Path to the @sonarmd/star-config package. Defaults to node_modules lookup."
    required: false
    default: "node_modules/@sonarmd/star-config"
  jscpd_path:
    description: "Path(s) to scan for duplication. Defaults to the repo root."
    required: false
    default: "."
  output_dir:
    description: |
      When set, jscpd and knip ALSO write JSON reports to this directory using
      standardized filenames (duplication.jscpd.json, deadcode.knip.json).
      Empty = summary-only, unchanged behavior for existing callers. The
      ci-evidence-bundle action reads this directory for the audit artifact.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Prepare evidence output dir
      if: inputs.output_dir != ''
      shell: bash
      env:
        DIR: ${{ inputs.output_dir }}
      run: mkdir -p "$DIR"

    - name: Detect star-config
      id: detect
      shell: bash
      env:
        ROOT: ${{ inputs.star_config_root }}
      run: |
        set -euo pipefail
        if [ -f "${ROOT}/package.json" ]; then
          echo "::notice::quality-scan: using configs from ${ROOT}"
          echo "installed=true" >> "$GITHUB_OUTPUT"
        else
          echo "::notice::quality-scan: @sonarmd/star-config not found at ${ROOT} — using defaults"
          echo "installed=false" >> "$GITHUB_OUTPUT"
        fi

    # ────────────────────────────── jscpd ────────────────────────────────
    - name: Run jscpd (cross-file duplication)
      if: ${{ inputs.scanners == '' || contains(format(' {0} ', inputs.scanners), ' jscpd ') }}
      shell: bash
      env:
        STAR_INSTALLED: ${{ steps.detect.outputs.installed }}
        STAR_ROOT:      ${{ inputs.star_config_root }}
        FAIL_ON:        ${{ inputs.fail_on_findings }}
        JSCPD_PATH:     ${{ inputs.jscpd_path }}
        DIR:            ${{ inputs.output_dir }}
      run: |
        set -euo pipefail
        ARGS=()
        if [ "$STAR_INSTALLED" = "true" ] && [ -f "${STAR_ROOT}/jscpd/default.json" ]; then
          ARGS+=(--config "${STAR_ROOT}/jscpd/default.json")
        fi
        # Decide reporters + output. An evidence dir forces markdown+json into
        # it (json is the duplication evidence file, markdown feeds the summary).
        # Without an evidence dir, preserve prior behavior exactly: markdown to
        # ./jscpd-report only when there is no star-config to drive reporters.
        SUMMARY_MD="./jscpd-report/jscpd-report.md"
        if [ -n "$DIR" ]; then
          ARGS+=(--reporters markdown,json --output "$DIR")
          SUMMARY_MD="$DIR/jscpd-report.md"
        elif [ "$STAR_INSTALLED" != "true" ] || [ ! -f "${STAR_ROOT}/jscpd/default.json" ]; then
          ARGS+=(--reporters markdown --output ./jscpd-report)
        fi
        # jscpd_path is documented as space-separated. Split into an array
        # so each path is its own argv entry; paths with spaces are not
        # representable here (acceptable trade-off - string-array inputs
        # aren't supported by composite actions).
        IFS=' ' read -r -a JSCPD_PATHS <<< "$JSCPD_PATH"
        # jscpd's threshold is set inside the config file. Its exit code
        # is 1 when threshold is exceeded. Convert to 0 when reports-only.
        if [ "$FAIL_ON" = "true" ]; then
          echo "quality-scan/jscpd: npx jscpd ${ARGS[*]} ${JSCPD_PATHS[*]}"
          npx --yes jscpd "${ARGS[@]}" "${JSCPD_PATHS[@]}"
        else
          echo "quality-scan/jscpd: npx jscpd ${ARGS[*]} ${JSCPD_PATHS[*]} (report-only)"
          npx --yes jscpd "${ARGS[@]}" "${JSCPD_PATHS[@]}" || true
        fi

        # Normalize the json report to the standardized evidence filename.
        if [ -n "$DIR" ] && [ -f "$DIR/jscpd-report.json" ]; then
          mv "$DIR/jscpd-report.json" "$DIR/duplication.jscpd.json"
        fi

        # Attach the markdown report to the run summary if jscpd produced one.
        if [ -f "$SUMMARY_MD" ]; then
          {
            echo "## jscpd - cross-file duplication"
            echo ""
            cat "$SUMMARY_MD"
          } >> "$GITHUB_STEP_SUMMARY"
        fi

    # ─────────────────────────────── knip ────────────────────────────────
    - name: Run knip (unused exports / deps)
      if: ${{ inputs.scanners == '' || contains(format(' {0} ', inputs.scanners), ' knip ') }}
      shell: bash
      env:
        STAR_INSTALLED: ${{ steps.detect.outputs.installed }}
        STAR_ROOT:      ${{ inputs.star_config_root }}
        FAIL_ON:        ${{ inputs.fail_on_findings }}
        DIR:            ${{ inputs.output_dir }}
      run: |
        set -euo pipefail
        ARGS=(--reporter markdown)
        CONFIG_ARGS=()
        if [ "$STAR_INSTALLED" = "true" ] && [ -f "${STAR_ROOT}/knip/default.json" ]; then
          CONFIG_ARGS+=(--config "${STAR_ROOT}/knip/default.json")
        fi
        ARGS+=("${CONFIG_ARGS[@]}")
        # Dead-code evidence: knip emits one reporter per run, so a separate
        # report-only json pass writes the evidence file without disturbing the
        # markdown summary run below. Never fails the build.
        if [ -n "$DIR" ]; then
          echo "quality-scan/knip: npx knip --reporter json (evidence)"
          npx --yes knip --reporter json "${CONFIG_ARGS[@]}" > "$DIR/deadcode.knip.json" 2>/dev/null || true
        fi
        echo "quality-scan/knip: npx knip ${ARGS[*]}"
        REPORT="$(mktemp)"
        # Capture stderr too — knip emits diagnostics there; without 2>&1
        # the summary attachment loses them.
        if npx --yes knip "${ARGS[@]}" > "$REPORT" 2>&1; then
          EXIT=0
        else
          EXIT=$?
        fi

        # Attach the markdown report to the run summary.
        {
          echo "## knip — unused exports and dependencies"
          echo ""
          cat "$REPORT"
        } >> "$GITHUB_STEP_SUMMARY"

        if [ "$FAIL_ON" = "true" ] && [ "$EXIT" -ne 0 ]; then
          echo "::error::quality-scan/knip: reported issues (exit=$EXIT) — see summary"
          exit "$EXIT"
        fi
