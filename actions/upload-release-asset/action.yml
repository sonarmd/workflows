name: Upload Release Asset
description: Uploads an artifact to a draft GitHub Release and publishes it. Idempotent — skips upload if asset already exists.

inputs:
  tag:
    description: 'Release tag (used for the artifact URL output).'
    required: true
  artifact_path:
    description: 'Path to the file to upload.'
    required: true
  release_id:
    description: 'Release ID from create-release.'
    required: true

outputs:
  artifact_url:
    description: 'GitHub Release URL.'
    value: ${{ steps.upload.outputs.artifact_url }}

runs:
  using: composite
  steps:
    - name: Upload and publish
      id: upload
      uses: actions/github-script@v8
      env:
        RELEASE_ID: ${{ inputs.release_id }}
        ASSET:      ${{ inputs.artifact_path }}
        TAG:        ${{ inputs.tag }}
      with:
        script: |
          const fs   = require('fs');
          const path = require('path');

          const releaseId = parseInt(process.env.RELEASE_ID);
          const assetPath = process.env.ASSET;
          const tag       = process.env.TAG;
          const { owner, repo } = context.repo;

          if (!fs.existsSync(assetPath)) {
            core.setFailed(`upload-release-asset: artifact '${assetPath}' not found`);
            return;
          }

          const assetName = path.basename(assetPath);

          const { data: assets } = await github.rest.repos.listReleaseAssets({
            owner, repo, release_id: releaseId,
          });

          if (assets.find(a => a.name === assetName)) {
            core.notice(`upload-release-asset: '${assetName}' already uploaded`);
          } else {
            await github.rest.repos.uploadReleaseAsset({
              owner, repo,
              release_id: releaseId,
              name: assetName,
              data: fs.readFileSync(assetPath),
            });
            core.info(`upload-release-asset: uploaded ${assetName}`);
          }

          const { data: release } = await github.rest.repos.getRelease({
            owner, repo, release_id: releaseId,
          });

          if (release.draft) {
            await github.rest.repos.updateRelease({
              owner, repo,
              release_id: releaseId,
              draft: false,
            });
            core.info('upload-release-asset: published release');
          }

          core.setOutput('artifact_url', `https://github.com/${owner}/${repo}/releases/${tag}`);
