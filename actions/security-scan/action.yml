name: Security Scan
description: |
  Runs Semgrep + Gitleaks + Trivy against the current checkout.

  Configs come from @sonarmd/star-config (installed in node_modules via
  yarn/npm install) when available; sensible defaults apply otherwise.

  Findings are emitted to the workflow-run logs (no SARIF upload, no
  Security tab — that's GHAS, which this replaces). Failure semantics
  per scanner:
    - Semgrep: --severity ERROR/WARNING (registry rule severities)
    - Gitleaks: any leak fails when fail_on_findings=true
    - Trivy: HIGH/CRITICAL only (ignore-unfixed)

inputs:
  scanners:
    description: "Space-separated list of scanners to run (semgrep, gitleaks, trivy). Empty = run all three."
    required: false
    default: "semgrep gitleaks trivy"
  fail_on_findings:
    description: "Fail the step on findings. Set 'false' for report-only runs."
    required: false
    default: "true"
  semgrep_version:
    description: "Semgrep version to install (pinned for determinism). Override for upgrades."
    required: false
    default: "1.95.0"
  semgrep_configs:
    description: "Space-separated list of Semgrep --config args stacked before the star-config baseline. Registry rulesets allowed."
    required: false
    default: "p/default p/typescript p/react p/nodejs p/owasp-top-ten"
  gitleaks_version:
    description: "Gitleaks version to download and verify."
    required: false
    default: "8.21.2"
  star_config_root:
    description: "Path to the @sonarmd/star-config package. Defaults to node_modules lookup."
    required: false
    default: "node_modules/@sonarmd/star-config"

runs:
  using: composite
  steps:
    - name: Detect star-config
      id: detect
      shell: bash
      env:
        ROOT: ${{ inputs.star_config_root }}
      run: |
        set -euo pipefail
        if [ -f "${ROOT}/package.json" ]; then
          echo "::notice::security-scan: using configs from ${ROOT}"
          echo "installed=true" >> "$GITHUB_OUTPUT"
        else
          echo "::notice::security-scan: @sonarmd/star-config not found at ${ROOT} — using defaults"
          echo "installed=false" >> "$GITHUB_OUTPUT"
        fi

    # ────────────────────────────── Semgrep ──────────────────────────────
    - name: Install Semgrep
      if: ${{ inputs.scanners == '' || contains(format(' {0} ', inputs.scanners), ' semgrep ') }}
      shell: bash
      env:
        SEMGREP_VERSION: ${{ inputs.semgrep_version }}
      run: python3 -m pip install --quiet "semgrep==${SEMGREP_VERSION}"

    - name: Run Semgrep
      if: ${{ inputs.scanners == '' || contains(format(' {0} ', inputs.scanners), ' semgrep ') }}
      shell: bash
      env:
        STAR_INSTALLED:  ${{ steps.detect.outputs.installed }}
        STAR_ROOT:       ${{ inputs.star_config_root }}
        CONFIGS:         ${{ inputs.semgrep_configs }}
        FAIL_ON:         ${{ inputs.fail_on_findings }}
      run: |
        set -euo pipefail
        ARGS=()
        for cfg in $CONFIGS; do
          ARGS+=("--config=$cfg")
        done
        if [ "$STAR_INSTALLED" = "true" ] && [ -f "${STAR_ROOT}/semgrep/baseline.yml" ]; then
          ARGS+=("--config=${STAR_ROOT}/semgrep/baseline.yml")
        fi
        if [ "$FAIL_ON" = "true" ]; then
          ARGS+=("--error")
        fi
        echo "security-scan/semgrep: semgrep scan ${ARGS[*]} --severity=ERROR --severity=WARNING ."
        semgrep scan "${ARGS[@]}" --severity=ERROR --severity=WARNING .

    # ────────────────────────────── Gitleaks ─────────────────────────────
    - name: Run Gitleaks
      if: ${{ inputs.scanners == '' || contains(format(' {0} ', inputs.scanners), ' gitleaks ') }}
      shell: bash
      env:
        STAR_INSTALLED:   ${{ steps.detect.outputs.installed }}
        STAR_ROOT:        ${{ inputs.star_config_root }}
        FAIL_ON:          ${{ inputs.fail_on_findings }}
        GITLEAKS_VERSION: ${{ inputs.gitleaks_version }}
      run: |
        set -euo pipefail
        # Download the gitleaks binary — avoids depending on an upstream
        # third-party action's SHA, keeps the action self-contained.
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64|amd64) ARCH=x64 ;;
          aarch64|arm64) ARCH=arm64 ;;
        esac
        ASSET="gitleaks_${GITLEAKS_VERSION}_${OS}_${ARCH}.tar.gz"
        BASE="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
        WORKDIR="$RUNNER_TEMP/gitleaks"
        mkdir -p "$WORKDIR"
        cd "$WORKDIR"

        # Verify integrity: download the archive + the official checksums
        # file from the same release, then sha256sum -c against it.
        curl -fsSL -o "$ASSET" "$BASE/$ASSET"
        curl -fsSL -o checksums.txt "$BASE/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
        grep " $ASSET\$" checksums.txt | sha256sum -c -

        tar -xzf "$ASSET" gitleaks
        chmod +x gitleaks

        ARGS=(detect --source "$GITHUB_WORKSPACE" --no-git --redact -v)
        if [ "$STAR_INSTALLED" = "true" ] && [ -f "${STAR_ROOT}/gitleaks/default.toml" ]; then
          ARGS+=(--config "${STAR_ROOT}/gitleaks/default.toml")
        fi
        if [ "$FAIL_ON" = "true" ]; then
          ARGS+=(--exit-code 1)
        else
          ARGS+=(--exit-code 0)
        fi
        echo "security-scan/gitleaks: gitleaks ${ARGS[*]}"
        ./gitleaks "${ARGS[@]}"

    # ─────────────────────────────── Trivy ───────────────────────────────
    - name: Run Trivy
      if: ${{ inputs.scanners == '' || contains(format(' {0} ', inputs.scanners), ' trivy ') }}
      uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # v0.28.0
      with:
        scan-type: fs
        scan-ref: .
        # star-config ships the opinionated severity + scanner list.
        # If missing, fall back to inline defaults that match what's
        # shipped, so behavior is consistent either way.
        trivy-config: ${{ steps.detect.outputs.installed == 'true' && format('{0}/trivy/config.yaml', inputs.star_config_root) || '' }}
        severity: HIGH,CRITICAL
        ignore-unfixed: true
        exit-code: ${{ inputs.fail_on_findings == 'true' && '1' || '0' }}
        scanners: vuln,secret,misconfig
