name: Generate configuration.json
description: Render configuration.json from template using environment variables (typically loaded from 1Password)

inputs:
  template-path:
    description: Path to the configuration.json template file
    required: false
    default: ''
  template-repo-path:
    description: Path to template within sonarmd/workflows repo (used if template-path is empty)
    required: false
    default: 'templates/configuration.json.tpl'
  output-path:
    description: Path to write the rendered configuration.json
    required: false
    default: 'configuration.json'

outputs:
  config-path:
    description: Path to the rendered configuration.json
    value: ${{ inputs.output-path }}

runs:
  using: composite
  steps:
    - name: Checkout workflows repo for template
      if: inputs.template-path == ''
      uses: actions/checkout@v4
      with:
        repository: sonarmd/workflows
        path: _workflows
        sparse-checkout: templates/

    - name: Render configuration.json
      shell: bash
      run: |
        if [ -n "${{ inputs.template-path }}" ]; then
          TEMPLATE="${{ inputs.template-path }}"
        else
          TEMPLATE="_workflows/${{ inputs.template-repo-path }}"
        fi

        if [ ! -f "$TEMPLATE" ]; then
          echo "::error::Template not found: $TEMPLATE"
          exit 1
        fi

        echo "Rendering config from: $TEMPLATE"
        envsubst < "$TEMPLATE" > "${{ inputs.output-path }}"

        # Validate JSON
        if ! python3 -c "import json; json.load(open('${{ inputs.output-path }}'))"; then
          echo "::error::Generated configuration.json is not valid JSON"
          exit 1
        fi

        echo "Configuration generated at: ${{ inputs.output-path }}"

    - name: Clean up workflows checkout
      if: inputs.template-path == ''
      shell: bash
      run: rm -rf _workflows
