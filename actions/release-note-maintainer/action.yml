name: Release Note Maintainer
description: |
  Generates structured release notes from git log between tags.
  Every line item has a stable hash for durable identity.
  Dependency updates include before/after version data.

inputs:
  identifier:
    description: 'Short repo identifier (api, fe, mobile).'
    required: false
    default: ''
  tag:
    description: 'Current tag or version label.'
    required: false
    default: ''
  previous_tag:
    description: 'Previous tag for range. Auto-detected if empty.'
    required: false
    default: ''

outputs:
  release_notes_md:
    description: 'Markdown-formatted release notes.'
    value: ${{ steps.generate.outputs.release_notes_md }}
  release_notes_json:
    description: 'JSON-structured release notes.'
    value: ${{ steps.generate.outputs.release_notes_json }}
  entry_count:
    description: 'Number of release note entries.'
    value: ${{ steps.generate.outputs.entry_count }}

runs:
  using: composite
  steps:
    - name: Generate release notes
      id: generate
      shell: bash
      env:
        IDENTIFIER: ${{ inputs.identifier }}
        CURRENT_TAG: ${{ inputs.tag }}
        PREVIOUS_TAG: ${{ inputs.previous_tag }}
      run: |
        set -euo pipefail

        # -- Find previous tag if not provided --------------------
        if [ -z "$PREVIOUS_TAG" ]; then
          if [ -n "$IDENTIFIER" ]; then
            PREVIOUS_TAG=$(git tag -l "*-${IDENTIFIER}-*" --sort=-version:refname 2>/dev/null | head -1 || true)
          fi
          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=$(git tag -l --sort=-version:refname 2>/dev/null | head -1 || true)
          fi
          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD 2>/dev/null | head -1 || echo "HEAD~20")
          fi
        fi

        NOTES_FILE="/tmp/release-notes.md"
        JSON_FILE="/tmp/release-notes.json"

        python3 <<'PYEOF'
        import subprocess, json, hashlib, os, re

        prev_tag = os.environ.get("PREVIOUS_TAG", "HEAD~20")
        cur_tag = os.environ.get("CURRENT_TAG", "HEAD")
        identifier = os.environ.get("IDENTIFIER", "")

        # Get commits
        cmd = ["git", "log", f"{prev_tag}..HEAD", "--pretty=format:%H|%s|%an|%aI"]
        result = subprocess.run(cmd, capture_output=True, text=True)

        entries = []
        categories = {
            "Features": [], "Bug Fixes": [], "Documentation": [],
            "Dependencies": [], "CI/CD": [], "Other": []
        }

        for line in result.stdout.strip().split("\n"):
            if not line.strip():
                continue
            parts = line.split("|", 3)
            if len(parts) < 4:
                continue
            sha, subject, author, date = parts

            # Stable hash for durable identity
            stable_hash = hashlib.sha256(f"{sha}|{subject}".encode()).hexdigest()[:8]

            # Categorize
            cat = "Other"
            if re.match(r'^feat', subject):
                cat = "Features"
            elif re.match(r'^fix', subject):
                cat = "Bug Fixes"
            elif re.match(r'^docs?', subject):
                cat = "Documentation"
            elif re.match(r'^(chore\(deps\)|build\(deps\)|deps)', subject):
                cat = "Dependencies"
            elif re.match(r'^ci', subject):
                cat = "CI/CD"

            entry = {
                "id": stable_hash,
                "sha": sha[:12],
                "subject": subject,
                "author": author,
                "date": date,
                "category": cat
            }
            entries.append(entry)
            categories[cat].append(entry)

        # Detect dependency version changes from lockfile diff
        dep_changes = []
        try:
            for lockfile in ["yarn.lock", "package-lock.json"]:
                diff_cmd = ["git", "diff", f"{prev_tag}..HEAD", "--", lockfile]
                diff_result = subprocess.run(diff_cmd, capture_output=True, text=True)
                if diff_result.stdout:
                    # Extract version changes from diff
                    for match in re.finditer(r'^[-+]\s*"?version"?\s*[:=]\s*"?([0-9][^"]*)"?', diff_result.stdout, re.MULTILINE):
                        dep_changes.append(match.group(0))
        except Exception:
            pass

        # Generate markdown
        md_lines = []
        if cur_tag:
            md_lines.append(f"## {cur_tag}\n")

        for cat_name in ["Features", "Bug Fixes", "Dependencies", "Documentation", "CI/CD", "Other"]:
            items = categories[cat_name]
            if not items:
                continue
            md_lines.append(f"### {cat_name}\n")
            for e in items:
                md_lines.append(f"- [{e['id']}] {e['subject']} ({e['sha']}) - {e['author']}")
            md_lines.append("")

        md_content = "\n".join(md_lines)

        # Write files
        with open("/tmp/release-notes.md", "w") as f:
            f.write(md_content)

        json_data = {
            "tag": cur_tag,
            "previous_tag": prev_tag,
            "entry_count": len(entries),
            "entries": entries,
            "dep_changes_detected": len(dep_changes) > 0
        }
        with open("/tmp/release-notes.json", "w") as f:
            json.dump(json_data, f, indent=2)

        print(f"ENTRY_COUNT={len(entries)}")
        PYEOF

        ENTRY_COUNT=$(python3 -c "import json; print(json.load(open('$JSON_FILE'))['entry_count'])" 2>/dev/null || echo "0")

        # Read markdown and escape for GitHub output
        NOTES_MD=$(cat "$NOTES_FILE")
        # Use file-based output for multi-line content
        {
          echo "release_notes_md<<RNEOF"
          echo "$NOTES_MD"
          echo "RNEOF"
        } >> "$GITHUB_OUTPUT"

        echo "release_notes_json=$(cat $JSON_FILE | python3 -c 'import sys,json; print(json.dumps(json.load(sys.stdin)))')" >> "$GITHUB_OUTPUT"
        echo "entry_count=$ENTRY_COUNT" >> "$GITHUB_OUTPUT"

        echo "release-note-maintainer: $ENTRY_COUNT entries"
