name: Checkout Agora Governance
description: |
  Checks out sonarmd/agora for governance state (keys, law, scripts).
  Skipped when the calling repo IS agora (NAMESPACE_MODE=agora).

inputs:
  agora-ref:
    description: 'Git ref of sonarmd/agora to check out'
    default: 'main'
  checkout-path:
    description: 'Local path to check out agora into'
    default: '.agora-governance'
  token:
    description: 'GitHub token with read access to sonarmd/agora'
    required: true

outputs:
  governance-root:
    description: 'Absolute path to the agora governance checkout'
    value: ${{ steps.resolve.outputs.path }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: sonarmd/agora
        ref: ${{ inputs.agora-ref }}
        path: ${{ inputs.checkout-path }}
        token: ${{ inputs.token }}
    - id: resolve
      shell: bash
      run: echo "path=$(realpath ${{ inputs.checkout-path }})" >> "$GITHUB_OUTPUT"
