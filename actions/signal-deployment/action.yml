name: Signal Deployment
description: |
  Fires the deploy trigger to Slack and sends a deployment notification.
  The only place the deploy command format is constructed.

inputs:
  webhook_url:
    description: 'Slack Incoming Webhook URL.'
    required: true
  app_name:
    description: 'Application identifier (e.g. api, fe, mobile).'
    required: true
  environment:
    description: 'Target environment (stg, prd).'
    required: true
  tag:
    description: 'Release tag (e.g. stg-api-v1.2.3-b7).'
    required: true
  artifact_url:
    description: 'Release artifact API URL.'
    required: true

runs:
  using: composite
  steps:
    - name: Build deploy trigger payload
      id: build
      shell: bash
      env:
        APP:          ${{ inputs.app_name }}
        ENV:          ${{ inputs.environment }}
        TAG:          ${{ inputs.tag }}
        ARTIFACT_URL: ${{ inputs.artifact_url }}
      run: |
        PAYLOAD=$(jq -n \
          --arg text "deploy $ENV $APP $TAG $ARTIFACT_URL" \
          '{text: $text}')

        delim="EOF_$(openssl rand -hex 8)"
        {
          echo "payload<<${delim}"
          echo "$PAYLOAD"
          echo "${delim}"
        } >> "$GITHUB_OUTPUT"

    - name: Send deploy trigger
      uses: sonarmd/workflows/actions/slack-post@test/cicd-fix-chain
      with:
        webhook_url: ${{ inputs.webhook_url }}
        payload:     ${{ steps.build.outputs.payload }}
        caller:      signal-deployment

    - name: Send notification
      uses: sonarmd/workflows/actions/notify-slack@main
      with:
        webhook_url: ${{ inputs.webhook_url }}
        status:      success
        app_name:    ${{ inputs.app_name }}
        environment: ${{ inputs.environment }}
        tag:         ${{ inputs.tag }}
