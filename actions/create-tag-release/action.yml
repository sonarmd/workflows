name: Create Tag Release
description: |
  Creates a git tag and GitHub Release with the release artifact attached.
  Does NOT deploy.

inputs:
  tag:
    description: 'Tag name to create (e.g. prd-api-v1.0.0-b5).'
    required: true
  environment:
    description: 'Target environment (stg, prd). Controls prerelease flag.'
    required: true
  release_notes:
    description: 'Markdown release notes body. Auto-generated if empty.'
    required: false
    default: ''
  artifact_path:
    description: 'Path to release asset file to attach.'
    required: false
    default: ''
  prerelease:
    description: 'Force prerelease flag. Auto-set for non-prd if not specified.'
    required: false
    default: ''

outputs:
  tag:
    description: 'Confirmed tag name.'
    value: ${{ steps.release.outputs.tag }}
  release_url:
    description: 'GitHub Release URL.'
    value: ${{ steps.release.outputs.release_url }}
  artifact_url:
    description: 'Release API URL.'
    value: ${{ steps.release.outputs.artifact_url }}

runs:
  using: composite
  steps:

    - name: Create tag and release
      id: release
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
      env:
        TAG:          ${{ inputs.tag }}
        ENVIRONMENT:  ${{ inputs.environment }}
        RELEASE_NOTES: ${{ inputs.release_notes }}
        ARTIFACT_PATH: ${{ inputs.artifact_path }}
        PRERELEASE_OVERRIDE: ${{ inputs.prerelease }}
      with:
        script: |
          const tag          = process.env.TAG;
          const environment  = process.env.ENVIRONMENT;
          const releaseNotes = process.env.RELEASE_NOTES;
          const preOverride  = process.env.PRERELEASE_OVERRIDE;
          const isPrerelease = preOverride !== '' ? preOverride === 'true' : environment !== 'prd';

          const { owner, repo } = context.repo;

          // ── Create or verify tag ──────────────────────────────────────────
          let tagExists = false;
          try {
            await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
            tagExists = true;
            core.notice(`create-tag-release: tag '${tag}' already exists`);
          } catch (e) {
            if (e.status !== 404) throw e;
          }

          if (!tagExists) {
            await github.rest.git.createRef({
              owner, repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha,
            });
            core.info(`create-tag-release: created tag ${tag}`);
          }

          // ── Create or update release ──────────────────────────────────────
          let release;
          try {
            const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            release = existing.data;
            core.notice(`create-tag-release: release for '${tag}' already exists — skipping creation`);
          } catch (e) {
            if (e.status !== 404) throw e;
            const body = releaseNotes !== ''
              ? releaseNotes
              : undefined;  // undefined → GitHub auto-generates notes

            const created = await github.rest.repos.createRelease({
              owner, repo,
              tag_name:               tag,
              name:                   tag,
              body,
              generate_release_notes: releaseNotes === '',
              prerelease:             isPrerelease,
              draft:                  false,
            });
            release = created.data;
            core.info(`create-tag-release: created release ${release.html_url}`);
          }

          core.setOutput('tag',          tag);
          core.setOutput('release_url',  release.html_url);
          core.setOutput('artifact_url', `https://api.github.com/repos/${owner}/${repo}/releases/tags/${tag}`);

    - name: Upload release asset
      if: inputs.artifact_path != ''
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        REPO:     ${{ github.repository }}
        TAG:      ${{ inputs.tag }}
        ASSET:    ${{ inputs.artifact_path }}
      run: |
        if [ ! -f "$ASSET" ]; then
          echo "::warning::create-tag-release: artifact '$ASSET' not found — skipping upload"
          exit 0
        fi

        RELEASE_ID=$(gh api "repos/$REPO/releases/tags/$TAG" --jq '.id')
        ASSET_NAME=$(basename "$ASSET")

        # Check if asset already uploaded (idempotent re-runs)
        EXISTS=$(gh api "repos/$REPO/releases/$RELEASE_ID/assets" \
          --jq ".[] | select(.name == \"$ASSET_NAME\") | .id" 2>/dev/null || echo "")

        if [ -n "$EXISTS" ]; then
          echo "::notice::create-tag-release: asset '$ASSET_NAME' already uploaded"
        else
          gh release upload "$TAG" "$ASSET" --repo "$REPO" --clobber
          echo "create-tag-release: uploaded $ASSET_NAME"
        fi
