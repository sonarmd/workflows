name: 'canary-seed'
description: >
  One-time-per-branch seeder. Samples N random commits from the branch's
  history and pushes them as `anchor/<branch-slug>-<short-sha>-seed` tags.
  Designed for `workflow_dispatch` invocation from a caller's `canary-ops.yml`
  — never runs in CI/CD path. Idempotent: skips SHAs that already have an
  anchor tag in this branch's namespace.

  After seeding, every push to the branch creates incremental anchors via
  `canary-anchor`. The seed exists to backfill historical anchors so chain
  verification can localize where rewrites happened, not just whether they
  happened.

inputs:
  branch:
    description: 'Branch to seed. Default = repo default branch.'
    required: false
    default: ''
  count:
    description: 'Number of random commits to sample as anchors.'
    required: false
    default: '50'
  tag-prefix:
    description: 'Anchor namespace.'
    required: false
    default: 'anchor/'
  confirm:
    description: 'Type SEED to confirm. Mismatch aborts.'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Confirmation guard
      shell: bash
      env:
        CONFIRM: ${{ inputs.confirm }}
      run: |
        set -euo pipefail
        if [ "$CONFIRM" != "SEED" ]; then
          echo "::error::Confirmation phrase mismatch — expected literal 'SEED', got '$CONFIRM'. Aborting."
          exit 1
        fi

    - name: Checkout full history
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        persist-credentials: true
        filter: 'blob:none'

    - name: Resolve target branch
      id: target
      shell: bash
      env:
        BRANCH_INPUT: ${{ inputs.branch }}
      run: |
        set -euo pipefail
        if [ -n "$BRANCH_INPUT" ]; then
          branch="$BRANCH_INPUT"
        else
          branch="$(gh repo view --json defaultBranchRef --jq .defaultBranchRef.name)"
        fi
        slug="${branch//\//-}"
        echo "branch=$branch" >> "$GITHUB_OUTPUT"
        echo "slug=$slug"     >> "$GITHUB_OUTPUT"
        echo "seeding branch=$branch slug=$slug"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Sample and push anchor tags
      shell: bash
      env:
        BRANCH: ${{ steps.target.outputs.branch }}
        SLUG:   ${{ steps.target.outputs.slug }}
        COUNT:  ${{ inputs.count }}
        PREFIX: ${{ inputs.tag-prefix }}
      run: |
        set -euo pipefail

        REF="origin/$BRANCH"
        git rev-parse --verify "$REF" >/dev/null 2>&1 || REF="$BRANCH"

        TOTAL=$(git rev-list --count "$REF")
        echo "scanning $REF — $TOTAL commits total, seeding up to $COUNT random anchors"
        if [ "$TOTAL" -lt "$COUNT" ]; then
          echo "warning: only $TOTAL commits available; using all"
          COUNT="$TOTAL"
        fi

        # Pull existing anchors first so we dedupe in this branch's namespace.
        git fetch --tags --force origin "refs/tags/${PREFIX}${SLUG}-*:refs/tags/${PREFIX}${SLUG}-*" 2>/dev/null || true

        mapfile -t sample < <(
          git rev-list "$REF" \
            | awk 'BEGIN{srand()} {print rand()"\t"$0}' \
            | sort -k1,1 \
            | head -n "$COUNT" \
            | cut -f2
        )

        new_tags=()
        skipped=0
        for sha in "${sample[@]}"; do
          if git tag --points-at "$sha" --list "${PREFIX}${SLUG}-*" 2>/dev/null | grep -q .; then
            skipped=$((skipped + 1))
            continue
          fi
          short="${sha:0:7}"
          tag="${PREFIX}${SLUG}-${short}-seed"
          if git rev-parse --verify "refs/tags/$tag" >/dev/null 2>&1; then
            tag="${PREFIX}${SLUG}-${short}-seed-$(date -u +%s)-$RANDOM"
          fi
          git tag "$tag" "$sha"
          new_tags+=("$tag")
        done

        echo "staged ${#new_tags[@]} new anchors (skipped $skipped already-anchored)"

        if [ ${#new_tags[@]} -eq 0 ]; then
          echo "::notice::No new anchors to push."
          exit 0
        fi

        refspecs=()
        for t in "${new_tags[@]}"; do
          refspecs+=("refs/tags/$t:refs/tags/$t")
        done

        echo "pushing ${#new_tags[@]} anchor tags atomically..."
        git push --atomic origin "${refspecs[@]}"
        echo "::notice::Seeded ${#new_tags[@]} canary anchors on $BRANCH"
