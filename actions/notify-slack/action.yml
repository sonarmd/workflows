name: Notify Slack
description: |
  Sends a formatted Slack notification for CI/CD pipeline events.

  Usage:
    - uses: sonarmd/workflows/actions/notify-slack@main
      with:
        webhook_url: $\{{ secrets.SLACK_WEBHOOK_URL }}
        status: started
        app_name: my-repo

inputs:
  webhook_url:
    description: 'Slack Incoming Webhook URL.'
    required: true
  status:
    description: 'Pipeline status: started | triggered | success | failure | cancelled | rollback. Use "triggered" for actions that hand off to an external runner (e.g. signal-deployment) — "success" means the work actually finished, not that a trigger fired.'
    required: true
  app_name:
    description: 'Application or repository name.'
    required: true
  environment:
    description: 'Target environment (dev, stg, prd).'
    required: false
    default: ''
  tag:
    description: 'Version tag or ref.'
    required: false
    default: ''
  channel:
    description: 'Slack channel override.'
    required: false
    default: '#ops'
  details:
    description: 'Additional context — shown on failure.'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Build payload
      id: build
      shell: bash
      env:
        INPUT_STATUS:      ${{ inputs.status }}
        INPUT_APP:         ${{ inputs.app_name }}
        INPUT_ENV:         ${{ inputs.environment }}
        INPUT_TAG:         ${{ inputs.tag }}
        INPUT_CHANNEL:     ${{ inputs.channel }}
        INPUT_DETAILS:     ${{ inputs.details }}
        RUN_URL:           ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        ACTOR:             ${{ github.actor }}
        BRANCH:            ${{ github.ref_name }}
        SHA:               ${{ github.sha }}
        CORRELATION_ID:    ${{ env.CORRELATION_ID }}
      run: |
        # ── Status → visual mapping ─────────────────────────────
        case "$INPUT_STATUS" in
          started)   COLOR="#439fe0"; TITLE="CI started"     ;;
          triggered) COLOR="#439fe0"; TITLE="CI triggered"   ;;
          success)   COLOR="#36a64f"; TITLE="CI passed"      ;;
          failure)   COLOR="#dc3545"; TITLE="CI failed"      ;;
          cancelled) COLOR="#ffc107"; TITLE="CI cancelled"   ;;
          rollback)  COLOR="#ff6600"; TITLE="Rollback"       ;;
          *)         COLOR="#6c757d"; TITLE="CI $INPUT_STATUS" ;;
        esac

        # If environment is set, use deploy-style titles. Note the
        # distinction between "triggered" (the deploy was handed off to
        # an external runner — outcome unknown) and "success" (the work
        # actually finished). Callers that only fire a trigger must use
        # "triggered" to avoid misrepresenting state.
        if [ -n "$INPUT_ENV" ]; then
          case "$INPUT_STATUS" in
            started)   TITLE="Deploy started"   ;;
            triggered) TITLE="Deploy triggered — awaiting runner" ;;
            success)   TITLE="Deploy complete"  ;;
            failure)   TITLE="Deploy failed"    ;;
            cancelled) TITLE="Deploy cancelled" ;;
            rollback)  TITLE="Rollback"         ;;
          esac
        fi

        SHORT_SHA="${SHA:0:8}"

        # ── Build fields array ───────────────────────────────────
        FIELDS=$(jq -n \
          --arg app    "$INPUT_APP" \
          --arg branch "$BRANCH" \
          --arg sha    "$SHORT_SHA" \
          --arg actor  "$ACTOR" \
          '[
            {title: "App",    value: $app,                    short: true},
            {title: "Branch", value: $branch,                 short: true},
            {title: "Commit", value: ("`" + $sha + "`"),      short: true},
            {title: "Actor",  value: $actor,                  short: true}
          ]')

        if [ -n "$INPUT_ENV" ]; then
          FIELDS=$(echo "$FIELDS" | jq --arg env "$INPUT_ENV" \
            '. + [{title: "Env", value: $env, short: true}]')
        fi

        if [ -n "$INPUT_TAG" ]; then
          FIELDS=$(echo "$FIELDS" | jq --arg tag "$INPUT_TAG" \
            '. + [{title: "Tag", value: ("`" + $tag + "`"), short: true}]')
        fi

        if [ -n "$INPUT_DETAILS" ] && [ "$INPUT_STATUS" = "failure" ]; then
          FIELDS=$(echo "$FIELDS" | jq --arg details "$INPUT_DETAILS" \
            '. + [{title: "Details", value: $details, short: false}]')
        fi

        if [ -n "$CORRELATION_ID" ]; then
          FIELDS=$(echo "$FIELDS" | jq --arg cid "$CORRELATION_ID" \
            '. + [{title: "Trace", value: ("`" + $cid + "`"), short: false}]')
        fi

        # ── Build and send payload ───────────────────────────────
        PAYLOAD=$(jq -n \
          --arg channel "$INPUT_CHANNEL" \
          --arg text    "$TITLE — $INPUT_APP" \
          --arg title   "$TITLE — $INPUT_APP" \
          --arg color   "$COLOR" \
          --argjson fields "$FIELDS" \
          --arg run_url "$RUN_URL" \
          '{
            channel: $channel,
            text: $text,
            attachments: [{
              color: $color,
              title: $title,
              title_link: $run_url,
              fields: $fields,
              actions: [{type: "button", text: "View Run", url: $run_url}]
            }]
          }')

        # Emit payload as step output for slack-post to consume.
        # Use a unique EOF marker to survive any content with newlines.
        delim="EOF_$(openssl rand -hex 8)"
        {
          echo "payload<<${delim}"
          echo "$PAYLOAD"
          echo "${delim}"
        } >> "$GITHUB_OUTPUT"

    - name: POST to Slack
      uses: sonarmd/workflows/actions/slack-post@main
      with:
        webhook_url: ${{ inputs.webhook_url }}
        payload:     ${{ steps.build.outputs.payload }}
        caller:      notify-slack
