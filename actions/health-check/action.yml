name: Health Check
description: Poll an HTTP endpoint with exponential backoff until healthy

inputs:
  url:
    description: URL to poll for health
    required: true
  max-attempts:
    description: Maximum number of retry attempts
    required: false
    default: '6'
  initial-delay:
    description: Initial delay in seconds before first check
    required: false
    default: '5'
  expected-status:
    description: Expected HTTP status code
    required: false
    default: '200'
  expected-body:
    description: Expected substring in response body (optional)
    required: false
    default: ''

outputs:
  status:
    description: Final HTTP status code
    value: ${{ steps.check.outputs.status }}

runs:
  using: composite
  steps:
    - name: Poll health endpoint
      id: check
      shell: bash
      run: |
        URL="${{ inputs.url }}"
        MAX_ATTEMPTS=${{ inputs.max-attempts }}
        DELAY=${{ inputs.initial-delay }}
        EXPECTED_STATUS=${{ inputs.expected-status }}
        EXPECTED_BODY="${{ inputs.expected-body }}"

        echo "Polling $URL (max $MAX_ATTEMPTS attempts, initial delay ${DELAY}s)"

        for i in $(seq 1 "$MAX_ATTEMPTS"); do
          echo "Attempt $i/$MAX_ATTEMPTS (waiting ${DELAY}s)..."
          sleep "$DELAY"

          HTTP_STATUS=$(curl -s -o /tmp/health-response.txt -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
          BODY=$(cat /tmp/health-response.txt 2>/dev/null || echo "")

          echo "  Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" = "$EXPECTED_STATUS" ]; then
            if [ -n "$EXPECTED_BODY" ]; then
              if echo "$BODY" | grep -q "$EXPECTED_BODY"; then
                echo "Health check passed (status=$HTTP_STATUS, body contains '$EXPECTED_BODY')"
                echo "status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"
                exit 0
              else
                echo "  Status OK but body does not contain '$EXPECTED_BODY'"
              fi
            else
              echo "Health check passed (status=$HTTP_STATUS)"
              echo "status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Exponential backoff: double the delay each attempt, cap at 60s
          DELAY=$(( DELAY * 2 ))
          if [ "$DELAY" -gt 60 ]; then DELAY=60; fi
        done

        echo "::error::Health check failed after $MAX_ATTEMPTS attempts (last status: $HTTP_STATUS)"
        echo "status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"
        exit 1
