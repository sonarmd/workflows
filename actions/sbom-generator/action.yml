name: SBOM Generator
description: Generate a Software Bill of Materials (SBOM) using Syft.

inputs:
  artifact-path:
    description: 'Directory to scan for SBOM generation'
    required: true
  output:
    description: 'Output file path for the SBOM'
    required: false
    default: 'sbom.json'
  format:
    description: 'SBOM output format (e.g. cyclonedx-json, spdx-json)'
    required: false
    default: 'cyclonedx-json'

runs:
  using: composite
  steps:
    - name: Install Syft
      shell: bash
      run: |
        curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
          | sh -s -- -b /usr/local/bin v1.18.1

    - name: Generate SBOM
      shell: bash
      run: |
        OUTPUT="${{ inputs.output }}"
        FORMAT="${{ inputs.format }}"
        ARTIFACT_PATH="${{ inputs.artifact-path }}"

        syft "dir:${ARTIFACT_PATH}" -o "${FORMAT}=${OUTPUT}" && {
          echo "SBOM generated at $OUTPUT"
        } || {
          echo "::warning::Syft failed — generating minimal fallback SBOM"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          jq -n \
            --arg ts   "$TIMESTAMP" \
            --arg repo "$GITHUB_REPOSITORY" \
            '{
              bomFormat:   "CycloneDX",
              specVersion: "1.4",
              metadata: {
                timestamp: $ts,
                component: { name: $repo }
              },
              components: []
            }' > "$OUTPUT"
          echo "Fallback SBOM written to $OUTPUT"
        }
