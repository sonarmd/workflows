name: SBOM Generator
description: |
  Generates a CycloneDX Software Bill of Materials for release output.
  Auto-detects the project type (Node.js or Python) and runs the
  appropriate SBOM generator. SBOM generation failure is a warning,
  not an error — it will not block the pipeline.

inputs:
  output_file:
    description: 'Path to write the SBOM JSON file.'
    required: false
    default: 'bom.json'

outputs:
  component_count:
    description: 'Number of components in the SBOM.'
    value: ${{ steps.generate.outputs.component_count }}
  sbom_path:
    description: 'Path to the generated SBOM file.'
    value: ${{ steps.generate.outputs.sbom_path }}
  generated:
    description: 'Whether an SBOM was successfully generated.'
    value: ${{ steps.generate.outputs.generated }}

runs:
  using: composite
  steps:
    - name: Generate SBOM
      id: generate
      shell: bash
      env:
        OUTPUT_FILE: ${{ inputs.output_file }}
      run: |
        set -euo pipefail

        GENERATED=false
        COMPONENT_COUNT=0

        # ── Node.js ──────────────────────────────────────────────
        if [ -f package.json ]; then
          echo "sbom-generator: detected Node.js project, generating CycloneDX SBOM..."
          if npx --yes @cyclonedx/cyclonedx-npm --output-file "$OUTPUT_FILE" 2>/dev/null; then
            COMPONENT_COUNT=$(python3 -c "
        import json
        data = json.load(open('$OUTPUT_FILE'))
        print(len(data.get('components', [])))" 2>/dev/null || echo "0")
            GENERATED=true
            echo "sbom-generator: $COMPONENT_COUNT components"
          else
            echo "::warning::sbom-generator: CycloneDX generation failed — continuing without SBOM"
          fi

        # ── Python ───────────────────────────────────────────────
        elif [ -f requirements.txt ] || [ -f pyproject.toml ]; then
          echo "sbom-generator: detected Python project, generating CycloneDX SBOM..."
          if pip install --quiet cyclonedx-bom 2>/dev/null \
             && cyclonedx-py environment --output "$OUTPUT_FILE" --format json 2>/dev/null; then
            COMPONENT_COUNT=$(python3 -c "
        import json
        data = json.load(open('$OUTPUT_FILE'))
        print(len(data.get('components', [])))" 2>/dev/null || echo "0")
            GENERATED=true
            echo "sbom-generator: $COMPONENT_COUNT components"
          else
            echo "::warning::sbom-generator: CycloneDX generation failed — continuing without SBOM"
          fi

        # ── Unknown ──────────────────────────────────────────────
        else
          echo "sbom-generator: no supported package manager detected — skipping SBOM"
        fi

        echo "component_count=$COMPONENT_COUNT" >> "$GITHUB_OUTPUT"
        echo "sbom_path=$OUTPUT_FILE" >> "$GITHUB_OUTPUT"
        echo "generated=$GENERATED" >> "$GITHUB_OUTPUT"
