name: CI Sign
description: |
  Collects CI evidence (test results, build output, SBOM), bundles it into
  a signed artifact, and uploads it. gate.yml verifies this artifact exists
  before allowing merge.

inputs:
  test_report_path:
    description: 'Path to test report file (junit.xml, etc)'
    required: false
    default: ''
  build_output_dir:
    description: 'Path to build output directory'
    required: false
    default: 'dist'
  extra_evidence:
    description: 'Glob of additional files to include in evidence bundle'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Collect evidence
      id: collect
      shell: bash
      run: |
        set -euo pipefail

        EVIDENCE_DIR="/tmp/ci-evidence"
        mkdir -p "$EVIDENCE_DIR"

        # Metadata
        cat > "$EVIDENCE_DIR/metadata.json" <<EOFMETA
        {
          "repository": "${{ github.repository }}",
          "sha": "${{ github.sha }}",
          "ref": "${{ github.ref }}",
          "actor": "${{ github.actor }}",
          "run_id": "${{ github.run_id }}",
          "run_number": "${{ github.run_number }}",
          "run_attempt": "${{ github.run_attempt }}",
          "workflow": "${{ github.workflow }}",
          "event_name": "${{ github.event_name }}",
          "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        }
        EOFMETA

        # Collect job outcome from the step context
        # This runs with if:always() so we capture even on failure
        echo "${{ job.status }}" > "$EVIDENCE_DIR/job_status.txt"

        echo "evidence_dir=$EVIDENCE_DIR" >> "$GITHUB_OUTPUT"

    - name: Include test report
      if: inputs.test_report_path != ''
      shell: bash
      env:
        REPORT_PATH: ${{ inputs.test_report_path }}
      run: |
        set -euo pipefail
        if [ -f "$REPORT_PATH" ]; then
          cp "$REPORT_PATH" /tmp/ci-evidence/test-report.xml
          echo "Test report included"
        else
          echo "::warning::Test report not found at $REPORT_PATH"
          echo "missing" > /tmp/ci-evidence/test-report-missing.txt
        fi

    - name: Package build output
      shell: bash
      env:
        BUILD_DIR: ${{ inputs.build_output_dir }}
      run: |
        set -euo pipefail
        if [ -d "$BUILD_DIR" ]; then
          tar czf /tmp/ci-evidence/build.tar.gz "$BUILD_DIR"
          echo "Build output packaged: $(du -sh /tmp/ci-evidence/build.tar.gz | cut -f1)"
        else
          echo "::warning::Build directory $BUILD_DIR not found"
        fi

    - name: Generate SBOM (best-effort)
      shell: bash
      run: |
        set -euo pipefail

        # Auto-detect package manager and generate CycloneDX SBOM
        # This is best-effort: failures ping slack but do NOT block
        SBOM_GENERATED=false

        if [ -f yarn.lock ]; then
          npx --yes @cyclonedx/cyclonedx-npm --output-file /tmp/ci-evidence/sbom.json \
            --output-format json --spec-version 1.5 2>/dev/null && SBOM_GENERATED=true
        elif [ -f package-lock.json ]; then
          npx --yes @cyclonedx/cyclonedx-npm --output-file /tmp/ci-evidence/sbom.json \
            --output-format json --spec-version 1.5 2>/dev/null && SBOM_GENERATED=true
        elif [ -f requirements.txt ] || [ -f pyproject.toml ]; then
          pip install --quiet cyclonedx-bom 2>/dev/null || true
          if command -v cyclonedx-py &>/dev/null; then
            cyclonedx-py environment --output /tmp/ci-evidence/sbom.json \
              --output-format json 2>/dev/null && SBOM_GENERATED=true
          fi
        fi

        if [ "$SBOM_GENERATED" = "true" ]; then
          echo "SBOM generated"
        else
          echo "::warning::SBOM generation failed (non-blocking)"
          echo "sbom-generation-failed" > /tmp/ci-evidence/sbom-missing.txt
        fi

    - name: Include extra evidence
      if: inputs.extra_evidence != ''
      shell: bash
      env:
        EXTRA_GLOB: ${{ inputs.extra_evidence }}
      run: |
        set -euo pipefail
        # shellcheck disable=SC2086
        for f in $EXTRA_GLOB; do
          if [ -e "$f" ]; then
            cp "$f" "/tmp/ci-evidence/$(basename "$f")"
            echo "Included: $f"
          fi
        done

    - name: Generate evidence digest
      shell: bash
      run: |
        set -euo pipefail
        cd /tmp/ci-evidence
        find . -type f -not -name "digest.sha256" | sort | xargs sha256sum > digest.sha256
        echo "Evidence digest:"
        cat digest.sha256

    - name: Upload evidence artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: ci-evidence
        path: /tmp/ci-evidence/
        retention-days: 90
        if-no-files-found: error

    - name: Notify Slack
      if: always()
      shell: bash
      run: |
        set -euo pipefail

        # Load webhook from 1Password if available, otherwise check env
        if [ -z "${SLACK_CI_WEBHOOK:-}" ]; then
          echo "::warning::SLACK_CI_WEBHOOK not set, skipping notification"
          exit 0
        fi

        JOB_STATUS="${{ job.status }}"
        REPO="${{ github.repository }}"
        SHORT_SHA="${{ github.sha }}"
        SHORT_SHA="${SHORT_SHA:0:8}"
        ACTOR="${{ github.actor }}"
        RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

        if [ "$JOB_STATUS" = "success" ]; then
          EMOJI=":white_check_mark:"
          COLOR="#36a64f"
        elif [ "$JOB_STATUS" = "failure" ]; then
          EMOJI=":x:"
          COLOR="#cc0000"
        else
          EMOJI=":warning:"
          COLOR="#ccaa00"
        fi

        curl -s -o /dev/null -X POST "$SLACK_CI_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d "$(python3 -c "
        import json
        print(json.dumps({
            'attachments': [{
                'color': '$COLOR',
                'text': '$EMOJI CI $JOB_STATUS: <$RUN_URL|$REPO@$SHORT_SHA> by $ACTOR'
            }]
        }))
        ")"
