name: Checksum Generator
description: |
  Generates SHA-512 checksums for a directory of files.
  Produces per-file checksums, an aggregate digest, and a checksum file.

inputs:
  target_dir:
    description: 'Directory containing files to checksum.'
    required: true
  output_prefix:
    description: 'Prefix for output files (e.g. bundle name).'
    required: true
  output_dir:
    description: 'Directory to write checksum files to.'
    required: false
    default: './release'

outputs:
  digest:
    description: 'Aggregate SHA-512 digest of all files.'
    value: ${{ steps.generate.outputs.digest }}
  file_count:
    description: 'Number of files checksummed.'
    value: ${{ steps.generate.outputs.file_count }}
  sha512_path:
    description: 'Path to the SHA-512 file.'
    value: ${{ steps.generate.outputs.sha512_path }}
  checksum_path:
    description: 'Path to the checksum file.'
    value: ${{ steps.generate.outputs.checksum_path }}

runs:
  using: composite
  steps:
    - name: Generate SHA-512 checksums
      id: generate
      shell: bash
      env:
        TARGET_DIR: ${{ inputs.target_dir }}
        OUTPUT_PREFIX: ${{ inputs.output_prefix }}
        OUTPUT_DIR: ${{ inputs.output_dir }}
      run: |
        set -euo pipefail

        if [ ! -d "$TARGET_DIR" ]; then
          echo "::error::checksum-generator: directory '$TARGET_DIR' does not exist."
          exit 1
        fi

        FILE_COUNT=$(find "$TARGET_DIR" -type f | wc -l | tr -d ' ')
        if [ "$FILE_COUNT" -eq 0 ]; then
          echo "::error::checksum-generator: directory '$TARGET_DIR' is empty."
          exit 1
        fi

        mkdir -p "$OUTPUT_DIR"

        SHA512_FILE="${OUTPUT_DIR}/${OUTPUT_PREFIX}.sha512"
        CHECKSUM_FILE="${OUTPUT_DIR}/${OUTPUT_PREFIX}.checksum"

        # Per-file SHA-512
        find "$TARGET_DIR" -type f -print0 | sort -z | xargs -0 sha512sum > "$SHA512_FILE"

        # Aggregate digest
        DIGEST=$(sha512sum "$SHA512_FILE" | cut -d' ' -f1)
        echo "$DIGEST" > "$CHECKSUM_FILE"

        echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
        echo "file_count=$FILE_COUNT" >> "$GITHUB_OUTPUT"
        echo "sha512_path=$SHA512_FILE" >> "$GITHUB_OUTPUT"
        echo "checksum_path=$CHECKSUM_FILE" >> "$GITHUB_OUTPUT"

        echo "checksum-generator: $FILE_COUNT files, digest ${DIGEST:0:24}..."
