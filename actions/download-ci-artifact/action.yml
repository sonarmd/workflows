name: Download CI Artifact
description: |
  Downloads the release artifact produced by CI.

  If `run_id` is provided, downloads directly from that run — no lookup, no race.
  This is the orchestrated path: ci-cd-core passes the id of the run that uploaded
  the artifact (current run for internal CI, external run for pre-passed CI).

  If `run_id` is empty, falls back to legacy discovery: find the latest completed
  successful workflow named "CI" on this commit SHA. Fails if that run isn't
  completed yet.

inputs:
  artifact_name:
    description: 'Name of the artifact to download (must match the upload name in CI).'
    required: false
    default: 'release'
  output_dir:
    description: 'Directory to download the artifact into.'
    required: false
    default: 'artifact'
  run_id:
    description: 'Explicit run ID that produced the artifact. If empty, discover via SHA + CI workflow name.'
    required: false
    default: ''

outputs:
  path:
    description: 'Path to the downloaded artifact directory.'
    value: ${{ steps.meta.outputs.path }}
  run_id:
    description: 'GitHub Actions run ID that produced the artifact.'
    value: ${{ steps.meta.outputs.run_id }}

runs:
  using: composite
  steps:
    - name: Discover CI run (legacy path)
      id: find
      if: inputs.run_id == ''
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
      env:
        SHA: ${{ github.sha }}
      with:
        script: |
          const sha = process.env.SHA;
          const { owner, repo } = context.repo;

          const { data } = await github.rest.actions.listWorkflowRunsForRepo({
            owner, repo,
            head_sha: sha,
            per_page: 50,
          });

          const ciRuns = data.workflow_runs
            .filter(r => r.name === 'CI' && r.id !== context.runId)
            .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

          const run = ciRuns[ciRuns.length - 1];

          if (!run) {
            core.setFailed(`download-ci-artifact: no CI run found for ${sha}`);
            return;
          }
          if (run.status !== 'completed') {
            core.setFailed(`download-ci-artifact: CI run ${run.id} is still ${run.status} — cannot proceed`);
            return;
          }
          if (run.conclusion !== 'success') {
            core.setFailed(`download-ci-artifact: CI run ${run.id} concluded '${run.conclusion}' — cannot proceed`);
            return;
          }

          core.info(`download-ci-artifact: CI run ${run.id} passed`);
          core.setOutput('run_id', String(run.id));

    - name: Resolve run_id
      id: resolve
      shell: bash
      env:
        EXPLICIT: ${{ inputs.run_id }}
        DISCOVERED: ${{ steps.find.outputs.run_id }}
      run: |
        set -euo pipefail
        RID="${EXPLICIT:-$DISCOVERED}"
        if [ -z "$RID" ]; then
          echo "::error::download-ci-artifact: unable to resolve run_id"
          exit 1
        fi
        echo "run_id=$RID" >> "$GITHUB_OUTPUT"

    - name: Download artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: ${{ inputs.artifact_name }}
        path: ${{ inputs.output_dir }}
        run-id: ${{ steps.resolve.outputs.run_id }}
        repository: ${{ github.repository }}
        github-token: ${{ github.token }}

    - name: Record outputs
      id: meta
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.output_dir }}
        RUN_ID: ${{ steps.resolve.outputs.run_id }}
      run: |
        set -euo pipefail
        echo "download-ci-artifact: downloaded to $OUTPUT_DIR/ (from run $RUN_ID)"
        ls -lh "$OUTPUT_DIR/"
        echo "path=$OUTPUT_DIR"   >> "$GITHUB_OUTPUT"
        echo "run_id=$RUN_ID"     >> "$GITHUB_OUTPUT"
