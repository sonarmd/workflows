name: Download CI Artifact
description: |
  Waits for the CI run on the current commit SHA to complete, then downloads
  the release artifact. Cancels if CI fails. Polls until CI finishes or timeout.

inputs:
  artifact_name:
    description: 'Name of the artifact to download (must match the upload name in CI).'
    required: false
    default: 'release'
  output_dir:
    description: 'Directory to download the artifact into.'
    required: false
    default: 'artifact'
  timeout_minutes:
    description: 'How long to wait for CI to finish before giving up.'
    required: false
    default: '30'

outputs:
  path:
    description: 'Path to the downloaded artifact directory.'
    value: ${{ steps.download.outputs.path }}
  run_id:
    description: 'GitHub Actions run ID that produced the artifact.'
    value: ${{ steps.download.outputs.run_id }}

runs:
  using: composite
  steps:
    - name: Wait for CI and download artifact
      id: download
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        SHA: ${{ github.sha }}
        ARTIFACT_NAME: ${{ inputs.artifact_name }}
        OUTPUT_DIR: ${{ inputs.output_dir }}
        REPO: ${{ github.repository }}
        TIMEOUT_MINUTES: ${{ inputs.timeout_minutes }}
      run: |
        set -euo pipefail

        echo "download-ci-artifact: waiting for CI on commit $SHA"

        DEADLINE=$(( $(date +%s) + TIMEOUT_MINUTES * 60 ))
        POLL_INTERVAL=20

        while true; do
          NOW=$(date +%s)
          if [ "$NOW" -ge "$DEADLINE" ]; then
            echo "::error::download-ci-artifact: timed out after ${TIMEOUT_MINUTES}m waiting for CI on $SHA"
            exit 1
          fi

          RESULT=$(gh api "/repos/$REPO/actions/runs?head_sha=$SHA&per_page=50" \
            --jq '[.workflow_runs[] | select(.name == "CI")] | sort_by(.created_at) | last // empty | {status: .status, conclusion: .conclusion, id: .id}' \
            2>/dev/null || echo "")

          if [ -z "$RESULT" ] || [ "$RESULT" = "null" ]; then
            echo "download-ci-artifact: no CI run yet — waiting ${POLL_INTERVAL}s"
            sleep "$POLL_INTERVAL"
            continue
          fi

          STATUS=$(echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['status'])")
          CONCLUSION=$(echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('conclusion') or '')")
          RUN_ID=$(echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['id'])")

          if [ "$STATUS" != "completed" ]; then
            echo "download-ci-artifact: CI run $RUN_ID is $STATUS — waiting ${POLL_INTERVAL}s"
            sleep "$POLL_INTERVAL"
            continue
          fi

          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::download-ci-artifact: CI run $RUN_ID concluded with '$CONCLUSION' — cancelling CD"
            exit 1
          fi

          echo "download-ci-artifact: CI run $RUN_ID passed — downloading '$ARTIFACT_NAME'"
          gh run download "$RUN_ID" \
            --repo "$REPO" \
            --name "$ARTIFACT_NAME" \
            --dir "$OUTPUT_DIR"

          echo "download-ci-artifact: downloaded to $OUTPUT_DIR/"
          ls -lh "$OUTPUT_DIR/"

          echo "path=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID"   >> "$GITHUB_OUTPUT"
          break
        done
