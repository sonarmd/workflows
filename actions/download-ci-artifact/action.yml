name: Download CI Artifact
description: |
  Downloads the release artifact produced by ci-core's bundle-release step.

  Two modes:
    1. In-run: ci-core ran in the current workflow run (release/* push) —
       artifact is uploaded in this run. Default download-artifact@v4 picks
       it up with no run-id.
    2. Cross-run: ci-core was skipped in the current run (master/main
       promote, because CI already passed on the release branch) — find
       the prior successful run for this SHA and download from it.

inputs:
  artifact_name:
    description: 'Name of the artifact to download (must match the upload name in CI).'
    required: false
    default: 'release'
  output_dir:
    description: 'Directory to download the artifact into.'
    required: false
    default: 'artifact'

outputs:
  path:
    description: 'Path to the downloaded artifact directory.'
    value: ${{ steps.meta.outputs.path }}
  run_id:
    description: 'GitHub Actions run ID that produced the artifact.'
    value: ${{ steps.meta.outputs.run_id }}

runs:
  using: composite
  steps:
    # ── Mode 1: try in-run download (no run-id = current run) ─────────────
    - name: Download artifact (in-run)
      id: in_run
      continue-on-error: true
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: ${{ inputs.artifact_name }}
        path: ${{ inputs.output_dir }}

    # ── Mode 2: fall back to cross-run lookup by SHA ──────────────────────
    - name: Discover prior CI run for SHA
      id: find
      if: steps.in_run.outcome == 'failure'
      uses: actions/github-script@v8
      env:
        SHA: ${{ github.sha }}
      with:
        script: |
          const sha = process.env.SHA;
          const { owner, repo } = context.repo;

          const { data } = await github.rest.actions.listWorkflowRunsForRepo({
            owner, repo,
            head_sha: sha,
            per_page: 50,
          });

          // Any completed+successful run that isn't the current run and
          // produced artifacts is a candidate. We don't filter by workflow
          // name — caller repos name their workflow whatever they want
          // (CI, CI/CD, ci.yml, etc.).
          const candidates = data.workflow_runs
            .filter(r => r.id !== context.runId
                      && r.status === 'completed'
                      && r.conclusion === 'success')
            .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

          const run = candidates[candidates.length - 1];

          if (!run) {
            core.setFailed(`download-ci-artifact: no prior successful run found for ${sha}`);
            return;
          }

          core.info(`download-ci-artifact: using prior run ${run.id} (${run.name})`);
          core.setOutput('run_id', String(run.id));

    - name: Download artifact (cross-run)
      if: steps.in_run.outcome == 'failure'
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: ${{ inputs.artifact_name }}
        path: ${{ inputs.output_dir }}
        run-id: ${{ steps.find.outputs.run_id }}
        repository: ${{ github.repository }}
        github-token: ${{ github.token }}

    - name: Record outputs
      id: meta
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.output_dir }}
        RUN_ID: ${{ steps.find.outputs.run_id || github.run_id }}
      run: |
        set -euo pipefail
        echo "download-ci-artifact: downloaded to $OUTPUT_DIR/ (from run $RUN_ID)"
        ls -lh "$OUTPUT_DIR/"
        echo "path=$OUTPUT_DIR"   >> "$GITHUB_OUTPUT"
        echo "run_id=$RUN_ID"     >> "$GITHUB_OUTPUT"
