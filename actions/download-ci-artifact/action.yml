name: Download CI Artifact
description: |
  Finds a completed, successful CI run for the current commit SHA and downloads
  the release artifact. Fails immediately if no passing CI run exists.

inputs:
  artifact_name:
    description: 'Name of the artifact to download (must match the upload name in CI).'
    required: false
    default: 'release'
  output_dir:
    description: 'Directory to download the artifact into.'
    required: false
    default: 'artifact'

outputs:
  path:
    description: 'Path to the downloaded artifact directory.'
    value: ${{ steps.download.outputs.path }}
  run_id:
    description: 'GitHub Actions run ID that produced the artifact.'
    value: ${{ steps.download.outputs.run_id }}

runs:
  using: composite
  steps:
    - name: Find CI run for this commit
      id: find
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
      env:
        SHA: ${{ github.sha }}
      with:
        script: |
          const sha = process.env.SHA;
          const { owner, repo } = context.repo;

          const { data } = await github.rest.actions.listWorkflowRunsForRepo({
            owner, repo,
            head_sha: sha,
            per_page: 50,
          });

          const ciRuns = data.workflow_runs
            .filter(r => r.name === 'CI')
            .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

          const run = ciRuns[ciRuns.length - 1];

          if (!run) {
            core.setFailed(`download-ci-artifact: no CI run found for ${sha}`);
            return;
          }
          if (run.status !== 'completed') {
            core.setFailed(`download-ci-artifact: CI run ${run.id} is still ${run.status} — cannot proceed`);
            return;
          }
          if (run.conclusion !== 'success') {
            core.setFailed(`download-ci-artifact: CI run ${run.id} concluded '${run.conclusion}' — cannot proceed`);
            return;
          }

          core.info(`download-ci-artifact: CI run ${run.id} passed`);
          core.setOutput('run_id', String(run.id));

    - name: Download artifact
      id: download
      shell: bash
      env:
        GH_TOKEN:      ${{ github.token }}
        RUN_ID:        ${{ steps.find.outputs.run_id }}
        ARTIFACT_NAME: ${{ inputs.artifact_name }}
        OUTPUT_DIR:    ${{ inputs.output_dir }}
        REPO:          ${{ github.repository }}
      run: |
        set -euo pipefail

        echo "download-ci-artifact: downloading '$ARTIFACT_NAME' from run $RUN_ID"
        gh run download "$RUN_ID" \
          --repo "$REPO" \
          --name "$ARTIFACT_NAME" \
          --dir "$OUTPUT_DIR"

        echo "download-ci-artifact: downloaded to $OUTPUT_DIR/"
        ls -lh "$OUTPUT_DIR/"

        echo "path=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"
        echo "run_id=$RUN_ID"   >> "$GITHUB_OUTPUT"
