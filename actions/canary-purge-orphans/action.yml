name: 'canary-purge-orphans'
description: >
  Batch-delete anchor tags whose target SHAs are no longer reachable from
  the named branch's HEAD. Used to acknowledge accepted history loss after
  a regression you've decided not to recover (e.g., orphan tags from a
  rebase that you explicitly endorse).

  Workflow-only — never run locally. Triggered via workflow_dispatch on the
  caller's `canary-ops.yml`. Requires:
    1. Explicit confirmation input matching the count of orphans found.
    2. A push credential belonging to the tag ruleset's bypass actor (your
       single-member `canary-bypass-actors` team). The default GITHUB_TOKEN
       cannot delete protected tags — caller must inject a PAT via secrets.

inputs:
  branch:
    description: 'Branch slug whose orphans should be purged (e.g., main).'
    required: true
  tag-prefix:
    description: 'Anchor namespace.'
    required: false
    default: 'anchor/'
  confirm-count:
    description: 'Type the literal number of orphans you expect to delete. Must match what the action discovers, or it aborts.'
    required: true
  bypass-token:
    description: 'PAT belonging to a member of the bypass-actors team. Must have repo + workflow scopes. Default GITHUB_TOKEN cannot delete protected tags.'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Checkout full history
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        filter: 'blob:none'
        token: ${{ inputs.bypass-token }}
        persist-credentials: true

    - name: Identify orphaned anchors
      id: scan
      shell: bash
      env:
        BRANCH: ${{ inputs.branch }}
        PREFIX: ${{ inputs.tag-prefix }}
      run: |
        set -euo pipefail

        slug="${BRANCH//\//-}"
        git fetch --tags --force origin "refs/tags/${PREFIX}${slug}-*:refs/tags/${PREFIX}${slug}-*" 2>/dev/null || true

        # Make sure the branch ref is up to date locally.
        git fetch origin "$BRANCH" --no-tags

        mapfile -t tags < <(git tag --list "${PREFIX}${slug}-*" | sort)

        orphans=()
        for tag in "${tags[@]}"; do
          sha=$(git rev-parse --verify "${tag}^{commit}" 2>/dev/null || true)
          [ -z "$sha" ] && continue
          if ! git merge-base --is-ancestor "$sha" "origin/$BRANCH" 2>/dev/null; then
            orphans+=("$tag")
          fi
        done

        echo "discovered ${#orphans[@]} orphaned anchor(s) on $BRANCH"
        if [ ${#orphans[@]} -gt 0 ]; then
          printf '  %s\n' "${orphans[@]}"
        fi

        {
          echo "count=${#orphans[@]}"
          echo "orphans<<EOF"
          printf '%s\n' "${orphans[@]}"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Confirmation guard (count must match)
      shell: bash
      env:
        EXPECTED: ${{ inputs.confirm-count }}
        ACTUAL:   ${{ steps.scan.outputs.count }}
      run: |
        set -euo pipefail
        if [ "$EXPECTED" != "$ACTUAL" ]; then
          echo "::error::Confirmation count mismatch — input said '$EXPECTED' but found '$ACTUAL' orphans on this branch. Aborting to prevent accidental over- or under-purge."
          exit 1
        fi
        if [ "$ACTUAL" = "0" ]; then
          echo "::notice::No orphans to purge."
          exit 0
        fi

    - name: Delete orphaned tags
      if: steps.scan.outputs.count != '0'
      shell: bash
      env:
        ORPHANS: ${{ steps.scan.outputs.orphans }}
      run: |
        set -euo pipefail
        # Push deletes atomically. The ruleset bypass on the bypass-token
        # is what allows this to succeed; without it, the ruleset rejects
        # the delete and this step fails.
        refspecs=()
        while IFS= read -r tag; do
          [ -z "$tag" ] && continue
          refspecs+=(":refs/tags/$tag")
        done <<< "$ORPHANS"

        echo "deleting ${#refspecs[@]} orphaned anchor tags..."
        git push --atomic origin "${refspecs[@]}"
        echo "::notice::Purged ${#refspecs[@]} orphaned anchors."
