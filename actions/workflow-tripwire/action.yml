name: 'workflow-tripwire'
description: >
  Hard ceiling on a workflow run's duration, applied in parallel with the
  real work. Polls the run's job statuses every N seconds. Exits early
  (clean) as soon as all other jobs finish. If the kill deadline is
  reached while any other job is still in progress, calls the GitHub API
  to cancel the entire run.

  Use as its own job (named anything — convention: `tripwire`) with no
  `needs:` dependencies and `permissions: actions: write`. The watchdog
  runs alongside the other jobs and does NOT block them from finishing —
  it polls and self-exits.

  Belt-and-suspenders for per-job `timeout-minutes`: catches the case
  where a misconfigured job has an unrealistically high timeout, or where
  a hung job tree somehow evades the per-job cap.

inputs:
  kill-after-minutes:
    description: 'Wall-clock minutes after which the run is force-canceled if not yet complete.'
    required: false
    default: '30'
  poll-seconds:
    description: 'How often the watchdog checks job statuses.'
    required: false
    default: '30'
  exclude-job-name:
    description: 'Job name to exclude from "is everyone done" check — usually the watchdog itself. Defaults to the conventional name `tripwire`.'
    required: false
    default: 'tripwire'

runs:
  using: 'composite'
  steps:
    - name: Watchdog loop
      shell: bash
      env:
        KILL_MIN: ${{ inputs.kill-after-minutes }}
        POLL_SEC: ${{ inputs.poll-seconds }}
        EXCLUDE:  ${{ inputs.exclude-job-name }}
        GH_TOKEN: ${{ github.token }}
        RUN_ID:   ${{ github.run_id }}
        REPO:     ${{ github.repository }}
      run: |
        set -euo pipefail

        start=$(date +%s)
        deadline=$((start + KILL_MIN * 60))
        echo "tripwire armed: kill at $(date -u -d @$deadline +%H:%M:%S 2>/dev/null || date -u -r $deadline +%H:%M:%S) UTC (${KILL_MIN}m from now)"

        while true; do
          now=$(date +%s)

          # Past the deadline? Cancel the run if it's still going.
          if [ "$now" -ge "$deadline" ]; then
            status=$(gh run view "$RUN_ID" -R "$REPO" --json status --jq .status 2>/dev/null || echo "unknown")
            if [ "$status" != "completed" ]; then
              echo "::error::TRIPWIRE FIRED — workflow run $RUN_ID exceeded ${KILL_MIN}m. Cancelling."
              gh run cancel "$RUN_ID" -R "$REPO" || true
              exit 1
            fi
            echo "tripwire deadline passed but run already completed — exiting clean"
            exit 0
          fi

          # Are all OTHER jobs done? If yes, no need to keep watching.
          # `conclusion` is null while a job is in progress.
          incomplete=$(
            gh run view "$RUN_ID" -R "$REPO" --json jobs \
              --jq ".jobs[] | select(.name != \"$EXCLUDE\") | select(.conclusion == null) | .name" \
              2>/dev/null | wc -l | tr -d ' '
          )

          if [ "$incomplete" = "0" ]; then
            echo "tripwire: all other jobs complete — exiting clean"
            exit 0
          fi

          remaining=$((deadline - now))
          echo "tripwire: $incomplete job(s) still running, ${remaining}s until kill"
          sleep "$POLL_SEC"
        done
