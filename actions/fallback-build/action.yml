name: Fallback Build
description: |
  Full build + bundle when no CI artifact exists for this commit.
  Mirrors the CI pipeline exactly: checkout -> setup-node (+ install) -> build -> bundle-release.
  Stages output to artifact/release.tar.gz to match download-ci-artifact's output path.

outputs:
  artifact_path:
    description: 'Path to staged release.tar.gz.'
    value: artifact/release.tar.gz

runs:
  using: composite
  steps:
    - name: Populate full working tree
      shell: bash
      run: |
        git -C "$GITHUB_WORKSPACE" sparse-checkout disable
        git -C "$GITHUB_WORKSPACE" fetch --unshallow 2>/dev/null || true
        git -C "$GITHUB_WORKSPACE" checkout HEAD -- .

    - name: Setup Node + install dependencies
      uses: sonarmd/workflows/actions/setup-node@main

    - name: Build
      shell: bash
      run: yarn --cwd "$GITHUB_WORKSPACE" build

    - name: Bundle release
      id: bundle
      uses: sonarmd/workflows/actions/bundle-release@main

    - name: Stage artifact to match CI download path
      shell: bash
      env:
        ARTIFACT_PATH: ${{ steps.bundle.outputs.artifact_path }}
      run: |
        mkdir -p "$GITHUB_WORKSPACE/artifact"
        cp "$ARTIFACT_PATH"             "$GITHUB_WORKSPACE/artifact/release.tar.gz"
        [ -f "${ARTIFACT_PATH}.sha512"   ] && cp "${ARTIFACT_PATH}.sha512"   "$GITHUB_WORKSPACE/artifact/"
        [ -f "${ARTIFACT_PATH}.checksum" ] && cp "${ARTIFACT_PATH}.checksum" "$GITHUB_WORKSPACE/artifact/"
        echo "fallback-build: staged $(du -sh "$GITHUB_WORKSPACE/artifact/release.tar.gz" | cut -f1) -> artifact/release.tar.gz"
