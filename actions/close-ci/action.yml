name: Close CI
description: |
  Finalizes run state and emits the terminal summary. On failure,
  produces a structured diagnostic report with failure classification,
  failing command, and remediation hints. On success, summarizes
  evidence and timing. Always runs — even if earlier steps failed.

inputs:
  status:
    description: 'Job status: success | failure | cancelled.'
    required: true
  failure_classification:
    description: 'Override failure classification (auto-detected if empty).'
    required: false
    default: ''
  failure_details:
    description: 'Path to run-shell-block diagnostics JSON file.'
    required: false
    default: ''
  slack_webhook_url:
    description: 'Slack webhook URL for completion notification.'
    required: false
    default: ''
  app_name:
    description: 'Application name for notifications.'
    required: false
    default: ''
  slack_channel:
    description: 'Slack channel.'
    required: false
    default: '#ops'

outputs:
  classification:
    description: 'Final failure classification.'
    value: ${{ steps.close.outputs.classification }}
  duration:
    description: 'Run duration in seconds.'
    value: ${{ steps.close.outputs.duration }}

runs:
  using: composite
  steps:
    - name: Finalize run
      id: close
      shell: bash
      env:
        STATUS: ${{ inputs.status }}
        CLASSIFICATION_OVERRIDE: ${{ inputs.failure_classification }}
        DETAILS_PATH: ${{ inputs.failure_details }}
        CORRELATION_ID: ${{ env.CORRELATION_ID }}
        MONITORING_START: ${{ env.MONITORING_START }}
        MONITORING_START_EPOCH: ${{ env.MONITORING_START_EPOCH }}
        WORKFLOW_DEADLINE_EPOCH: ${{ env.WORKFLOW_DEADLINE_EPOCH }}
        SHA: ${{ github.sha }}
        REPO: ${{ github.repository }}
        ACTOR: ${{ github.actor }}
        RUN_ID: ${{ github.run_id }}
      run: |
        set -uo pipefail

        END_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        END_EPOCH=$(date +%s)
        DURATION=0
        if [ -n "$MONITORING_START_EPOCH" ]; then
          DURATION=$((END_EPOCH - MONITORING_START_EPOCH))
        fi
        DURATION_HUMAN="${DURATION}s"
        if [ "$DURATION" -ge 60 ]; then
          DURATION_HUMAN="$((DURATION / 60))m $((DURATION % 60))s"
        fi

        echo "duration=$DURATION" >> "$GITHUB_OUTPUT"

        # ── Check for timeout-adjacent failure ───────────────────
        TIMEOUT_ADJACENT=false
        if [ -n "$WORKFLOW_DEADLINE_EPOCH" ] && [ "$STATUS" != "success" ]; then
          REMAINING=$((WORKFLOW_DEADLINE_EPOCH - END_EPOCH))
          if [ "$REMAINING" -lt 30 ]; then
            TIMEOUT_ADJACENT=true
          fi
        fi

        # ── Determine classification ─────────────────────────────
        CLASSIFICATION=""
        FAILING_CMD=""
        FAILING_LINE=""
        EXIT_CODE=""
        LAST_STDERR=""

        if [ "$STATUS" = "cancelled" ]; then
          CLASSIFICATION="timeout"
        elif [ -n "$CLASSIFICATION_OVERRIDE" ]; then
          CLASSIFICATION="$CLASSIFICATION_OVERRIDE"
        elif [ "$TIMEOUT_ADJACENT" = "true" ]; then
          CLASSIFICATION="timeout"
        fi

        # Read diagnostics from run-shell-block if available
        for diag in /tmp/.rsb-failure-setup.json /tmp/.rsb-failure-steps.json; do
          if [ -f "$diag" ]; then
            if [ -z "$CLASSIFICATION" ]; then
              CLASSIFICATION=$(python3 -c "import json; print(json.load(open('$diag')).get('classification','user-code'))" 2>/dev/null || echo "user-code")
            fi
            FAILING_CMD=$(python3 -c "import json; print(json.load(open('$diag')).get('failing_command','unknown'))" 2>/dev/null || echo "unknown")
            FAILING_LINE=$(python3 -c "import json; print(json.load(open('$diag')).get('line_number','?'))" 2>/dev/null || echo "?")
            EXIT_CODE=$(python3 -c "import json; print(json.load(open('$diag')).get('exit_code','?'))" 2>/dev/null || echo "?")
            LAST_STDERR=$(python3 -c "import json; print(json.load(open('$diag')).get('last_stderr','')[:500])" 2>/dev/null || echo "")
            BLOCK_NAME=$(python3 -c "import json; print(json.load(open('$diag')).get('block_name','unknown'))" 2>/dev/null || echo "unknown")
            break
          fi
        done

        if [ "$STATUS" != "success" ] && [ -z "$CLASSIFICATION" ]; then
          CLASSIFICATION="infrastructure/platform"
        fi

        echo "classification=${CLASSIFICATION:-}" >> "$GITHUB_OUTPUT"

        # ── Write summary ────────────────────────────────────────
        echo "" >> "$GITHUB_STEP_SUMMARY"

        if [ "$STATUS" = "success" ]; then
          # ── Success summary ──────────────────────────────────
          cat >> "$GITHUB_STEP_SUMMARY" <<SUMMARY
        ---
        ### CI Result: PASSED

        | Field | Value |
        |-------|-------|
        | Commit | \`${SHA:0:12}\` |
        | Duration | $DURATION_HUMAN |
        | Correlation ID | \`${CORRELATION_ID:-unknown}\` |
        | Completed | $END_TIME |

        SUMMARY

          # Include checksum info if available
          if [ -f build-checksums.txt ]; then
            DIGEST=$(sha256sum build-checksums.txt | cut -d' ' -f1)
            FILE_COUNT=$(wc -l < build-checksums.txt | tr -d ' ')
            cat >> "$GITHUB_STEP_SUMMARY" <<SUMMARY
        **Build artifact**: $FILE_COUNT files, digest \`${DIGEST:0:24}...\`
        SUMMARY
          fi

          if [ -f bom.json ]; then
            SBOM_COUNT=$(python3 -c "import json; print(len(json.load(open('bom.json')).get('components',[])))" 2>/dev/null || echo "?")
            echo "**SBOM**: $SBOM_COUNT components (CycloneDX)" >> "$GITHUB_STEP_SUMMARY"
          fi

        else
          # ── Failure summary ──────────────────────────────────
          cat >> "$GITHUB_STEP_SUMMARY" <<SUMMARY
        ---
        ### CI Result: FAILED

        | Field | Value |
        |-------|-------|
        | Classification | \`$CLASSIFICATION\` |
        | Action | run-shell-block(${BLOCK_NAME:-unknown}) |
        | Failing command | \`${FAILING_CMD:-unknown}\` |
        | Line | ${FAILING_LINE:-?} |
        | Exit code | ${EXIT_CODE:-?} |
        | Duration | $DURATION_HUMAN |
        | Correlation ID | \`${CORRELATION_ID:-unknown}\` |
        | Completed | $END_TIME |
        SUMMARY

          if [ -n "$LAST_STDERR" ]; then
            cat >> "$GITHUB_STEP_SUMMARY" <<SUMMARY

        <details>
        <summary>Error output (last lines)</summary>

        \`\`\`
        $LAST_STDERR
        \`\`\`

        </details>
        SUMMARY
          fi

          # ── Remediation hints ────────────────────────────────
          case "$CLASSIFICATION" in
            dependency-resolution)
              echo "**Remediation**: Check lockfile sync (\`yarn install\` locally + commit lockfile), registry access, and Node/Python version compatibility." >> "$GITHUB_STEP_SUMMARY" ;;
            test)
              echo "**Remediation**: Run tests locally. Check test output above for assertion failures or setup issues." >> "$GITHUB_STEP_SUMMARY" ;;
            build)
              echo "**Remediation**: Run the build locally. Check for TypeScript errors, missing imports, or config issues." >> "$GITHUB_STEP_SUMMARY" ;;
            user-code)
              echo "**Remediation**: Check the failing command output above. This is a code issue in the repository." >> "$GITHUB_STEP_SUMMARY" ;;
            environment)
              echo "**Remediation**: System dependency issue. Check that packages exist and are available on ubuntu-latest." >> "$GITHUB_STEP_SUMMARY" ;;
            timeout)
              echo "**Remediation**: The run exceeded or nearly exceeded the time limit. Optimize your CI or increase the timeout." >> "$GITHUB_STEP_SUMMARY" ;;
            external-service)
              echo "**Remediation**: An external service or API was unreachable. Retry, or check service status." >> "$GITHUB_STEP_SUMMARY" ;;
            release-contract)
              echo "**Remediation**: Fix deploy.json. See the validate-release-contract output above." >> "$GITHUB_STEP_SUMMARY" ;;
          esac
        fi

        # ── Lifecycle end record ─────────────────────────────────
        cat >> "$GITHUB_STEP_SUMMARY" <<SUMMARY

        ---
        *Run completed at $END_TIME ($DURATION_HUMAN) | $REPO | \`${CORRELATION_ID:-unknown}\`*
        SUMMARY

        echo "close-ci: $STATUS ($DURATION_HUMAN) classification=${CLASSIFICATION:-none}"

    - name: Notify Slack (completion)
      if: inputs.slack_webhook_url != '' && inputs.app_name != ''
      uses: sonarmd/workflows/actions/notify-slack@main
      with:
        webhook_url: ${{ inputs.slack_webhook_url }}
        status: ${{ inputs.status }}
        app_name: ${{ inputs.app_name }}
        channel: ${{ inputs.slack_channel }}
