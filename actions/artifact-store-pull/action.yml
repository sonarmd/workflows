name: Artifact Store Pull
description: |
  Pulls a release artifact for the given SHA from the durable artifact
  store into a local directory. Fails if no artifact exists for the
  SHA - callers should probe first if a miss is acceptable.

  Tag scheme: ghcr.io/<owner>/<repo>-release:sha-<SHA>

  Caller workflow MUST grant `packages: read` permission so GITHUB_TOKEN
  can authenticate to GHCR.

inputs:
  sha:
    description: 'Commit SHA to pull. Defaults to github.sha.'
    required: false
    default: ${{ github.sha }}
  output_dir:
    description: 'Directory to pull the artifact into. Created if missing.'
    required: false
    default: 'artifact'
  registry:
    description: 'OCI registry hostname.'
    required: false
    default: 'ghcr.io'

outputs:
  path:
    description: 'Directory containing the pulled artifact.'
    value: ${{ steps.pull.outputs.path }}
  reference:
    description: 'Full OCI reference pulled.'
    value: ${{ steps.pull.outputs.reference }}

runs:
  using: composite
  steps:
    - name: Install ORAS
      uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1
      with:
        version: 1.2.0

    - name: Pull artifact
      id: pull
      shell: bash
      env:
        SHA: ${{ inputs.sha }}
        OUTPUT_DIR: ${{ inputs.output_dir }}
        REGISTRY: ${{ inputs.registry }}
        REPO: ${{ github.repository }}
        GH_TOKEN: ${{ github.token }}
        GH_ACTOR: ${{ github.actor }}
      run: |
        set -euo pipefail

        REF="${REGISTRY}/${REPO}-release:sha-${SHA}"
        echo "reference=$REF" >> "$GITHUB_OUTPUT"
        echo "path=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"

        mkdir -p "$OUTPUT_DIR"

        echo "$GH_TOKEN" | oras login "$REGISTRY" \
          -u "$GH_ACTOR" --password-stdin >/dev/null

        echo "artifact-store-pull: pulling $REF -> $OUTPUT_DIR"
        if ! oras pull "$REF" --output "$OUTPUT_DIR"; then
          echo "::error::artifact-store-pull: no artifact found for SHA $SHA at $REF"
          echo "::error::This means CI did not publish a build for this commit."
          echo "::error::Investigate: was CI run for this SHA? Did it complete successfully?"
          exit 1
        fi

        ls -lh "$OUTPUT_DIR/"
        echo "artifact-store-pull: complete"
