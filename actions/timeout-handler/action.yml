name: Timeout Handler
description: |
  Establishes the global execution ceiling for a workflow run.
  Must be the FIRST action called in every workflow.

  This action records the timeout policy for diagnostic reporting.
  Actual enforcement is via GitHub Actions' native timeout-minutes
  on the job. This action records the deadline so close-ci can
  detect timeout-adjacent failures.

inputs:
  timeout_minutes:
    description: 'Maximum runtime in minutes. Hard upper bound.'
    required: false
    default: '15'

outputs:
  deadline:
    description: 'ISO 8601 timestamp of the execution deadline.'
    value: ${{ steps.handler.outputs.deadline }}
  start_epoch:
    description: 'Unix epoch of workflow start.'
    value: ${{ steps.handler.outputs.start_epoch }}

runs:
  using: composite
  steps:
    - name: Set execution ceiling
      id: handler
      shell: bash
      env:
        TIMEOUT_MINUTES: ${{ inputs.timeout_minutes }}
      run: |
        set -euo pipefail

        # Validate timeout bounds
        if [ "$TIMEOUT_MINUTES" -gt 30 ] 2>/dev/null; then
          echo "::error::timeout-handler: timeout_minutes cannot exceed 30 (got $TIMEOUT_MINUTES)"
          exit 1
        fi
        if [ "$TIMEOUT_MINUTES" -lt 1 ] 2>/dev/null; then
          echo "::error::timeout-handler: timeout_minutes must be at least 1 (got $TIMEOUT_MINUTES)"
          exit 1
        fi

        START_EPOCH=$(date +%s)
        DEADLINE_EPOCH=$((START_EPOCH + TIMEOUT_MINUTES * 60))
        DEADLINE=$(date -u -d "@$DEADLINE_EPOCH" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
          || date -u -r "$DEADLINE_EPOCH" +%Y-%m-%dT%H:%M:%SZ)

        # Record in environment for downstream actions
        echo "WORKFLOW_START_EPOCH=$START_EPOCH" >> "$GITHUB_ENV"
        echo "WORKFLOW_TIMEOUT_MINUTES=$TIMEOUT_MINUTES" >> "$GITHUB_ENV"
        echo "WORKFLOW_DEADLINE_EPOCH=$DEADLINE_EPOCH" >> "$GITHUB_ENV"

        # Outputs
        echo "deadline=$DEADLINE" >> "$GITHUB_OUTPUT"
        echo "start_epoch=$START_EPOCH" >> "$GITHUB_OUTPUT"

        echo "timeout-handler: ceiling set to ${TIMEOUT_MINUTES}m (deadline $DEADLINE)"
