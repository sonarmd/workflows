name: 'canary-anchor'
description: >
  Anchor the HEAD of each push to main with a single immutable
  `anchor/<short-sha>-<reason>` tag. Git commit SHAs are content-addressed
  Merkle roots — pinning the HEAD SHA transitively covers every ancestor
  commit's content, parents, and metadata. A force-push that rewrites any
  commit in the chain changes the descendants' SHAs, orphaning the anchor.

  Reason suffix encodes notable properties of the anchored commit (merge /
  subject-marker / critical-path / large-diff / tagged) or defaults to
  `commit`. One tag per push to main — manageable tag count, full
  chain-of-custody coverage via Merkle properties of the commit graph.

  Requires the caller's merge strategy to be rebase merge (not squash) so
  PR commits land individually on main and the HEAD SHA reflects the
  rebased PR tip.

  Tags are immutable once created (enforced by the caller repo's tag
  protection ruleset). This action never modifies repo files; it only
  creates new refs in the `anchor/*` namespace.

inputs:
  tag-prefix:
    description: 'Anchor tag namespace.'
    required: false
    default: 'anchor/'
  before-sha:
    description: 'HEAD before this push (github.event.before).'
    required: true
  after-sha:
    description: 'HEAD after this push (github.sha).'
    required: true
  size-threshold:
    description: 'Minimum (insertions + deletions) to qualify as "large-diff".'
    required: false
    default: '500'
  critical-paths:
    description: 'Newline-separated git pathspec globs. Touching any qualifies as "critical-path".'
    required: false
    default: |
      migrations/**
      **/schema*
      **/auth*
      .github/workflows/**
      DECISIONS.md
      **/CLAUDE.md
  subject-markers:
    description: 'POSIX-ERE regex; matching commit subjects qualify as "subject-marker".'
    required: false
    default: '\[release\]|\[migration\]|\[breaking\]|BREAKING CHANGE:'

runs:
  using: 'composite'
  steps:
    - name: Checkout full history + existing anchors
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        persist-credentials: true

    - name: Fetch existing anchor tags (to dedupe)
      shell: bash
      env:
        PREFIX: ${{ inputs.tag-prefix }}
      run: |
        set -euo pipefail
        git fetch --tags --force origin "refs/tags/${PREFIX}*:refs/tags/${PREFIX}*" 2>/dev/null || true

    - name: Anchor HEAD of this push
      id: anchor
      shell: bash
      env:
        AFTER:     ${{ inputs.after-sha }}
        PREFIX:    ${{ inputs.tag-prefix }}
        THRESHOLD: ${{ inputs.size-threshold }}
        PATHS:     ${{ inputs.critical-paths }}
        MARKERS:   ${{ inputs.subject-markers }}
      run: |
        set -euo pipefail

        sha="$AFTER"

        # Already anchored? No-op.
        if git tag --points-at "$sha" --list "${PREFIX}*" 2>/dev/null | grep -q .; then
          echo "::notice::HEAD ($sha) is already anchored — skipping."
          echo "created=0" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Build pathspecs from critical-paths input.
        pathspecs=()
        while IFS= read -r g; do
          g="${g#"${g%%[![:space:]]*}"}"
          g="${g%"${g##*[![:space:]]}"}"
          [ -z "$g" ] && continue
          pathspecs+=(":(glob)$g")
        done <<< "$PATHS"

        new_tags=()

        # One pass — anchor HEAD only. The HEAD SHA is a Merkle root over
        # all ancestor commits, so anchoring it transitively covers them.

        do_one=1
        if [ "$do_one" = "1" ]; then
          reason=""

          # 1. Merge commit.
          parent_count=$(($(git rev-list --parents -n1 "$sha" | wc -w) - 1))
          if [ "$parent_count" -gt 1 ]; then
            reason="merge"
          fi

          # 2. Subject marker.
          if [ -z "$reason" ]; then
            subject=$(git log -1 --format=%s "$sha")
            if echo "$subject" | grep -qE "$MARKERS"; then
              reason="subject-marker"
            fi
          fi

          # 3. Critical path touched.
          if [ -z "$reason" ] && [ ${#pathspecs[@]} -gt 0 ]; then
            if git diff-tree --no-commit-id --name-only -r "$sha" -- "${pathspecs[@]}" 2>/dev/null | grep -q .; then
              reason="critical-path"
            fi
          fi

          # 4. Large diff.
          if [ -z "$reason" ]; then
            lines=$(git show --shortstat --format= "$sha" | awk '
              /file/ {
                ins=0; del=0;
                for (i=1; i<=NF; i++) {
                  if ($i ~ /insertion/) ins=$(i-1);
                  if ($i ~ /deletion/)  del=$(i-1);
                }
                print ins+del; exit;
              }')
            lines="${lines:-0}"
            if [ "$lines" -ge "$THRESHOLD" ]; then
              reason="large-diff"
            fi
          fi

          # 5. Already version-tagged (release commit).
          if [ -z "$reason" ]; then
            if [ -n "$(git tag --points-at "$sha" 2>/dev/null | grep -v "^${PREFIX}" || true)" ]; then
              reason="tagged"
            fi
          fi

          # Default reason for ordinary commits → full coverage, no gaps.
          if [ -z "$reason" ]; then
            reason="commit"
          fi

          short="${sha:0:7}"
          tag="${PREFIX}${short}-${reason}"

          # Race-safety: collision (extremely unlikely) → suffix with full count.
          if git rev-parse --verify "refs/tags/$tag" >/dev/null 2>&1; then
            tag="${PREFIX}${short}-${reason}-$(date -u +%s)"
          fi

          # Create lightweight tag locally; pushed below.
          git tag "$tag" "$sha"
          new_tags+=("$tag")
          echo "anchor staged: $tag → $sha (${reason})"
        fi

        echo "created=${#new_tags[@]}" >> "$GITHUB_OUTPUT"

        if [ ${#new_tags[@]} -eq 0 ]; then
          echo "::notice::Nothing to anchor."
          exit 0
        fi

        # Push the new anchor. The ruleset blocks anything but creation
        # in the anchor/* namespace; we never use --force.
        echo "pushing anchor: ${new_tags[0]}"
        git push origin "refs/tags/${new_tags[0]}:refs/tags/${new_tags[0]}"

        echo "::notice::Created anchor ${new_tags[0]} → $sha"
