name: Start Monitoring
description: |
  Initializes observability and diagnostic context for the run.
  Generates a deterministic correlation ID, records run metadata,
  emits the run-start lifecycle record, and optionally notifies Slack.

inputs:
  repo_short:
    description: 'Short repository identifier (e.g. api, fe, mobile).'
    required: true
  slack_webhook_url:
    description: 'Slack webhook URL for optional start notification.'
    required: false
    default: ''
  slack_channel:
    description: 'Slack channel for notifications.'
    required: false
    default: '#ops'

outputs:
  correlation_id:
    description: 'Deterministic correlation ID for log tracing.'
    value: ${{ steps.init.outputs.correlation_id }}

runs:
  using: composite
  steps:
    - name: Initialize monitoring context
      id: init
      shell: bash
      env:
        REPO_SHORT: ${{ inputs.repo_short }}
        RUN_ID: ${{ github.run_id }}
        RUN_ATTEMPT: ${{ github.run_attempt }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        REPO: ${{ github.repository }}
        REF: ${{ github.ref }}
        SHA: ${{ github.sha }}
        ACTOR: ${{ github.actor }}
        EVENT: ${{ github.event_name }}
        WORKFLOW: ${{ github.workflow }}
      run: |
        set -euo pipefail

        # Deterministic correlation ID (not random — enables log correlation)
        CORRELATION_ID="ci-${REPO_SHORT}-${RUN_ID}-${RUN_ATTEMPT}"
        START_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        START_EPOCH=$(date +%s)

        # Record in environment for all downstream actions
        echo "CORRELATION_ID=$CORRELATION_ID" >> "$GITHUB_ENV"
        echo "MONITORING_START=$START_TIME" >> "$GITHUB_ENV"
        echo "MONITORING_START_EPOCH=$START_EPOCH" >> "$GITHUB_ENV"
        echo "CI_REPO_SHORT=$REPO_SHORT" >> "$GITHUB_ENV"
        echo "CI_RUN_URL=$RUN_URL" >> "$GITHUB_ENV"

        # Output
        echo "correlation_id=$CORRELATION_ID" >> "$GITHUB_OUTPUT"

        # ── Lifecycle start record ───────────────────────────────
        cat >> "$GITHUB_STEP_SUMMARY" <<SUMMARY
        ### Run Started

        | Field | Value |
        |-------|-------|
        | Workflow | $WORKFLOW |
        | Run ID | \`$RUN_ID\` (attempt $RUN_ATTEMPT) |
        | Repository | $REPO |
        | Ref | \`$REF\` |
        | Commit | \`${SHA:0:12}\` |
        | Actor | $ACTOR |
        | Event | $EVENT |
        | Correlation ID | \`$CORRELATION_ID\` |
        | Started | $START_TIME |
        SUMMARY

        echo "start-monitoring: $CORRELATION_ID — $REPO@${SHA:0:12} by $ACTOR"

    - name: Notify Slack (started)
      if: inputs.slack_webhook_url != ''
      uses: sonarmd/workflows/actions/notify-slack@main
      with:
        webhook_url: ${{ inputs.slack_webhook_url }}
        status: started
        app_name: ${{ inputs.repo_short }}
        channel: ${{ inputs.slack_channel }}
