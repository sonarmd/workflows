name: Resolve Identifier
description: |
  Resolves the repo's platform identifier from the authoritative mapping
  in sonarmd/workflows/.github/repo-identity.yml.

  The identifier is PLATFORM-OWNED. Repos cannot self-assign. If deploy.json
  declares an identifier it MUST match the platform mapping or the action fails.

inputs:
  token:
    description: 'GitHub token with access to sonarmd/workflows (use a GitHub App token).'
    required: true

outputs:
  identifier:
    description: 'Resolved platform identifier (e.g. api, fe, mobile).'
    value: ${{ steps.resolve.outputs.identifier }}

runs:
  using: composite
  steps:
    - name: Checkout platform identity mapping
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        repository: sonarmd/workflows
        sparse-checkout: .github/repo-identity.yml
        path: _platform
        token: ${{ inputs.token }}

    - name: Resolve identifier
      id: resolve
      shell: bash
      env:
        REPO_NAME: ${{ github.event.repository.name }}
      run: |
        set -euo pipefail

        IDENTIFIER=$(python3 - <<'PYEOF'
        import re, sys, os

        with open('_platform/.github/repo-identity.yml') as f:
            content = f.read()

        repo = os.environ['REPO_NAME']
        # Parse flat YAML mapping without PyYAML
        pattern = re.compile(r'^\s+' + re.escape(repo) + r'\s*:\s*(\S+)', re.MULTILINE)
        match = pattern.search(content)

        if not match:
            print(f'::error::resolve-identifier: repo "{repo}" not found in platform identity mapping', file=sys.stderr)
            print(f'::error::  Add it to sonarmd/workflows/.github/repo-identity.yml', file=sys.stderr)
            sys.exit(1)

        print(match.group(1))
        PYEOF
        )

        # Cross-validate with deploy.json if it declares an identifier
        if [ -f deploy.json ]; then
          DJ_IDENT=$(python3 -c "import json; print(json.load(open('deploy.json')).get('identifier', ''))" 2>/dev/null || echo "")
          if [ -n "$DJ_IDENT" ] && [ "$DJ_IDENT" != "$IDENTIFIER" ]; then
            echo "::error::resolve-identifier: deploy.json.identifier '$DJ_IDENT' does not match platform mapping '$IDENTIFIER'"
            echo "::error::  The platform mapping is authoritative. Remove or correct deploy.json.identifier."
            exit 1
          fi
        fi

        echo "identifier=$IDENTIFIER" >> "$GITHUB_OUTPUT"
        echo "resolve-identifier: $IDENTIFIER (repo=$REPO_NAME)"
