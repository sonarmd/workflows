name: Setup Node.js
description: Install Node.js from package.json engines.node with yarn dependency caching

inputs:
  node-version:
    description: Node.js version to install (default reads from package.json volta config)
    required: false
    default: ''
  working-directory:
    description: Directory containing package.json and yarn.lock
    required: false
    default: '.'
  token:
    description: |
      GitHub token used for GitHub Packages auth (npm registry). Defaults
      to github.token. Used by the @sonarmd npm scope only — NOT for
      private cross-repo git deps (those use deploy keys; see below).
    required: false
    default: ${{ github.token }}
  infra_cdk_deploy_key:
    description: |
      SSH private key (ed25519) for read-only access to sonarmd/infra-cdk.
      When present, the action installs it and rewrites the infra-cdk
      git URL to SSH so yarn can clone without a long-lived PAT.
      Set INFRA_CDK_DEPLOY_KEY at the org or repo secret level and
      forward it from the caller workflow.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Detect Node version from package.json
      id: detect
      shell: bash
      env:
        INPUT_NODE_VERSION: ${{ inputs.node-version }}
      run: |
        if [ -n "$INPUT_NODE_VERSION" ]; then
          echo "version=$INPUT_NODE_VERSION" >> "$GITHUB_OUTPUT"
        else
          VERSION=$(jq -r '.engines.node // "24"' "$GITHUB_WORKSPACE/package.json" | tr -d '^~>=x ')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ steps.detect.outputs.version }}
        registry-url: 'https://npm.pkg.github.com'
        scope: '@sonarmd'

    # No actions/cache restore — yarn v1 + cache restore has a known race
    # where the integrity dir is repopulated from the tarball but yarn install
    # still tries to mkdir() the same paths and dies with EEXIST. `yarn cache
    # clean` does not fully clear v6 integrity dirs. We pay the cold-cache
    # cost (~30s) for build determinism. If/when caching is reintroduced,
    # it must `rm -rf $(yarn cache dir) node_modules` before install.
    - name: Nuke any stale yarn cache and node_modules
      shell: bash
      working-directory: ${{ github.workspace }}/${{ inputs.working-directory }}
      run: |
        # `yarn cache dir` only returns the offline mirror path. The integrity
        # metadata (~/.cache/yarn/v6) lives separately and is what triggers
        # the documented "ENOENT inside *-integrity/node_modules/..." race
        # when reused. Nuke both plus node_modules for a clean install.
        rm -rf "$(yarn cache dir)" ~/.cache/yarn ~/.npm/_cacache node_modules
        yarn cache clean --force 2>/dev/null || true

    - name: Install infra-cdk deploy key (when provided)
      if: inputs.infra_cdk_deploy_key != ''
      shell: bash
      env:
        DEPLOY_KEY: ${{ inputs.infra_cdk_deploy_key }}
      run: |
        # Per-repo SSH alias so deploy key only authenticates for infra-cdk.
        # Avoids leaking the key to any other github.com clone.
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/infra_cdk_deploy
        chmod 600 ~/.ssh/infra_cdk_deploy
        ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts 2>/dev/null
        cat >> ~/.ssh/config <<'EOF'
        Host github-infra-cdk
          HostName github.com
          User git
          IdentityFile ~/.ssh/infra_cdk_deploy
          IdentitiesOnly yes
        EOF
        chmod 600 ~/.ssh/config

    - name: Rewrite git URLs (deploy-key SSH for infra-cdk, public HTTPS otherwise)
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        # infra-cdk is private — route via deploy-key SSH alias if available.
        # Falls back to public HTTPS for non-sonarmd repos (star-config etc).
        if [ -n "$INFRA_CDK_KEY_PRESENT" ]; then
          git config --global url."git@github-infra-cdk:sonarmd/infra-cdk.git".insteadOf "ssh://git@github.com/sonarmd/infra-cdk.git"
          git config --global url."git@github-infra-cdk:sonarmd/infra-cdk.git".insteadOf "git@github.com:sonarmd/infra-cdk.git"
          git config --global url."git@github-infra-cdk:sonarmd/infra-cdk.git".insteadOf "https://github.com/sonarmd/infra-cdk.git"
        fi

        # Catch-all for everything else: unauthenticated HTTPS (works for
        # public repos like star-config).
        git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
        git config --global url."https://github.com/".insteadOf "git@github.com:"

        # actions/checkout persists an Authorization header in the cloned
        # repo's LOCAL config. That header is sent on EVERY git fetch from
        # github.com — including yarn's cross-repo dep fetches — and triggers
        #404s on public repos when the token lacks access. Strip it.
        git config --local --unset-all http."https://github.com/".extraheader || true
      env:
        INFRA_CDK_KEY_PRESENT: ${{ inputs.infra_cdk_deploy_key != '' }}

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.workspace }}/${{ inputs.working-directory }}
      env:
        NODE_AUTH_TOKEN: ${{ inputs.token }}
        GITHUB_TOKEN: ${{ inputs.token }}
      # yarn v1 has a documented race where parallel extracts corrupt the
      # cache integrity dir (ENOENT mid-extract on .cache/yarn/v6/*-integrity).
      # --network-concurrency 1 serializes downloads, not extracts; the race
      # still triggers occasionally on fresh runners. Retry up to 3 times
      # with --check-files (re-extracts any corrupted entry) before giving up.
      run: |
        set -e
        for attempt in 1 2 3; do
          if yarn install --network-concurrency 1 --check-files; then
            echo "yarn install: success on attempt $attempt"
            exit 0
          fi
          echo "yarn install: attempt $attempt failed — nuking cache and retrying"
          rm -rf "$(yarn cache dir)" ~/.cache/yarn ~/.npm/_cacache node_modules
        done
        echo "yarn install: exhausted 3 attempts" >&2
        exit 1
