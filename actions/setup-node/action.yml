name: Setup Node.js
description: Install Node.js from package.json engines.node with yarn dependency caching

inputs:
  node-version:
    description: Node.js version to install (default reads from package.json volta config)
    required: false
    default: ''
  working-directory:
    description: Directory containing package.json and yarn.lock
    required: false
    default: '.'
  token:
    description: |
      GitHub token used for private git+https:// dependencies and GitHub
      Packages auth.  Defaults to github.token (current-repo scope only).
      Pass a PAT with org-wide read access to resolve private cross-repo deps.
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Detect Node version from package.json
      id: detect
      shell: bash
      env:
        INPUT_NODE_VERSION: ${{ inputs.node-version }}
      run: |
        if [ -n "$INPUT_NODE_VERSION" ]; then
          echo "version=$INPUT_NODE_VERSION" >> "$GITHUB_OUTPUT"
        else
          VERSION=$(jq -r '.engines.node // "24"' "$GITHUB_WORKSPACE/package.json" | tr -d '^~>=x ')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ steps.detect.outputs.version }}
        registry-url: 'https://npm.pkg.github.com'
        scope: '@sonarmd'

    - name: Get yarn cache directory
      id: yarn-cache
      shell: bash
      run: echo "dir=$(yarn cache dir)" >> "$GITHUB_OUTPUT"

    - name: Cache yarn dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ${{ steps.yarn-cache.outputs.dir }}
          ${{ inputs.working-directory }}/node_modules
        key: yarn-${{ runner.os }}-${{ hashFiles(format('{0}/yarn.lock', inputs.working-directory)) }}
        restore-keys: |
          yarn-${{ runner.os }}-

    - name: Configure git HTTPS auth for private GitHub dependencies
      shell: bash
      env:
        GIT_TOKEN: ${{ inputs.token }}
      run: |
        # Rewrite SSH git:// and git@github.com: deps to HTTPS so the token
        # persisted by actions/checkout can authenticate them without a deploy
        # key.  Covers yarn classic git+ssh:// deps and npm/yarn shorthand
        # (owner/repo#ref) that resolves to git@github.com:.
        git config --global url."https://x-access-token:${GIT_TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
        git config --global url."https://x-access-token:${GIT_TOKEN}@github.com/".insteadOf "git@github.com:"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.workspace }}/${{ inputs.working-directory }}
      env:
        NODE_AUTH_TOKEN: ${{ inputs.token }}
        GITHUB_TOKEN: ${{ inputs.token }}
      run: yarn install --frozen-lockfile
