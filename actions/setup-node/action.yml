name: Setup Node.js
description: Install Node.js from package.json engines.node with yarn dependency caching

inputs:
  node-version:
    description: Node.js version to install (default resolves from .node-version or package.json engines.node)
    required: false
    default: ''
  working-directory:
    description: Directory containing package.json and yarn.lock
    required: false
    default: '.'
  token:
    description: |
      GitHub token used for private git+https:// dependencies and GitHub
      Packages auth.  Defaults to github.token (current-repo scope only).
      Pass a PAT with org-wide read access to resolve private cross-repo deps.
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Detect Node version
      id: detect
      shell: bash
      env:
        INPUT_NODE_VERSION: ${{ inputs.node-version }}
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: |
        # Resolution order (first match wins):
        #   1. explicit `node-version` input
        #   2. .node-version in working directory  (fnm / asdf canonical)
        #   3. .node-version at workspace root
        #   4. package.json engines.node (range expressions resolved to their
        #      lowest concrete version; ">=18.0.0" → "18.0.0", which is
        #      almost never what the caller wants — prefer .node-version)
        #   5. fall back to "24"
        #
        # The composite previously read engines.node directly with
        # `tr -d '^~>=x '`, which silently pinned ">=18.0.0" callers to
        # Node 18.0.0. .node-version is the canonical fnm/asdf file and
        # should win when present. (We deliberately do NOT read .nvmrc —
        # this org runs fnm, not nvm.)
        if [ -n "$INPUT_NODE_VERSION" ]; then
          VERSION="$INPUT_NODE_VERSION"
          SOURCE="input"
        else
          WORKDIR="$GITHUB_WORKSPACE/${WORKING_DIRECTORY:-.}"
          if [ -f "$WORKDIR/.node-version" ]; then
            VERSION=$(tr -d 'v \n\r' < "$WORKDIR/.node-version")
            SOURCE=".node-version (working dir)"
          elif [ -f "$GITHUB_WORKSPACE/.node-version" ]; then
            VERSION=$(tr -d 'v \n\r' < "$GITHUB_WORKSPACE/.node-version")
            SOURCE=".node-version (workspace root)"
          else
            # SONMD-3006: extract the first semver-shaped substring instead of
            # stripping operator chars. The old `tr -d '^~>=x '` did not strip
            # `.`, so values like `^22.x` / `22.x` / `>=22.x` produced `22.`
            # (trailing dot) which setup-node rejects. The regex picks the
            # first major / major.minor / major.minor.patch run, tolerating
            # `^22.x` (-> 22), `^22.0.0` (-> 22.0.0), `>=18 <23` (-> 18).
            RAW=$(jq -r '.engines.node // "24"' "$GITHUB_WORKSPACE/package.json")
            VERSION=$(printf '%s' "$RAW" | grep -oE '[0-9]+(\.[0-9]+){0,2}' | head -n1)
            VERSION=${VERSION:-24}
            SOURCE="package.json engines.node"
          fi
        fi
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        echo "::notice::setup-node: using Node ${VERSION} (source: ${SOURCE})"

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ steps.detect.outputs.version }}
        registry-url: 'https://npm.pkg.github.com'
        scope: '@sonarmd'

    # Enable Corepack ONLY for callers that pin a Corepack-managed package
    # manager - a `packageManager` field of yarn 2+ (Berry), pnpm, or npm. Those
    # need Corepack to provide that exact version; without it the runner's global
    # yarn 1.x sees the field and hard-refuses ("Corepack must currently be
    # enabled").
    #
    # We deliberately do NOT enable Corepack for classic yarn (`yarn@1.x`) or for
    # callers with NO packageManager field: both keep the runner's pre-installed
    # global yarn 1.x, byte-identical to this action's prior behavior. That is
    # what leaves every yarn-1 caller (e.g. star-config) completely unaffected.
    # The install step below uses `--frozen-lockfile`, which yarn 1 runs natively
    # and Berry accepts as a deprecated alias for `--immutable` (verified on yarn
    # 4.15: YN0050 warn, then proceeds) - so one command serves both majors.
    - name: Enable Corepack for Corepack-managed package managers
      shell: bash
      working-directory: ${{ github.workspace }}/${{ inputs.working-directory }}
      run: |
        # Detect the pinned package manager from package.json and switch:
        #   no field / classic yarn@1.x -> runner's default yarn (no Corepack)
        #   yarn@2+ / pnpm@* / npm@*    -> Corepack provides the pinned version
        PM=""
        if [ -f package.json ]; then
          PM="$(jq -r '.packageManager // empty' package.json 2>/dev/null || true)"
        fi
        case "$PM" in
          "")
            echo "::notice::setup-node: no packageManager field; using the runner's default yarn" ;;
          yarn@1|yarn@1.*)
            echo "::notice::setup-node: classic yarn pinned ($PM); using the runner's default yarn (Corepack not enabled)" ;;
          *)
            echo "::notice::setup-node: Corepack-managed packageManager=$PM; enabling Corepack"
            corepack enable ;;
        esac

    # No actions/cache restore — yarn v1 + cache restore has a known race
    # where the integrity dir is repopulated from the tarball but yarn install
    # still tries to mkdir() the same paths and dies with EEXIST. `yarn cache
    # clean` does not fully clear v6 integrity dirs. We pay the cold-cache
    # cost (~30s) for build determinism. If/when caching is reintroduced,
    # it must `rm -rf $(yarn cache dir) node_modules` before install.
    - name: Nuke any stale yarn cache and node_modules
      shell: bash
      working-directory: ${{ github.workspace }}/${{ inputs.working-directory }}
      run: |
        rm -rf "$(yarn cache dir)" node_modules
        yarn cache clean --force 2>/dev/null || true

    - name: Rewrite SSH GitHub deps to unauthenticated HTTPS
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        # SSH URLs in package.json (kept for local dev ergonomics) need to
        # resolve over HTTPS in CI since runners have no SSH key. Use
        # UNAUTHENTICATED HTTPS — public repos (e.g. star-config) serve fine.
        # Injecting a token that lacks explicit access to the target repo
        # causes GitHub to return 404 "Repository not found" even for public
        # repos.
        git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
        git config --global url."https://github.com/".insteadOf "git@github.com:"

        # actions/checkout persists an Authorization header in the cloned
        # repo's LOCAL config. That header is sent on EVERY git fetch from
        # github.com — including yarn's cross-repo dep fetches — and triggers
        # the same 404 on public repos. Strip it.
        git config --local --unset-all http."https://github.com/".extraheader || true

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.workspace }}/${{ inputs.working-directory }}
      env:
        NODE_AUTH_TOKEN: ${{ inputs.token }}
        GITHUB_TOKEN: ${{ inputs.token }}
      run: yarn install --frozen-lockfile
