name: Setup Node.js
description: Install Node.js via Volta-aware version detection with yarn dependency caching

inputs:
  node-version:
    description: Node.js version to install (default reads from package.json volta config)
    required: false
    default: ''
  working-directory:
    description: Directory containing package.json and yarn.lock
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - name: Detect Node version from package.json
      id: detect
      shell: bash
      env:
        INPUT_NODE_VERSION: ${{ inputs.node-version }}
      run: |
        if [ -n "$INPUT_NODE_VERSION" ]; then
          echo "version=$INPUT_NODE_VERSION" >> "$GITHUB_OUTPUT"
        else
          VERSION=$(jq -r '.volta.node // .engines.node // "22"' "$GITHUB_WORKSPACE/package.json" | tr -d '^~>=x ')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: ${{ steps.detect.outputs.version }}
        registry-url: 'https://npm.pkg.github.com'
        scope: '@sonarmd'

    - name: Get yarn cache directory
      id: yarn-cache
      shell: bash
      run: echo "dir=$(yarn cache dir)" >> "$GITHUB_OUTPUT"

    - name: Cache yarn dependencies
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: |
          ${{ steps.yarn-cache.outputs.dir }}
          ${{ inputs.working-directory }}/node_modules
        key: yarn-${{ runner.os }}-${{ hashFiles(format('{0}/yarn.lock', inputs.working-directory)) }}
        restore-keys: |
          yarn-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.workspace }}/${{ inputs.working-directory }}
      env:
        NODE_AUTH_TOKEN: ${{ github.token }}
      run: yarn install --frozen-lockfile
