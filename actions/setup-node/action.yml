name: Setup Node.js
description: Install Node.js from package.json engines.node with yarn dependency caching

inputs:
  node-version:
    description: Node.js version to install (default reads from package.json volta config)
    required: false
    default: ''
  working-directory:
    description: Directory containing package.json and yarn.lock
    required: false
    default: '.'
  token:
    description: |
      GitHub token used for private git+https:// dependencies and GitHub
      Packages auth.  Defaults to github.token (current-repo scope only).
      Pass a PAT with org-wide read access to resolve private cross-repo deps.
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Detect Node version from package.json
      id: detect
      shell: bash
      env:
        INPUT_NODE_VERSION: ${{ inputs.node-version }}
      run: |
        if [ -n "$INPUT_NODE_VERSION" ]; then
          echo "version=$INPUT_NODE_VERSION" >> "$GITHUB_OUTPUT"
        else
          VERSION=$(jq -r '.engines.node // "24"' "$GITHUB_WORKSPACE/package.json" | tr -d '^~>=x ')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ steps.detect.outputs.version }}
        registry-url: 'https://npm.pkg.github.com'
        scope: '@sonarmd'

    # No actions/cache restore — yarn v1 + cache restore has a known race
    # where the integrity dir is repopulated from the tarball but yarn install
    # still tries to mkdir() the same paths and dies with EEXIST. `yarn cache
    # clean` does not fully clear v6 integrity dirs. We pay the cold-cache
    # cost (~30s) for build determinism. If/when caching is reintroduced,
    # it must `rm -rf $(yarn cache dir) node_modules` before install.
    - name: Nuke any stale yarn cache and node_modules
      shell: bash
      working-directory: ${{ github.workspace }}/${{ inputs.working-directory }}
      run: |
        rm -rf "$(yarn cache dir)" node_modules
        yarn cache clean --force 2>/dev/null || true

    - name: Rewrite SSH GitHub deps — sonarmd authenticated, others public HTTPS
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        # SSH URLs in package.json need to resolve over HTTPS in CI since
        # runners have no SSH key.
        #
        # sonarmd/* repos are private — inject the token only for that org.
        # Other (public) repos use unauthenticated HTTPS to avoid the GitHub
        # quirk where a token without access to a public repo returns 404.
        git config --global url."https://x-access-token:${GH_TOKEN}@github.com/sonarmd/".insteadOf "ssh://git@github.com/sonarmd/"
        git config --global url."https://x-access-token:${GH_TOKEN}@github.com/sonarmd/".insteadOf "git@github.com:sonarmd/"
        git config --global url."https://x-access-token:${GH_TOKEN}@github.com/sonarmd/".insteadOf "https://github.com/sonarmd/"

        # Catch-all for non-sonarmd hosts: unauthenticated HTTPS.
        git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
        git config --global url."https://github.com/".insteadOf "git@github.com:"

        # actions/checkout persists an Authorization header in the cloned
        # repo's LOCAL config. That header is sent on EVERY git fetch from
        # github.com — including yarn's cross-repo dep fetches — and triggers
        # the same 404 on public repos. Strip it in favor of the scoped
        # url.insteadOf rewrites above.
        git config --local --unset-all http."https://github.com/".extraheader || true

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.workspace }}/${{ inputs.working-directory }}
      env:
        NODE_AUTH_TOKEN: ${{ inputs.token }}
        GITHUB_TOKEN: ${{ inputs.token }}
      # --network-concurrency 1: yarn v1 has a documented race where parallel
      # tarball downloads + extraction occasionally corrupt the cache integrity
      # dir (ENOENT/EEXIST mid-extract). Serializing fetches eliminates it.
      run: yarn install --network-concurrency 1
