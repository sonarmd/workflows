name: Create Tag
description: Creates a git tag on the current commit. Idempotent — no-ops if the tag already exists.

inputs:
  tag:
    description: 'Tag name to create (e.g. stg-api-v1.2.3-b7).'
    required: true

outputs:
  tag:
    description: 'Confirmed tag name.'
    value: ${{ steps.tag.outputs.tag }}

runs:
  using: composite
  steps:
    - name: Create tag
      id: tag
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
      env:
        TAG: ${{ inputs.tag }}
      with:
        script: |
          const tag = process.env.TAG;
          const { owner, repo } = context.repo;

          try {
            await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
            core.notice(`create-tag: tag '${tag}' already exists`);
          } catch (e) {
            if (e.status !== 404) throw e;
            await github.rest.git.createRef({
              owner, repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha,
            });
            core.info(`create-tag: created tag ${tag}`);
          }

          core.setOutput('tag', tag);
