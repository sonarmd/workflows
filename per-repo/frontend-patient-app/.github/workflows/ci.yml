name: CI

# frontend-patient-app CI — React Native / Expo app.
#
# Delegates entirely to ci-universal. This project has no CI build step:
# production builds are handled by EAS on tag push (see eas-preview.yml,
# eas-production.yml). The gate accepts build_result='skipped' for mobile repos.
#
# CODEOWNERS protects this file — changes require @sonarmd/platform-eng approval.

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master, 'release/**']
  merge_group:
    branches: [master, 'release/**']

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: sonarmd/workflows/.github/workflows/ci-universal.yml@main
    with:
      node_version:      '22'
      lint_command:      yarn lint
      typecheck_command: npx tsc --noEmit
      test_command:      yarn test --ci --passWithNoTests
      # build_command omitted — EAS handles builds on tag push
