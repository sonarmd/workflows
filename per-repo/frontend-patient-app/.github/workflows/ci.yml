name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [staging, master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '22'

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '22'

      - name: Test
        run: yarn test --ci --passWithNoTests
