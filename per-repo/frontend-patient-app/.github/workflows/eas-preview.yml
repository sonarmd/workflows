name: EAS Preview Build

on:
  push:
    tags: ['stg-mobile-*']

concurrency:
  group: eas-preview
  cancel-in-progress: false

jobs:
  started:
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.ts.outputs.timestamp }}
    steps:
      - id: ts
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

  build:
    uses: sonarmd/workflows/.github/workflows/deploy-eas-build.yml@main
    with:
      profile: preview
      platform: all
      auto-submit: false
      environment: stg
      node-version: '22'
      deploy-tag: ${{ github.ref_name }}
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

  notify:
    needs: [build, started]
    if: always()
    uses: sonarmd/workflows/.github/workflows/notify-slack.yml@main
    with:
      status: ${{ needs.build.result }}
      environment: stg
      app-name: patient-mobile
      tag: ${{ github.ref_name }}
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

  metrics:
    needs: [build, started]
    if: always()
    uses: sonarmd/workflows/.github/workflows/metrics-collector.yml@main
    with:
      repo: sonarmd/frontend-patient-app
      environment: stg
      tag: ${{ github.ref_name }}
      status: ${{ needs.build.result }}
      started: ${{ needs.started.outputs.timestamp }}
      aws-role-arn: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
    permissions:
      id-token: write
      contents: read
