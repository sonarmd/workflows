name: EAS Preview Build

on:
  push:
    tags: ['stg-mobile-*']

concurrency:
  group: eas-preview
  cancel-in-progress: false

jobs:
  build:
    uses: sonarmd/workflows/.github/workflows/deploy-eas-build.yml@main
    with:
      profile: preview
      platform: all
      auto-submit: false
      environment: stg
      node-version: '22'
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  notify:
    needs: [build]
    if: always()
    uses: sonarmd/workflows/.github/workflows/notify-slack.yml@main
    with:
      status: ${{ needs.build.result }}
      environment: stg
      app-name: patient-mobile
      tag: ${{ github.ref_name }}
    secrets:
      SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
