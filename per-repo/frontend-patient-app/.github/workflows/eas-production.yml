name: EAS Production Build + Submit

on:
  push:
    tags: ['prd-mobile-*']

concurrency:
  group: eas-production
  cancel-in-progress: false

jobs:
  build:
    uses: sonarmd/workflows/.github/workflows/deploy-eas-build.yml@main
    with:
      profile: production
      platform: all
      auto-submit: true
      environment: prd
      node-version: '22'
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  notify:
    needs: [build]
    if: always()
    uses: sonarmd/workflows/.github/workflows/notify-slack.yml@main
    with:
      status: ${{ needs.build.result }}
      environment: prd
      app-name: patient-mobile
      tag: ${{ github.ref_name }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
