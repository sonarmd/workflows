name: Break-Glass EAS Build

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - stg
          - prd
      profile:
        description: EAS build profile
        required: true
        type: choice
        options:
          - preview
          - production
      auto_submit:
        description: Auto-submit to app stores
        required: false
        type: boolean
        default: false
      tag_override:
        description: Specific tag or SHA to build (optional)
        required: false
        type: string
      skip_tests:
        description: Skip test suite (emergency only)
        required: false
        type: boolean
        default: false
      reason:
        description: Reason for break-glass build (required for audit trail)
        required: true
        type: string

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Log break-glass event
        run: |
          echo "### Break-Glass EAS Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Actor**: ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Environment**: ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Profile**: ${{ inputs.profile }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Auto-submit**: ${{ inputs.auto_submit }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag/SHA**: ${{ inputs.tag_override || github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Skip Tests**: ${{ inputs.skip_tests }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Reason**: ${{ inputs.reason }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Time**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_STEP_SUMMARY"

  tests:
    if: inputs.skip_tests != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_override || github.sha }}
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '22'
      - run: yarn lint
      - run: npx tsc --noEmit
      - run: yarn test --ci --passWithNoTests

  build:
    needs: [audit, tests]
    if: always() && needs.audit.result == 'success' && (needs.tests.result == 'success' || needs.tests.result == 'skipped')
    uses: sonarmd/workflows/.github/workflows/deploy-eas-build.yml@main
    with:
      profile: ${{ inputs.profile }}
      platform: all
      auto-submit: ${{ inputs.auto_submit }}
      environment: ${{ inputs.environment }}
      node-version: '22'
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  notify:
    needs: [build]
    if: always()
    uses: sonarmd/workflows/.github/workflows/notify-slack.yml@main
    with:
      status: ${{ needs.build.result }}
      environment: ${{ inputs.environment }}
      app-name: patient-mobile (break-glass)
      tag: ${{ inputs.tag_override || github.sha }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
