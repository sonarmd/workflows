name: Break-Glass Manual EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        type: choice
        options: [preview, production]
        required: true
      platform:
        description: Target platform
        type: choice
        options: [all, ios, android]
        default: all
      auto_submit:
        description: Auto-submit to stores (production only)
        type: boolean
        default: false
      reason:
        description: Reason for break-glass build (required for audit trail)
        type: string
        required: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Log break-glass event
        run: |
          echo "### Break-Glass EAS Build" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Actor**: ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Profile**: ${{ github.event.inputs.profile }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Platform**: ${{ github.event.inputs.platform }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Auto-Submit**: ${{ github.event.inputs.auto_submit }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Reason**: ${{ github.event.inputs.reason }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Time**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_STEP_SUMMARY"

  build:
    needs: [audit]
    uses: sonarmd/workflows/.github/workflows/deploy-eas-build.yml@main
    with:
      profile: ${{ github.event.inputs.profile }}
      platform: ${{ github.event.inputs.platform }}
      auto-submit: ${{ github.event.inputs.auto_submit == 'true' }}
      environment: ${{ github.event.inputs.profile == 'production' && 'prd' || 'stg' }}
      node-version: '22'
      deploy-tag: break-glass-${{ github.sha }}
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

  notify:
    needs: [build]
    if: always()
    uses: sonarmd/workflows/.github/workflows/notify-slack.yml@main
    with:
      status: ${{ needs.build.result }}
      environment: ${{ github.event.inputs.profile == 'production' && 'prd' || 'stg' }}
      app-name: patient-mobile (break-glass)
      tag: ${{ github.sha }}
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
