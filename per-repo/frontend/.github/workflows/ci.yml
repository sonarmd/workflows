name: CI

# frontend monorepo requires custom CI because:
#   - Path filtering: only test apps that actually changed
#   - Workspace caching: build shared lib once, restore across 5 app test jobs
#   - NODE_OPTIONS: --openssl-legacy-provider (legacy React build compatibility)
#
# The gate job handles two cases:
#   - Changes detected: validates lint + tests passed
#   - No changes detected: auto-passes (nothing to verify)
#
# CODEOWNERS protects this file — changes require @sonarmd/platform-eng approval.

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master, 'release/**']
  merge_group:
    branches: [master, 'release/**']

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: --openssl-legacy-provider

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      admin:   ${{ steps.filter.outputs.admin }}
      patient: ${{ steps.filter.outputs.patient }}
      provider: ${{ steps.filter.outputs.provider }}
      seat:    ${{ steps.filter.outputs.seat }}
      shared:  ${{ steps.filter.outputs.shared }}
      any:     ${{ steps.filter.outputs.any }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: sonarmd/workflows/actions/detect-changed-apps@main
        id: filter

  deps:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: yarn build-shared
      - uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: .
          key: workspace-${{ github.sha }}

  test-shared:
    needs: [deps, detect-changes]
    if: needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: .
          key: workspace-${{ github.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '18'
      - run: cd shared && yarn test --reporters=default --reporters=jest-junit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-shared
          path: shared/junit.xml
          if-no-files-found: warn

  test-admin:
    needs: [deps, detect-changes]
    if: needs.detect-changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: .
          key: workspace-${{ github.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '18'
      - run: cd admin && yarn test --reporters=default --reporters=jest-junit
      - run: cd admin && yarn cypress
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-admin
          path: admin/junit.xml
          if-no-files-found: warn

  test-patient:
    needs: [deps, detect-changes]
    if: needs.detect-changes.outputs.patient == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: .
          key: workspace-${{ github.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '18'
      - run: cd patient && yarn test --reporters=default --reporters=jest-junit
      - run: cd patient && yarn cypress
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-patient
          path: patient/junit.xml
          if-no-files-found: warn

  test-provider:
    needs: [deps, detect-changes]
    if: needs.detect-changes.outputs.provider == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: .
          key: workspace-${{ github.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '18'
      - run: cd provider && yarn test --reporters=default --reporters=jest-junit
      - run: cd provider && yarn cypress
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-provider
          path: provider/junit.xml
          if-no-files-found: warn

  test-seat:
    needs: [deps, detect-changes]
    if: needs.detect-changes.outputs.seat == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: .
          key: workspace-${{ github.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '18'
      - run: cd seat && yarn test --reporters=default --reporters=jest-junit
      - run: cd seat && yarn cypress
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-seat
          path: seat/junit.xml
          if-no-files-found: warn

  lint:
    needs: [deps, detect-changes]
    if: needs.detect-changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      file_count: ${{ steps.run.outputs.file_count }}
    steps:
      - uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: .
          key: workspace-${{ github.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '18'
      - name: Lint
        id: run
        run: |
          FILE_COUNT=$(find admin patient provider seat shared -type f \( -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.jsx' \) 2>/dev/null | wc -l | tr -d ' ')
          echo "file_count=$FILE_COUNT" >> "$GITHUB_OUTPUT"
          yarn lint

  # Aggregates all results into single values for the gates.
  # Handles the monorepo path-filtering case: if no apps changed, everything
  # is 'skipped' — we auto-pass. Change detection itself is the evidence, so we
  # upload a synthetic JUnit XML for the test gate to verify.
  summarize:
    needs: [detect-changes, lint, test-shared, test-admin, test-patient, test-provider, test-seat]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      lint_result:     ${{ steps.aggregate.outputs.lint_result }}
      lint_file_count: ${{ steps.aggregate.outputs.lint_file_count }}
      test_result:     ${{ steps.aggregate.outputs.test_result }}
    steps:
      - name: Aggregate results
        id: aggregate
        env:
          ANY_CHANGES:     ${{ needs.detect-changes.outputs.any }}
          LINT_RESULT:     ${{ needs.lint.result }}
          LINT_FILE_COUNT: ${{ needs.lint.outputs.file_count }}
          SHARED_RESULT:   ${{ needs.test-shared.result }}
          ADMIN_RESULT:    ${{ needs.test-admin.result }}
          PATIENT_RESULT:  ${{ needs.test-patient.result }}
          PROVIDER_RESULT: ${{ needs.test-provider.result }}
          SEAT_RESULT:     ${{ needs.test-seat.result }}
        run: |
          set -euo pipefail

          # No changes to any frontend app — auto-pass.
          # Change detection at this SHA verified nothing to check.
          if [[ "$ANY_CHANGES" != "true" ]]; then
            echo "No frontend changes detected — auto-passing"
            echo "lint_result=success"   >> "$GITHUB_OUTPUT"
            echo "lint_file_count=1"     >> "$GITHUB_OUTPUT"
            echo "test_result=success"   >> "$GITHUB_OUTPUT"

            # Synthetic JUnit XML — the test gate needs an artifact to parse.
            # Change detection is the evidence: no frontend code changed at this SHA.
            cat > no-changes-report.xml <<'XML'
          <?xml version="1.0"?>
          <testsuites>
            <testsuite name="change-detection" tests="1" failures="0">
              <testcase name="no-frontend-changes-detected" classname="ci.change-detection"/>
            </testsuite>
          </testsuites>
          XML
            exit 0
          fi

          # Lint result and file count pass through directly.
          echo "lint_result=$LINT_RESULT" >> "$GITHUB_OUTPUT"
          echo "lint_file_count=${LINT_FILE_COUNT:-0}" >> "$GITHUB_OUTPUT"

          # Tests: each app job is conditional (only runs if that app changed).
          # 'skipped' = app didn't change (legitimate). Only 'failure' or 'cancelled' blocks.
          TEST_RESULT=success
          for result in "$SHARED_RESULT" "$ADMIN_RESULT" "$PATIENT_RESULT" "$PROVIDER_RESULT" "$SEAT_RESULT"; do
            case "$result" in
              success|skipped) ;;
              *) TEST_RESULT=failure ;;
            esac
          done
          echo "test_result=$TEST_RESULT" >> "$GITHUB_OUTPUT"

      # Upload synthetic test report when no changes detected.
      # When changes ARE detected, each test job uploads its own report artifact.
      - name: Upload synthetic test report (no changes)
        if: needs.detect-changes.outputs.any != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: no-changes-report.xml

  # Static analysis gate — validates lint passed with evidence.
  static-analysis-gate:
    needs: [summarize]
    if: always()
    uses: sonarmd/workflows/.github/workflows/static-analysis-gate.yml@main
    with:
      lint_result:     ${{ needs.summarize.outputs.lint_result }}
      lint_file_count: ${{ needs.summarize.outputs.lint_file_count }}

  # Test gate — downloads JUnit XML from all test jobs (test-report-*),
  # independently counts <testcase> elements. Does NOT trust caller counts.
  # When no changes detected, the summarize job uploads a synthetic report.
  test-gate:
    needs: [summarize]
    if: always()
    uses: sonarmd/workflows/.github/workflows/test-gate.yml@main
    with:
      test_result: ${{ needs.summarize.outputs.test_result }}
