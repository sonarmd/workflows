name: Deploy — Production

on:
  push:
    tags: ['prd-fe-*']

permissions: {}

concurrency:
  group: deploy-prd-frontend
  cancel-in-progress: false

env:
  NODE_OPTIONS: --openssl-legacy-provider

jobs:
  build-admin:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: yarn build-shared
      - name: Build admin app
        env:
          REACT_APP_VERSION: ${{ github.ref_name }}
        run: REACT_APP_VERSION="$REACT_APP_VERSION" yarn build-admin-prd
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: admin-build
          path: admin/build/
          retention-days: 30

  build-patient:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: yarn build-shared
      - name: Build patient app
        env:
          REACT_APP_VERSION: ${{ github.ref_name }}
        run: REACT_APP_VERSION="$REACT_APP_VERSION" yarn build-patient-prd
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: patient-build
          path: patient/build/
          retention-days: 30

  build-provider:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: yarn build-shared
      - name: Build provider app
        env:
          REACT_APP_VERSION: ${{ github.ref_name }}
        run: REACT_APP_VERSION="$REACT_APP_VERSION" yarn build-provider-prd
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: provider-build
          path: provider/build/
          retention-days: 30

  build-seat:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: yarn build-shared
      - name: Build seat app
        env:
          REACT_APP_VERSION: ${{ github.ref_name }}
        run: REACT_APP_VERSION="$REACT_APP_VERSION" yarn build-seat-prd
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: seat-build
          path: seat/build/
          retention-days: 30

  deploy-admin:
    needs: [build-admin]
    uses: sonarmd/workflows/.github/workflows/deploy-s3-cloudfront.yml@main
    with:
      app-name: admin
      bucket: admin.sonarmd.com
      build-artifact-name: admin-build
      distribution-id: ${{ vars.CF_DIST_ADMIN_PRD }}
      environment: prd
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  deploy-patient:
    needs: [build-patient]
    uses: sonarmd/workflows/.github/workflows/deploy-s3-cloudfront.yml@main
    with:
      app-name: patient
      bucket: my.sonarmd.com
      build-artifact-name: patient-build
      distribution-id: ${{ vars.CF_DIST_PATIENT_PRD }}
      environment: prd
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  deploy-provider:
    needs: [build-provider]
    uses: sonarmd/workflows/.github/workflows/deploy-s3-cloudfront.yml@main
    with:
      app-name: provider
      bucket: care.sonarmd.com
      build-artifact-name: provider-build
      distribution-id: ${{ vars.CF_DIST_PROVIDER_PRD }}
      environment: prd
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  deploy-seat:
    needs: [build-seat]
    uses: sonarmd/workflows/.github/workflows/deploy-s3-cloudfront.yml@main
    with:
      app-name: seat
      bucket: seat.sonarmd.com
      build-artifact-name: seat-build
      distribution-id: ${{ vars.CF_DIST_SEAT_PRD }}
      environment: prd
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  notify:
    needs: [deploy-admin, deploy-patient, deploy-provider, deploy-seat]
    if: always()
    uses: sonarmd/workflows/.github/workflows/notify-slack.yml@main
    with:
      status: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
      environment: prd
      app-name: frontend
      tag: ${{ github.ref_name }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  metrics:
    needs: [deploy-admin, deploy-patient, deploy-provider, deploy-seat]
    if: always()
    permissions:
      id-token: write
      contents: read
    uses: sonarmd/workflows/.github/workflows/metrics-collector.yml@main
    with:
      repo: sonarmd/frontend
      environment: prd
      tag: ${{ github.ref_name }}
      status: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
      started: ${{ github.event.head_commit.timestamp }}
      aws-role-arn: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
