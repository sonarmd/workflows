name: Deploy

# Single deploy workflow for all environments — frontend monorepo.
# Environment is derived from the tag prefix. All 4 apps build and deploy
# every time — no path filtering on deploy (consistency across all apps matters).
#
# Tag format:
#   dev-fe-<version>   →  deploy to dev     (S3, no CloudFront)
#   stg-fe-<version>   →  deploy to staging (S3 + CloudFront)
#   prd-fe-<version>   →  deploy to production (GitHub Environment approval)

on:
  push:
    tags:
      - 'dev-fe-*'
      - 'stg-fe-*'
      - 'prd-fe-*'

permissions: {}

concurrency:
  group: deploy-frontend-${{ github.ref_name }}
  cancel-in-progress: false

env:
  NODE_OPTIONS: --openssl-legacy-provider

jobs:
  # Parses tag prefix → all env-specific values in one place.
  # Every downstream job consumes these outputs — no env logic anywhere else.
  setup:
    timeout-minutes: 10
    name: Resolve environment
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      env:             ${{ steps.parse.outputs.env }}
      build-suffix:    ${{ steps.parse.outputs.build-suffix }}
      slack-channel:   ${{ steps.parse.outputs.slack-channel }}
      collect-metrics: ${{ steps.parse.outputs.collect-metrics }}
      bucket-admin:    ${{ steps.parse.outputs.bucket-admin }}
      bucket-patient:  ${{ steps.parse.outputs.bucket-patient }}
      bucket-provider: ${{ steps.parse.outputs.bucket-provider }}
      bucket-seat:     ${{ steps.parse.outputs.bucket-seat }}
      cf-admin:        ${{ steps.parse.outputs.cf-admin }}
      cf-patient:      ${{ steps.parse.outputs.cf-patient }}
      cf-provider:     ${{ steps.parse.outputs.cf-provider }}
      cf-seat:         ${{ steps.parse.outputs.cf-seat }}
    steps:
      - id: parse
        name: Parse tag → environment
        env:
          # CloudFront IDs live in GitHub repo variables — injected here once.
          CF_ADMIN_STG:    ${{ vars.CF_DIST_ADMIN_STG }}
          CF_ADMIN_PRD:    ${{ vars.CF_DIST_ADMIN_PRD }}
          CF_PATIENT_STG:  ${{ vars.CF_DIST_PATIENT_STG }}
          CF_PATIENT_PRD:  ${{ vars.CF_DIST_PATIENT_PRD }}
          CF_PROVIDER_STG: ${{ vars.CF_DIST_PROVIDER_STG }}
          CF_PROVIDER_PRD: ${{ vars.CF_DIST_PROVIDER_PRD }}
          CF_SEAT_STG:     ${{ vars.CF_DIST_SEAT_STG }}
          CF_SEAT_PRD:     ${{ vars.CF_DIST_SEAT_PRD }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          case "$TAG" in
            dev-fe-*)
              echo "env=dev"                              >> "$GITHUB_OUTPUT"
              echo "build-suffix=dev"                     >> "$GITHUB_OUTPUT"
              echo "slack-channel=#ops-dev"               >> "$GITHUB_OUTPUT"
              echo "collect-metrics=false"                >> "$GITHUB_OUTPUT"
              echo "bucket-admin=admin.dev.sonarmd.com"   >> "$GITHUB_OUTPUT"
              echo "bucket-patient=my.dev.sonarmd.com"    >> "$GITHUB_OUTPUT"
              echo "bucket-provider=care.dev.sonarmd.com" >> "$GITHUB_OUTPUT"
              echo "bucket-seat=seat.dev.sonarmd.com"     >> "$GITHUB_OUTPUT"
              echo "cf-admin="    >> "$GITHUB_OUTPUT"
              echo "cf-patient="  >> "$GITHUB_OUTPUT"
              echo "cf-provider=" >> "$GITHUB_OUTPUT"
              echo "cf-seat="     >> "$GITHUB_OUTPUT"
              ;;
            stg-fe-*)
              echo "env=stg"                              >> "$GITHUB_OUTPUT"
              echo "build-suffix=stg"                     >> "$GITHUB_OUTPUT"
              echo "slack-channel=#ops"                   >> "$GITHUB_OUTPUT"
              echo "collect-metrics=true"                 >> "$GITHUB_OUTPUT"
              echo "bucket-admin=admin.stg.sonarmd.com"   >> "$GITHUB_OUTPUT"
              echo "bucket-patient=my.stg.sonarmd.com"    >> "$GITHUB_OUTPUT"
              echo "bucket-provider=care.stg.sonarmd.com" >> "$GITHUB_OUTPUT"
              echo "bucket-seat=seat.stg.sonarmd.com"     >> "$GITHUB_OUTPUT"
              echo "cf-admin=$CF_ADMIN_STG"       >> "$GITHUB_OUTPUT"
              echo "cf-patient=$CF_PATIENT_STG"   >> "$GITHUB_OUTPUT"
              echo "cf-provider=$CF_PROVIDER_STG" >> "$GITHUB_OUTPUT"
              echo "cf-seat=$CF_SEAT_STG"         >> "$GITHUB_OUTPUT"
              ;;
            prd-fe-*)
              echo "env=prd"                              >> "$GITHUB_OUTPUT"
              echo "build-suffix=prd"                     >> "$GITHUB_OUTPUT"
              echo "slack-channel=#ops"                   >> "$GITHUB_OUTPUT"
              echo "collect-metrics=true"                 >> "$GITHUB_OUTPUT"
              echo "bucket-admin=admin.sonarmd.com"       >> "$GITHUB_OUTPUT"
              echo "bucket-patient=my.sonarmd.com"        >> "$GITHUB_OUTPUT"
              echo "bucket-provider=care.sonarmd.com"     >> "$GITHUB_OUTPUT"
              echo "bucket-seat=seat.sonarmd.com"         >> "$GITHUB_OUTPUT"
              echo "cf-admin=$CF_ADMIN_PRD"       >> "$GITHUB_OUTPUT"
              echo "cf-patient=$CF_PATIENT_PRD"   >> "$GITHUB_OUTPUT"
              echo "cf-provider=$CF_PROVIDER_PRD" >> "$GITHUB_OUTPUT"
              echo "cf-seat=$CF_SEAT_PRD"         >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unrecognized tag format: $TAG"
              exit 1
              ;;
          esac
          echo "Resolved: env=$(grep ^env= $GITHUB_OUTPUT | cut -d= -f2)"

  # ── Build all 4 apps in parallel ──────────────────────────────────────────
  # Build script name is derived: yarn build-admin-dev, yarn build-admin-stg, etc.
  # GitHub Environment gates production deploys with approval.

  build-admin:
    timeout-minutes: 10
    needs: setup
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.env }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: yarn build-shared
      - run: REACT_APP_VERSION="${{ github.ref_name }}" yarn build-admin-${{ needs.setup.outputs.build-suffix }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: admin-build
          path: admin/build/
          retention-days: 7

  build-patient:
    timeout-minutes: 10
    needs: setup
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.env }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: yarn build-shared
      - run: REACT_APP_VERSION="${{ github.ref_name }}" yarn build-patient-${{ needs.setup.outputs.build-suffix }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: patient-build
          path: patient/build/
          retention-days: 7

  build-provider:
    timeout-minutes: 10
    needs: setup
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.env }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: yarn build-shared
      - run: REACT_APP_VERSION="${{ github.ref_name }}" yarn build-provider-${{ needs.setup.outputs.build-suffix }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: provider-build
          path: provider/build/
          retention-days: 7

  build-seat:
    timeout-minutes: 10
    needs: setup
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.env }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: yarn build-shared
      - run: REACT_APP_VERSION="${{ github.ref_name }}" yarn build-seat-${{ needs.setup.outputs.build-suffix }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: seat-build
          path: seat/build/
          retention-days: 7

  # ── Build gate — validates all 4 builds passed ────────────────────────────

  summarize-builds:
    timeout-minutes: 10
    needs: [build-admin, build-patient, build-provider, build-seat]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      build_result: ${{ steps.aggregate.outputs.build_result }}
    steps:
      - name: Aggregate build results
        id: aggregate
        env:
          ADMIN:    ${{ needs.build-admin.result }}
          PATIENT:  ${{ needs.build-patient.result }}
          PROVIDER: ${{ needs.build-provider.result }}
          SEAT:     ${{ needs.build-seat.result }}
        run: |
          set -euo pipefail
          RESULT=success
          for r in "$ADMIN" "$PATIENT" "$PROVIDER" "$SEAT"; do
            case "$r" in
              success) ;;
              *) RESULT=failure ;;
            esac
          done
          echo "build_result=$RESULT" >> "$GITHUB_OUTPUT"

  build-gate:
    timeout-minutes: 10
    needs: [summarize-builds]
    if: always()
    uses: sonarmd/workflows/.github/workflows/build-gate.yml@main
    with:
      build_result: ${{ needs.summarize-builds.outputs.build_result }}

  deploy-gate:
    timeout-minutes: 10
    needs: [build-gate]
    if: always()
    uses: sonarmd/workflows/.github/workflows/deploy-gate.yml@main
    with:
      # Deploy workflows are tag-triggered — CI gates already passed on the commit.
      # Pass 'success' since the tag would not exist without CI passing.
      static_analysis_gate_result: success
      test_gate_result:            success
      build_gate_result:           ${{ needs.build-gate.outputs.gate_result }}

  # ── Deploy all 4 apps in parallel ─────────────────────────────────────────
  # Same S3 sync pattern for every app. CloudFront invalidation runs only
  # when a distribution ID is set (empty string = skip = dev environment).

  deploy-admin:
    timeout-minutes: 10
    needs: [setup, build-admin, deploy-gate]
    if: needs.deploy-gate.outputs.gate_result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: admin-build
          path: build/
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
      - name: Sync to S3
        env:
          BUCKET: ${{ needs.setup.outputs.bucket-admin }}
        run: |
          aws s3 sync build/ "s3://$BUCKET" \
            --cache-control "max-age=604800, public" \
            --exclude "index.html" --exclude "asset-manifest.json"
          aws s3api put-object --bucket "$BUCKET" --key index.html \
            --body build/index.html \
            --cache-control "max-age=300, public" --content-type text/html
          aws s3api put-object --bucket "$BUCKET" --key asset-manifest.json \
            --body build/asset-manifest.json \
            --cache-control "max-age=300, public" --content-type application/json
      - name: Invalidate CloudFront
        if: needs.setup.outputs.cf-admin != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ needs.setup.outputs.cf-admin }}" \
            --paths "/index.html" "/asset-manifest.json"

  deploy-patient:
    timeout-minutes: 10
    needs: [setup, build-patient, deploy-gate]
    if: needs.deploy-gate.outputs.gate_result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: patient-build
          path: build/
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
      - name: Sync to S3
        env:
          BUCKET: ${{ needs.setup.outputs.bucket-patient }}
        run: |
          aws s3 sync build/ "s3://$BUCKET" \
            --cache-control "max-age=604800, public" \
            --exclude "index.html" --exclude "asset-manifest.json"
          aws s3api put-object --bucket "$BUCKET" --key index.html \
            --body build/index.html \
            --cache-control "max-age=300, public" --content-type text/html
          aws s3api put-object --bucket "$BUCKET" --key asset-manifest.json \
            --body build/asset-manifest.json \
            --cache-control "max-age=300, public" --content-type application/json
      - name: Invalidate CloudFront
        if: needs.setup.outputs.cf-patient != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ needs.setup.outputs.cf-patient }}" \
            --paths "/index.html" "/asset-manifest.json"

  deploy-provider:
    timeout-minutes: 10
    needs: [setup, build-provider, deploy-gate]
    if: needs.deploy-gate.outputs.gate_result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: provider-build
          path: build/
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
      - name: Sync to S3
        env:
          BUCKET: ${{ needs.setup.outputs.bucket-provider }}
        run: |
          aws s3 sync build/ "s3://$BUCKET" \
            --cache-control "max-age=604800, public" \
            --exclude "index.html" --exclude "asset-manifest.json"
          aws s3api put-object --bucket "$BUCKET" --key index.html \
            --body build/index.html \
            --cache-control "max-age=300, public" --content-type text/html
          aws s3api put-object --bucket "$BUCKET" --key asset-manifest.json \
            --body build/asset-manifest.json \
            --cache-control "max-age=300, public" --content-type application/json
      - name: Invalidate CloudFront
        if: needs.setup.outputs.cf-provider != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ needs.setup.outputs.cf-provider }}" \
            --paths "/index.html" "/asset-manifest.json"

  deploy-seat:
    timeout-minutes: 10
    needs: [setup, build-seat, deploy-gate]
    if: needs.deploy-gate.outputs.gate_result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: seat-build
          path: build/
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
      - name: Sync to S3
        env:
          BUCKET: ${{ needs.setup.outputs.bucket-seat }}
        run: |
          aws s3 sync build/ "s3://$BUCKET" \
            --cache-control "max-age=604800, public" \
            --exclude "index.html" --exclude "asset-manifest.json"
          aws s3api put-object --bucket "$BUCKET" --key index.html \
            --body build/index.html \
            --cache-control "max-age=300, public" --content-type text/html
          aws s3api put-object --bucket "$BUCKET" --key asset-manifest.json \
            --body build/asset-manifest.json \
            --cache-control "max-age=300, public" --content-type application/json
      - name: Invalidate CloudFront
        if: needs.setup.outputs.cf-seat != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ needs.setup.outputs.cf-seat }}" \
            --paths "/index.html" "/asset-manifest.json"

  notify:
    timeout-minutes: 10
    needs: [setup, deploy-admin, deploy-patient, deploy-provider, deploy-seat]
    if: always()
    uses: sonarmd/workflows/.github/workflows/notify-slack.yml@main
    with:
      status:      ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
      environment: ${{ needs.setup.outputs.env }}
      app-name:    frontend
      tag:         ${{ github.ref_name }}
      channel:     ${{ needs.setup.outputs.slack-channel }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  metrics:
    timeout-minutes: 10
    needs: [setup, deploy-admin, deploy-patient, deploy-provider, deploy-seat]
    if: always() && needs.setup.outputs.collect-metrics == 'true'
    uses: sonarmd/workflows/.github/workflows/metrics-collector.yml@main
    permissions:
      id-token: write
      contents: read
    with:
      repo:        sonarmd/frontend
      environment: ${{ needs.setup.outputs.env }}
      tag:         ${{ github.ref_name }}
      status:      ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
      started:     ${{ github.event.head_commit.timestamp }}
      aws-role-arn: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
