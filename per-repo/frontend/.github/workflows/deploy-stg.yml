name: Deploy — Staging

on:
  push:
    tags: ['stg-fe-*']

concurrency:
  group: deploy-stg-frontend
  cancel-in-progress: false

env:
  NODE_OPTIONS: --openssl-legacy-provider

jobs:
  build-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: yarn build-shared
      - run: REACT_APP_VERSION=${{ github.ref_name }} yarn build-admin-stg
      - uses: actions/upload-artifact@v4
        with:
          name: admin-build
          path: admin/build/
          retention-days: 7

  build-patient:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: yarn build-shared
      - run: REACT_APP_VERSION=${{ github.ref_name }} yarn build-patient-stg
      - uses: actions/upload-artifact@v4
        with:
          name: patient-build
          path: patient/build/
          retention-days: 7

  build-provider:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: yarn build-shared
      - run: REACT_APP_VERSION=${{ github.ref_name }} yarn build-provider-stg
      - uses: actions/upload-artifact@v4
        with:
          name: provider-build
          path: provider/build/
          retention-days: 7

  build-seat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: yarn build-shared
      - run: REACT_APP_VERSION=${{ github.ref_name }} yarn build-seat-stg
      - uses: actions/upload-artifact@v4
        with:
          name: seat-build
          path: seat/build/
          retention-days: 7

  deploy-admin:
    needs: [build-admin]
    uses: sonarmd/workflows/.github/workflows/deploy-s3-cloudfront.yml@main
    with:
      app-name: admin
      bucket: admin.stg.sonarmd.com
      build-artifact-name: admin-build
      distribution-id: ${{ vars.CF_DIST_ADMIN_STG }}
      environment: stg
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  deploy-patient:
    needs: [build-patient]
    uses: sonarmd/workflows/.github/workflows/deploy-s3-cloudfront.yml@main
    with:
      app-name: patient
      bucket: my.stg.sonarmd.com
      build-artifact-name: patient-build
      distribution-id: ${{ vars.CF_DIST_PATIENT_STG }}
      environment: stg
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  deploy-provider:
    needs: [build-provider]
    uses: sonarmd/workflows/.github/workflows/deploy-s3-cloudfront.yml@main
    with:
      app-name: provider
      bucket: care.stg.sonarmd.com
      build-artifact-name: provider-build
      distribution-id: ${{ vars.CF_DIST_PROVIDER_STG }}
      environment: stg
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  deploy-seat:
    needs: [build-seat]
    uses: sonarmd/workflows/.github/workflows/deploy-s3-cloudfront.yml@main
    with:
      app-name: seat
      bucket: seat.stg.sonarmd.com
      build-artifact-name: seat-build
      distribution-id: ${{ vars.CF_DIST_SEAT_STG }}
      environment: stg
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  notify:
    needs: [deploy-admin, deploy-patient, deploy-provider, deploy-seat]
    if: always()
    uses: sonarmd/workflows/.github/workflows/notify-slack.yml@main
    with:
      status: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
      environment: stg
      app-name: frontend
      tag: ${{ github.ref_name }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  metrics:
    needs: [deploy-admin, deploy-patient, deploy-provider, deploy-seat]
    if: always()
    uses: sonarmd/workflows/.github/workflows/metrics-collector.yml@main
    with:
      repo: sonarmd/frontend
      environment: stg
      tag: ${{ github.ref_name }}
      status: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
      started: ${{ github.event.head_commit.timestamp }}
      aws-role-arn: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
    permissions:
      id-token: write
      contents: read
