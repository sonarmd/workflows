name: Deploy

# Verify CI attestation and notify Slack for Ansible/Hubot pickup.
# Does NOT deploy directly — Hubot handles the actual deploy.

on:
  push:
    branches: [staging]
    tags: ['v*']

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/staging'
    uses: sonarmd/workflows/.github/workflows/deploy.yml@main
    with:
      environment: dev
      app_name: triggr_api
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-stg:
    if: startsWith(github.ref, 'refs/tags/v')
    uses: sonarmd/workflows/.github/workflows/deploy.yml@main
    with:
      environment: stg
      app_name: triggr_api
      version: ${{ github.ref_name }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
