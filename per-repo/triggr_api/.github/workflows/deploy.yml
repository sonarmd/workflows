name: Deploy

on:
  push:
    branches: [dev, staging, master]

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: sudo apt-get update && sudo apt-get install -y graphicsmagick
      - run: yarn build

      - name: Package artifact
        run: tar czf /tmp/api.tar.gz ./

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-${{ github.sha }}
          path: /tmp/api.tar.gz
          retention-days: 30

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: sudo apt-get update && sudo apt-get install -y graphicsmagick
      - run: yarn lint

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    services:
      mongo:
        image: mongo:8.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: sudo apt-get update && sudo apt-get install -y graphicsmagick

      - name: Split test files
        id: tests
        run: |
          ALL_FILES=$(find test -name '*.ts' -type f | sort)
          TOTAL=$(echo "$ALL_FILES" | wc -l)
          SHARD=${{ matrix.shard }}
          SHARD_SIZE=$(( (TOTAL + 3) / 4 ))
          START=$(( SHARD * SHARD_SIZE + 1 ))
          TEST_FILES=$(echo "$ALL_FILES" | sed -n "${START},$(( START + SHARD_SIZE - 1 ))p" | tr '\n' ' ')
          echo "files=$TEST_FILES" >> "$GITHUB_OUTPUT"

      - name: Run tests (shard ${{ matrix.shard }})
        env:
          LOG_LEVEL: none
          TZ: utc
        run: |
          ./node_modules/.bin/mocha \
            --require @swc-node/register \
            --exit \
            --timeout 10000 \
            ${{ steps.tests.outputs.files }}

  # Skip-test deploy (matches CircleCI's deploy-dev-2 for branches matching *skip-test*)
  deploy-skip-test:
    needs: [build]
    if: contains(github.ref_name, 'skip-test')
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack (@r2-d2)
        run: |
          ARTIFACT_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sf -d "{\"channel\": \"#ops-dev\", \"text\": \"@r2-d2 deploy dev ${{ github.sha }} $ARTIFACT_URL\"}" \
            "https://hooks.slack.com/services/${{ secrets.SLACK_TOKEN }}" || true

  deploy:
    needs: [lint, test, build]
    if: github.ref_name == 'dev' || github.ref_name == 'staging' || github.ref_name == 'master'
    runs-on: ubuntu-latest
    steps:
      - name: Determine environment
        id: env
        run: |
          case "${{ github.ref_name }}" in
            dev)     echo "env=dev" >> "$GITHUB_OUTPUT"; echo "channel=#ops-dev" >> "$GITHUB_OUTPUT" ;;
            staging) echo "env=stg" >> "$GITHUB_OUTPUT"; echo "channel=#ops" >> "$GITHUB_OUTPUT" ;;
            master)  echo "env=prd" >> "$GITHUB_OUTPUT"; echo "channel=#ops" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Notify Slack (@r2-d2)
        run: |
          ENV="${{ steps.env.outputs.env }}"
          CHANNEL="${{ steps.env.outputs.channel }}"
          ARTIFACT_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -sf -d "{\"channel\": \"$CHANNEL\", \"text\": \"@r2-d2 deploy $ENV ${{ github.sha }} $ARTIFACT_URL\"}" \
            "https://hooks.slack.com/services/${{ secrets.SLACK_TOKEN }}" || true
