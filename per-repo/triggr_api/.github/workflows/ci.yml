name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [staging, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'

      - name: Install graphicsmagick
        run: sudo apt-get update && sudo apt-get install -y graphicsmagick

      - name: Lint
        run: yarn lint

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    services:
      mongo:
        image: mongo:8.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'

      - name: Install graphicsmagick
        run: sudo apt-get update && sudo apt-get install -y graphicsmagick

      - name: Collect test files
        id: tests
        run: |
          # Get all test files and split into 4 shards
          ALL_FILES=$(find test -name '*.ts' -type f | sort)
          TOTAL=$(echo "$ALL_FILES" | wc -l)
          SHARD=${{ matrix.shard }}
          SHARD_SIZE=$(( (TOTAL + 3) / 4 ))
          START=$(( SHARD * SHARD_SIZE + 1 ))

          TEST_FILES=$(echo "$ALL_FILES" | sed -n "${START},$(( START + SHARD_SIZE - 1 ))p" | tr '\n' ' ')
          echo "files=$TEST_FILES" >> "$GITHUB_OUTPUT"
          echo "Shard $SHARD: $(echo "$TEST_FILES" | wc -w) test files"

      - name: Run tests (shard ${{ matrix.shard }})
        env:
          LOG_LEVEL: none
          TZ: utc
        run: |
          mkdir -p test-results
          ./node_modules/.bin/mocha \
            --require @swc-node/register \
            --reporter spec \
            --exit \
            --timeout 10000 \
            ${{ steps.tests.outputs.files }}

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'

      - name: Install graphicsmagick
        run: sudo apt-get update && sudo apt-get install -y graphicsmagick

      - name: Build
        run: yarn build
