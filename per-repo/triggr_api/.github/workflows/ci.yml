name: CI

# triggr_api requires custom CI because:
#   - MongoDB 8.0 service container (can't be parameterized in ci-universal)
#   - 4-shard parallel test execution (can't be expressed as a single command)
#   - graphicsmagick system dependency
#
# The gate job at the bottom calls the central gate.yml enforcer and produces
# the "gate" check that branch protection requires. CODEOWNERS protects this
# file — changes require @sonarmd/platform-eng approval.

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master, 'release/**']
  merge_group:
    branches: [master, 'release/**']

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: sudo apt-get update -qq && sudo apt-get install -y graphicsmagick
      - run: yarn lint

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    services:
      mongo:
        image: mongo:8.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: sudo apt-get update -qq && sudo apt-get install -y graphicsmagick

      - name: Split test files into shard ${{ matrix.shard }}
        id: tests
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          ALL_FILES=$(find test -name '*.ts' -type f | sort)
          TOTAL=$(echo "$ALL_FILES" | wc -l)
          SHARD_SIZE=$(( (TOTAL + 3) / 4 ))
          START=$(( SHARD * SHARD_SIZE + 1 ))
          TEST_FILES=$(echo "$ALL_FILES" | sed -n "${START},$(( START + SHARD_SIZE - 1 ))p" | tr '\n' ' ')
          echo "files=$TEST_FILES" >> "$GITHUB_OUTPUT"

      - name: Run tests (shard ${{ matrix.shard }})
        env:
          LOG_LEVEL: none
          TZ: utc
          TEST_FILES: ${{ steps.tests.outputs.files }}
        run: |
          ./node_modules/.bin/mocha \
            --require @swc-node/register \
            --exit \
            --timeout 10000 \
            $TEST_FILES

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: sudo apt-get update -qq && sudo apt-get install -y graphicsmagick
      - run: yarn build

  # Central gate — validates the CI contract and produces the "gate" check.
  # Branch protection requires this check. Do not remove or skip this job.
  gate:
    needs: [lint, test, build]
    if: always()
    uses: sonarmd/workflows/.github/workflows/gate.yml@main
    with:
      lint_result:  ${{ needs.lint.result }}
      test_result:  ${{ needs.test.result }}
      build_result: ${{ needs.build.result }}
