name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [staging, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: sudo apt-get update && sudo apt-get install -y graphicsmagick
      - run: yarn lint

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    services:
      mongo:
        image: mongo:8.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: sudo apt-get update && sudo apt-get install -y graphicsmagick

      - name: Split test files
        id: tests
        run: |
          ALL_FILES=$(find test -name '*.ts' -type f | sort)
          TOTAL=$(echo "$ALL_FILES" | wc -l)
          SHARD=${{ matrix.shard }}
          SHARD_SIZE=$(( (TOTAL + 3) / 4 ))
          START=$(( SHARD * SHARD_SIZE + 1 ))
          TEST_FILES=$(echo "$ALL_FILES" | sed -n "${START},$(( START + SHARD_SIZE - 1 ))p" | tr '\n' ' ')
          echo "files=$TEST_FILES" >> "$GITHUB_OUTPUT"

      - name: Run tests (shard ${{ matrix.shard }})
        env:
          LOG_LEVEL: none
          TZ: utc
        run: |
          ./node_modules/.bin/mocha \
            --require @swc-node/register \
            --exit \
            --timeout 10000 \
            ${{ steps.tests.outputs.files }}

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: sudo apt-get update && sudo apt-get install -y graphicsmagick
      - run: yarn build
