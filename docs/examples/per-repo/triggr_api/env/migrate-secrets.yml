---
# Migrate API secrets from Ansible Vault → 1Password
#
# Prerequisites:
#   1. op CLI installed and authenticated
#   2. 1Password vaults created: smd_cicd_dev, smd_cicd_stg, smd_cicd_prd
#   3. Ansible Vault password available (~/triggr-vault-password.txt)
#
# Usage:
#   cd triggr_misc/Ansible
#   ansible-playbook ../../sonarmd-workflows/per-repo/triggr_api/env/migrate-secrets.yml \
#     -e env=dev --vault-password-file ~/triggr-vault-password.txt
#
#   ansible-playbook ../../sonarmd-workflows/per-repo/triggr_api/env/migrate-secrets.yml \
#     -e env=stg --vault-password-file ~/triggr-vault-password.txt
#
#   ansible-playbook ../../sonarmd-workflows/per-repo/triggr_api/env/migrate-secrets.yml \
#     -e env=prd --vault-password-file ~/triggr-vault-password.txt

- name: Migrate triggr_api secrets to 1Password
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    op_vault: "smd_cicd_{{ env }}"

  vars_files:
    # Environment-level secrets (mongo_password, session_secret, etc.)
    - "group_vars/tag_Group_{{ env_group }}/secrets.yml"
    # Instance-level secrets (if any exist per env)
    - "group_vars/tag_InstanceType_API{{ env_group }}/vars.yml"

  pre_tasks:
    - name: Validate env parameter
      ansible.builtin.assert:
        that:
          - env is defined
          - env in ['dev', 'stg', 'prd']
        fail_msg: "Pass -e env=dev|stg|prd"

    - name: Map env to Ansible group name
      ansible.builtin.set_fact:
        env_group: "{{ {'dev': 'Development', 'stg': 'Staging', 'prd': 'Production'}[env] }}"

    - name: Verify op CLI is authenticated
      ansible.builtin.command: op vault get "{{ op_vault }}" --format json
      register: op_check
      changed_when: false
      failed_when: op_check.rc != 0

  tasks:
    - name: Create 1Password items for all secrets
      ansible.builtin.command: >
        op item create
        --vault "{{ op_vault }}"
        --category api-credential
        --title "{{ item.title }}"
        --fields "credential={{ item.value }}"
      loop: "{{ secrets_list }}"
      loop_control:
        label: "{{ item.title }}"
      no_log: true
      register: op_results
      failed_when: op_results.rc != 0 and 'already exists' not in (op_results.stderr | default(''))

    - name: Report results
      ansible.builtin.debug:
        msg: "Migrated {{ secrets_list | length }} secrets to vault {{ op_vault }}"

  vars:
    secrets_list:
      # ── MongoDB ──
      - title: mongo-password
        value: "{{ mongo_password | default('') }}"
      - title: mongo-read-only-password
        value: "{{ mongo_read_only_password | default('') }}"

      # ── Auth ──
      - title: session-secret
        value: "{{ session_secret | default('') }}"
      - title: jwt-secret
        value: "{{ jwt_secret | default('') }}"

      # ── Firebase ──
      - title: firebase-server-key
        value: "{{ firebase_server_key | default('') }}"

      # ── GitHub OAuth ──
      - title: github-oauth-secret
        value: "{{ github_secret | default('') }}"

      # ── Google Calendar ──
      - title: gcal-client-secret
        value: "{{ gcal_client_secret | default('') }}"
      - title: gcal-refresh-token
        value: "{{ gcal_refresh_token | default('') }}"

      # ── BriteVerify ──
      - title: briteverify-api-key
        value: "{{ briteverify_api_key | default('') }}"

      # ── Change Healthcare ──
      - title: change-healthcare-client-id
        value: "{{ change_healthcare_client_id | default('') }}"
      - title: change-healthcare-client-secret
        value: "{{ change_healthcare_client_secret | default('') }}"

      # ── Iterable ──
      - title: iterable-api-key
        value: "{{ iterable_api_key | default('') }}"
      - title: iterable-webhook-password
        value: "{{ webhookPassword | default('') }}"

      # ── Mixpanel ──
      - title: mixpanel-mobile-api-secret
        value: "{{ mixpanel_mobile_api_secret | default('') }}"
      - title: mixpanel-mobile-token
        value: "{{ mixpanel_mobile_token | default('') }}"

      # ── PagerDuty ──
      - title: pagerduty-key-low
        value: "{{ eng_pager_duty_key_low_priority | default('') }}"
      - title: pagerduty-key-high
        value: "{{ eng_pager_duty_key_high_priority | default('') }}"

      # ── Redis ──
      - title: redis-auth-token
        value: "{{ redis_auth_token | default('') }}"

      # ── SendGrid ──
      - title: sendgrid-api-key
        value: "{{ sendgrid_api_key | default('') }}"

      # ── Slack ──
      - title: slack-bot-token
        value: "{{ slack_bot_token | default('') }}"
      - title: slack-verification-token
        value: "{{ slack_community_webhook_verification_token | default('') }}"
      - title: slack-claims-webhook
        value: "{{ claims_webhook | default('') }}"
      - title: slack-undeliverable-email-webhook
        value: "{{ undeliverable_email_alerts_webhook | default('') }}"
      - title: slack-undeliverable-message-webhook
        value: "{{ undeliverable_message_alerts_webhook_url | default('') }}"

      # ── Twilio ──
      - title: twilio-auth-token
        value: "{{ twilio_auth_token | default('') }}"
      - title: twilio-api-key
        value: "{{ twilio_api_key | default('') }}"
      - title: twilio-api-secret
        value: "{{ twilio_api_secret | default('') }}"
      - title: twilio-outgoing-phone
        value: "{{ twilio_outgoing_phone_number | default('') }}"
      - title: twilio-default-sms-phone
        value: "{{ twilio_default_sms_phone_number | default('') }}"
      - title: twilio-outbound-phones
        value: "{{ twilio_outbound_phone_numbers | default([]) | to_json }}"
      - title: twilio-ivr-flow-sid
        value: "{{ twilio_ivr_flow_sid | default('') }}"
      - title: twilio-voice-app-sid
        value: "{{ twilio_voice_app_sid | default('') }}"

      # ── SFTP (prd only) ──
      - title: sftp-users
        value: "{{ ftp_users | default([]) | to_json }}"
