name: Break-Glass Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - stg
          - prd
      tag_override:
        description: Specific tag or SHA to deploy (optional, defaults to HEAD)
        required: false
        type: string
      skip_tests:
        description: Skip test suite (emergency only)
        required: false
        type: boolean
        default: false
      reason:
        description: Reason for break-glass deploy (required for audit trail)
        required: true
        type: string

permissions: {}

concurrency:
  group: deploy-${{ inputs.environment }}-api
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Log break-glass event
        env:
          ACTOR: ${{ github.actor }}
          ENVIRONMENT: ${{ inputs.environment }}
          TAG_OR_SHA: ${{ inputs.tag_override || github.sha }}
          SKIP_TESTS: ${{ inputs.skip_tests }}
          REASON: ${{ inputs.reason }}
        run: |
          echo "### Break-Glass Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Actor**: $ACTOR" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Environment**: $ENVIRONMENT" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag/SHA**: $TAG_OR_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Skip Tests**: $SKIP_TESTS" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Reason**: $REASON" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Time**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_STEP_SUMMARY"

  tests:
    if: inputs.skip_tests != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    services:
      mongo:
        image: mongo:8.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ inputs.tag_override || github.sha }}
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: sudo apt-get update && sudo apt-get install -y graphicsmagick

      - name: Split test files
        id: tests
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          ALL_FILES=$(find test -name '*.ts' -type f | sort)
          TOTAL=$(echo "$ALL_FILES" | wc -l)
          SHARD_SIZE=$(( (TOTAL + 3) / 4 ))
          START=$(( SHARD * SHARD_SIZE + 1 ))
          TEST_FILES=$(echo "$ALL_FILES" | sed -n "${START},$(( START + SHARD_SIZE - 1 ))p" | tr '\n' ' ')
          echo "files=$TEST_FILES" >> "$GITHUB_OUTPUT"

      - name: Run tests (shard ${{ matrix.shard }})
        env:
          LOG_LEVEL: none
          TZ: utc
          TEST_FILES: ${{ steps.tests.outputs.files }}
        run: |
          ./node_modules/.bin/mocha \
            --require @swc-node/register \
            --exit \
            --timeout 10000 \
            $TEST_FILES

  build:
    needs: [audit, tests]
    if: always() && needs.audit.result == 'success' && (needs.tests.result == 'success' || needs.tests.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'prd' && 'production' || '' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ inputs.tag_override || github.sha }}
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '18'
      - run: sudo apt-get update && sudo apt-get install -y graphicsmagick
      - run: yarn build

      - name: Package artifact
        run: tar czf api.tar.gz dist/ node_modules/ package.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-2

      - name: Upload artifact to S3
        env:
          TAG: ${{ inputs.tag_override || github.sha }}
          ENV: ${{ inputs.environment }}
        run: |
          aws s3 cp api.tar.gz \
            "s3://sonarmd-deploy-artifacts/api/$ENV/break-glass-$TAG/api.tar.gz"

  generate-config:
    needs: [audit]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'prd' && 'production' || '' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@581a835fb51b8e7ec56b71cf2ffddd7e68bb25e0  # v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        with:
          export-env: true

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: sonarmd/workflows
          sparse-checkout: templates/
          path: _workflows

      - name: Render configuration.json
        env:
          TAG: ${{ inputs.tag_override || github.sha }}
          DEPLOY_ENV_INPUT: ${{ inputs.environment }}
        run: |
          export DEPLOY_TAG="break-glass-$TAG"
          export DEPLOY_ENV="$DEPLOY_ENV_INPUT"
          export SERVER_TYPE="Server"
          envsubst < _workflows/templates/configuration.json.tpl > configuration.json
          python3 -c "import json; json.load(open('configuration.json'))"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-2

      - name: Upload config to S3
        env:
          TAG: ${{ inputs.tag_override || github.sha }}
          ENV: ${{ inputs.environment }}
        run: |
          aws s3 cp configuration.json \
            "s3://sonarmd-deploy-artifacts/api/$ENV/break-glass-$TAG/configuration.json"

  deploy:
    needs: [build, generate-config]
    uses: sonarmd/workflows/.github/workflows/deploy-api-ssm.yml@main
    with:
      environment: ${{ inputs.environment }}
      artifact-s3-key: api/${{ inputs.environment }}/break-glass-${{ inputs.tag_override || github.sha }}/api.tar.gz
      config-s3-key: api/${{ inputs.environment }}/break-glass-${{ inputs.tag_override || github.sha }}/configuration.json
      deploy-tag: break-glass-${{ inputs.tag_override || github.sha }}
      instance-tag-value: ${{ inputs.environment == 'dev' && 'APIDev' || inputs.environment == 'stg' && 'APIStaging' || 'APIProduction' }}
      aws-role-arn: ${{ vars.AWS_DEPLOY_ROLE_ARN }}

  notify:
    needs: [deploy]
    if: always()
    uses: sonarmd/workflows/.github/workflows/notify-slack.yml@main
    with:
      status: ${{ needs.deploy.result }}
      environment: ${{ inputs.environment }}
      app-name: triggr_api (break-glass)
      tag: ${{ inputs.tag_override || github.sha }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
