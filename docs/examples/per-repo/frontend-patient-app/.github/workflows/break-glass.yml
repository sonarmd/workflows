name: Break-Glass EAS Build

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - stg
          - prd
      profile:
        description: EAS build profile
        required: true
        type: choice
        options:
          - preview
          - production
      auto_submit:
        description: Auto-submit to app stores
        required: false
        type: boolean
        default: false
      tag_override:
        description: Specific tag or SHA to build (optional)
        required: false
        type: string
      skip_tests:
        description: Skip test suite (emergency only)
        required: false
        type: boolean
        default: false
      reason:
        description: Reason for break-glass build (required for audit trail)
        required: true
        type: string

permissions: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Log break-glass event
        env:
          BG_ACTOR: ${{ github.actor }}
          BG_ENVIRONMENT: ${{ inputs.environment }}
          BG_PROFILE: ${{ inputs.profile }}
          BG_AUTO_SUBMIT: ${{ inputs.auto_submit }}
          BG_REF: ${{ inputs.tag_override || github.sha }}
          BG_SKIP_TESTS: ${{ inputs.skip_tests }}
          BG_REASON: ${{ inputs.reason }}
        run: |
          echo "### Break-Glass EAS Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Actor**: $BG_ACTOR" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Environment**: $BG_ENVIRONMENT" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Profile**: $BG_PROFILE" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Auto-submit**: $BG_AUTO_SUBMIT" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag/SHA**: $BG_REF" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Skip Tests**: $BG_SKIP_TESTS" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Reason**: $BG_REASON" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Time**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_STEP_SUMMARY"

  tests:
    if: inputs.skip_tests != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ inputs.tag_override || github.sha }}
      - uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: '22'
      - run: yarn lint
      - run: npx tsc --noEmit
      - run: yarn test --ci --passWithNoTests

  build:
    needs: [audit, tests]
    if: always() && needs.audit.result == 'success' && (needs.tests.result == 'success' || needs.tests.result == 'skipped')
    uses: sonarmd/workflows/.github/workflows/deploy-eas-build.yml@main
    with:
      profile: ${{ inputs.profile }}
      platform: all
      auto-submit: ${{ inputs.auto_submit }}
      environment: ${{ inputs.environment }}
      node-version: '22'
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  notify:
    needs: [build]
    if: always()
    uses: sonarmd/workflows/.github/workflows/notify-slack.yml@main
    with:
      status: ${{ needs.build.result }}
      environment: ${{ inputs.environment }}
      app-name: patient-mobile (break-glass)
      tag: ${{ inputs.tag_override || github.sha }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
