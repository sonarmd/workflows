name: Build Gate

# Contract gate: validates that the build stage succeeded.
#
# Phase 1: simple pass/fail validation.
# Phase 2 (future): download artifact, verify cosign signature matches commit_sha,
#   validate CycloneDX BOM, persist to durable storage (S3).
#
# Usage (from a per-repo deploy workflow):
#
#   build-gate:
#     needs: build
#     if: always()
#     uses: sonarmd/workflows/.github/workflows/build-gate.yml@main
#     with:
#       build_result: ${{ needs.build.result }}

on:
  workflow_call:
    inputs:
      build_result:
        description: |
          Result of the build stage. Must be 'success' or 'skipped'.
          'skipped' is valid for repos where CI doesn't produce a build artifact
          (e.g. mobile apps built via EAS, pure infra repos).
          Accepts: 'success' | 'failure' | 'skipped' | 'cancelled'
        required: true
        type: string

      commit_sha:
        description: |
          Phase 2: commit SHA for signature verification.
          Currently unused — reserved for artifact signing validation.
        required: false
        type: string
        default: ''

      artifact_name:
        description: |
          Phase 2: name of the uploaded build artifact.
          Currently unused — reserved for artifact validation.
        required: false
        type: string
        default: ''

    outputs:
      gate_result:
        description: 'success or failure'
        value: ${{ jobs.validate.outputs.result }}

permissions: {}

jobs:
  validate:
    name: build-gate
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      result: ${{ steps.evaluate.outputs.result }}
    steps:
      - name: Evaluate build gate
        id: evaluate
        env:
          BUILD_RESULT: ${{ inputs.build_result }}
          COMMIT_SHA:   ${{ inputs.commit_sha }}
          ARTIFACT:     ${{ inputs.artifact_name }}
        run: |
          set -euo pipefail

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Build Gate"
          echo "  repo:   ${{ github.repository }}"
          echo "  sha:    ${{ github.sha }}"
          echo "  run:    ${{ github.run_id }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          # Build can be 'success' or 'skipped' — both are valid.
          # 'failure' or 'cancelled' blocks the gate.
          case "$BUILD_RESULT" in
            success)
              printf "  ✓  %-12s  %s\n" "build" "passed"
              ;;
            skipped|'')
              printf "  ○  %-12s  %s\n" "build" "skipped (no build configured)"
              ;;
            *)
              printf "  ✗  %-12s  %s\n" "build" "$BUILD_RESULT"
              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "result=failure" >> "$GITHUB_OUTPUT"
              echo "::error::Build gate blocked — build did not succeed. See above."
              exit 1
              ;;
          esac

          # Phase 2 stubs — log presence of signing inputs for future use.
          if [[ -n "$COMMIT_SHA" ]]; then
            printf "  ○  %-12s  %s\n" "signature" "Phase 2 — commit_sha provided ($COMMIT_SHA)"
          fi
          if [[ -n "$ARTIFACT" ]]; then
            printf "  ○  %-12s  %s\n" "artifact" "Phase 2 — artifact_name provided ($ARTIFACT)"
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "result=success" >> "$GITHUB_OUTPUT"
          echo "  Build gate passed — SHA ${{ github.sha }} is verified"
