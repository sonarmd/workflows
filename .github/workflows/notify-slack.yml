name: Notify Slack

on:
  workflow_call:
    inputs:
      status:
        description: Deploy status (success, failure, cancelled, rollback)
        type: string
        required: true
      environment:
        description: Target environment (dev, stg, prd)
        type: string
        required: true
      app-name:
        description: Application name
        type: string
        required: true
      tag:
        description: Version or ref name
        type: string
        default: ''
      channel:
        description: Slack channel override
        type: string
        default: '#ops'

    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: true

permissions: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Load Slack webhook from 1Password
        uses: 1password/load-secrets-action@v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SLACK_WEBHOOK_URL: op://smd_agora_shared/SLACK_WEBHOOK_URL/credential
        with:
          export-env: true

      - uses: actions/checkout@v4
        with:
          repository: sonarmd/workflows
          sparse-checkout: actions/slack-notify/
          path: _actions

      - name: Send Slack notification
        uses: ./_actions/actions/slack-notify
        with:
          webhook-url: ${{ env.SLACK_WEBHOOK_URL }}
          status: ${{ inputs.status }}
          environment: ${{ inputs.environment }}
          app-name: ${{ inputs.app-name }}
          tag: ${{ inputs.tag }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          actor: ${{ github.actor }}
