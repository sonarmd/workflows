name: Notify Slack

on:
  workflow_call:
    inputs:
      status:
        description: Deploy status (success, failure, cancelled)
        type: string
        required: true
      environment:
        description: Target environment (dev, stg, prd)
        type: string
        required: true
      app-name:
        description: Application name
        type: string
        required: true
      tag:
        description: Version or ref name
        type: string
        default: ''
      channel:
        description: Slack channel override
        type: string
        default: '#ops'

    secrets:
      SLACK_TOKEN:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        run: |
          STATUS="${{ inputs.status }}"
          ENV="${{ inputs.environment }}"
          APP="${{ inputs.app-name }}"
          TAG="${{ inputs.tag }}"
          CHANNEL="${{ inputs.channel }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ACTOR="${{ github.actor }}"

          case "$STATUS" in
            success)  EMOJI=":white_check_mark:" ;;
            failure)  EMOJI=":x:" ;;
            *)        EMOJI=":warning:" ;;
          esac

          TEXT="${EMOJI} *${APP}* deployed to *${ENV}* — ${STATUS}\nVersion: \`${TAG}\` | By: ${ACTOR} | <${RUN_URL}|View Run>"

          curl -sf -X POST \
            -d "$(jq -n --arg channel "$CHANNEL" --arg text "$TEXT" '{channel: $channel, text: $text}')" \
            "https://hooks.slack.com/services/${{ secrets.SLACK_TOKEN }}" \
            || echo "::warning::Slack notification failed"
