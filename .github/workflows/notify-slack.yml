name: Notify Slack

on:
  workflow_call:
    inputs:
      status:
        description: Deploy status (success, failure, cancelled, rollback)
        type: string
        required: true
      environment:
        description: Target environment (dev, stg, prd)
        type: string
        required: true
      app-name:
        description: Application name
        type: string
        required: true
      tag:
        description: Version or ref name
        type: string
        default: ''
      channel:
        description: Slack channel override
        type: string
        default: '#ops'

    secrets:
      SLACK_WEBHOOK_URL:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        uses: sonarmd/workflows/actions/slack-notify@main
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: ${{ inputs.status }}
          environment: ${{ inputs.environment }}
          app-name: ${{ inputs.app-name }}
          tag: ${{ inputs.tag }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          actor: ${{ github.actor }}
