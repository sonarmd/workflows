name: Break-Glass Deploy

# Universal break-glass workflow. Every repo calls this.
# Handles: audit logging, Slack notification, and optionally triggers
# a deploy workflow (EAS build, S3 sync, etc.) via the deploy_workflow input.
#
# Usage (Slack-only, e.g. triggr_api where Ansible handles deploy):
#
#   jobs:
#     break-glass:
#       uses: sonarmd/workflows/.github/workflows/break-glass.yml@main
#       with:
#         app-name: triggr_api
#       secrets:
#         SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
#
# Usage (with EAS build, e.g. mobile):
#
#   jobs:
#     break-glass:
#       uses: sonarmd/workflows/.github/workflows/break-glass.yml@main
#       with:
#         app-name: frontend-patient-app
#         deploy-eas: true
#       secrets:
#         SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
#         EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

on:
  workflow_call:
    inputs:
      environment:
        description: Target environment (dev, stg, prd)
        type: string
        required: true
      app-name:
        description: Application name for notifications
        type: string
        required: true
      reason:
        description: Reason for break-glass deploy
        type: string
        required: true
      tag-or-sha:
        description: Specific tag or SHA to deploy (defaults to caller SHA)
        type: string
        default: ''
      slack-channel:
        description: Slack channel override
        type: string
        default: ''
      deploy-eas:
        description: Trigger EAS Build (for mobile apps)
        type: boolean
        default: false
      eas-profile:
        description: EAS build profile (preview, production)
        type: string
        default: ''
      eas-platform:
        description: EAS target platform (all, ios, android)
        type: string
        default: 'all'
      eas-auto-submit:
        description: Auto-submit to app stores
        type: boolean
        default: false
      node-version:
        description: Node.js version for EAS builds
        type: string
        default: '22'

    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: true
      EXPO_TOKEN:
        required: false

permissions: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      ref: ${{ steps.log.outputs.ref }}
      channel: ${{ steps.log.outputs.channel }}
    steps:
      - name: Log break-glass event
        id: log
        env:
          ACTOR: ${{ github.actor }}
          ENVIRONMENT: ${{ inputs.environment }}
          APP_NAME: ${{ inputs.app-name }}
          TAG_OR_SHA: ${{ inputs.tag-or-sha || github.sha }}
          REASON: ${{ inputs.reason }}
          CHANNEL_INPUT: ${{ inputs.slack-channel }}
        run: |
          REF="${TAG_OR_SHA:-$GITHUB_SHA}"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

          if [ -n "$CHANNEL_INPUT" ]; then
            echo "channel=$CHANNEL_INPUT" >> "$GITHUB_OUTPUT"
          elif [ "$ENVIRONMENT" = "dev" ]; then
            echo "channel=#ops-dev" >> "$GITHUB_OUTPUT"
          else
            echo "channel=#ops" >> "$GITHUB_OUTPUT"
          fi

          echo "### Break-Glass Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **App**: $APP_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Actor**: $ACTOR" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Environment**: $ENVIRONMENT" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag/SHA**: $REF" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Reason**: $REASON" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Time**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_STEP_SUMMARY"

  eas-build:
    needs: audit
    if: inputs.deploy-eas
    uses: sonarmd/workflows/.github/workflows/deploy-eas-build.yml@main
    with:
      profile: ${{ inputs.eas-profile }}
      platform: ${{ inputs.eas-platform }}
      auto-submit: ${{ inputs.eas-auto-submit }}
      environment: ${{ inputs.environment }}
      node-version: ${{ inputs.node-version }}
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  notify:
    needs: [audit, eas-build]
    if: always() && needs.audit.result == 'success'
    uses: sonarmd/workflows/.github/workflows/notify-slack.yml@main
    with:
      status: ${{ needs.eas-build.result == 'skipped' && 'success' || needs.eas-build.result }}
      environment: ${{ inputs.environment }}
      app-name: ${{ inputs.app-name }} (break-glass)
      tag: ${{ needs.audit.outputs.ref }}
      channel: ${{ needs.audit.outputs.channel }}
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
