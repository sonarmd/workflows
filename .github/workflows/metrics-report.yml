name: Weekly Metrics Report

on:
  schedule:
    # Monday 9am ET (14:00 UTC)
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  METRICS_BUCKET: sonarmd-deploy-metrics

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Load Slack webhook from 1Password
        uses: 1password/load-secrets-action@v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SLACK_METRICS_WEBHOOK: op://smd_cicd/Slack/metrics-webhook/credential

      - name: Generate weekly report
        run: |
          # Calculate date range (last 7 days)
          END_DATE=$(date -u +"%Y-%m-%d")
          START_DATE=$(date -u -d "7 days ago" +"%Y-%m-%d" 2>/dev/null || date -u -v-7d +"%Y-%m-%d")

          echo "Generating report for $START_DATE to $END_DATE"

          # Download metrics from S3 for the past 7 days
          mkdir -p /tmp/metrics
          for i in $(seq 0 6); do
            DAY=$(date -u -d "$i days ago" +"%Y/%m/%d" 2>/dev/null || date -u -v-${i}d +"%Y/%m/%d")
            aws s3 sync "s3://$METRICS_BUCKET/$DAY/" /tmp/metrics/ 2>/dev/null || true
          done

          # Count metrics
          TOTAL=$(ls /tmp/metrics/*.json 2>/dev/null | wc -l | tr -d ' ')

          if [ "$TOTAL" -eq 0 ]; then
            echo "No deploy metrics found for the past week"
            REPORT="No deployments recorded in the past 7 days."
          else
            # Aggregate with jq
            SUCCESSES=$(cat /tmp/metrics/*.json | jq -s '[.[] | select(.status == "success")] | length')
            FAILURES=$(cat /tmp/metrics/*.json | jq -s '[.[] | select(.status == "failure")] | length')
            ROLLBACKS=$(cat /tmp/metrics/*.json | jq -s '[.[] | select(.rollback == true)] | length')
            SUCCESS_RATE=$(echo "scale=1; $SUCCESSES * 100 / $TOTAL" | bc)
            AVG_DURATION=$(cat /tmp/metrics/*.json | jq -s '[.[].duration_seconds] | add / length | floor')

            # Per-repo breakdown
            REPO_BREAKDOWN=$(cat /tmp/metrics/*.json | jq -rs '
              group_by(.repo) | map({
                repo: .[0].repo,
                total: length,
                success: [.[] | select(.status == "success")] | length,
                avg_duration: ([.[].duration_seconds] | add / length | floor)
              }) | .[] | "  \(.repo): \(.total) deploys (\(.success) ok, avg \(.avg_duration)s)"
            ')

            REPORT=$(cat <<EOTEXT
          *Weekly Deploy Report* ($START_DATE to $END_DATE)

          :bar_chart: *Summary*
          - Total deploys: $TOTAL
          - Success rate: ${SUCCESS_RATE}%
          - Failures: $FAILURES
          - Rollbacks: $ROLLBACKS
          - Avg duration: ${AVG_DURATION}s

          :package: *By Repository*
          $REPO_BREAKDOWN
          EOTEXT
          )
          fi

          # Post to Slack
          PAYLOAD=$(jq -n --arg text "$REPORT" '{"text": $text}')
          curl -sf -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "$SLACK_METRICS_WEBHOOK" || echo "::warning::Failed to post metrics to Slack"

          echo "### Weekly Report" >> "$GITHUB_STEP_SUMMARY"
          echo "$REPORT" >> "$GITHUB_STEP_SUMMARY"
