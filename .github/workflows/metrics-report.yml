name: Weekly Deploy Metrics Report

on:
  schedule:
    # Monday 9am ET (14:00 UTC, accounting for EDT)
    - cron: '0 14 * * 1'
  workflow_dispatch:
    inputs:
      days:
        description: Number of days to report on
        type: number
        default: 7

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  METRICS_BUCKET: sonarmd-deploy-metrics

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Collect and analyze metrics
        id: metrics
        env:
          REPORT_DAYS: ${{ inputs.days || 7 }}
        run: |
          TMPDIR=$(mktemp -d)
          echo "Collecting metrics for the last $REPORT_DAYS days..."

          for i in $(seq 0 $((REPORT_DAYS - 1))); do
            DATE=$(date -u -d "$i days ago" +%Y/%m/%d 2>/dev/null || date -u -v-${i}d +%Y/%m/%d)
            aws s3 sync "s3://$METRICS_BUCKET/$DATE/" "$TMPDIR/$DATE/" --quiet 2>/dev/null || true
          done

          TOTAL=$(find "$TMPDIR" -name '*.json' -type f | wc -l | tr -d ' ')

          if [ "$TOTAL" -eq 0 ]; then
            echo "No deploy metrics found for the past $REPORT_DAYS days."
            echo "has_data=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_data=true" >> "$GITHUB_OUTPUT"

          SUCCESS=$(find "$TMPDIR" -name '*.json' -exec grep -l '"status": "success"' {} \; | wc -l | tr -d ' ')
          FAILURE=$((TOTAL - SUCCESS))
          ROLLBACKS=$(find "$TMPDIR" -name '*.json' -exec grep -l '"rollback": true' {} \; | wc -l | tr -d ' ')

          if [ "$TOTAL" -gt 0 ]; then
            SUCCESS_RATE=$(echo "scale=1; $SUCCESS * 100 / $TOTAL" | bc)
          else
            SUCCESS_RATE="N/A"
          fi

          DURATIONS=$(find "$TMPDIR" -name '*.json' -exec grep -l '"status": "success"' {} \; \
            | xargs -I{} python3 -c "import json; print(json.load(open('{}'))['duration_seconds'])" 2>/dev/null \
            | paste -sd+ | bc 2>/dev/null || echo 0)
          if [ "$SUCCESS" -gt 0 ] && [ "$DURATIONS" -gt 0 ]; then
            MEAN_DURATION=$((DURATIONS / SUCCESS))
          else
            MEAN_DURATION=0
          fi

          DEV_COUNT=$(find "$TMPDIR" -name '*.json' -exec grep -l '"env": "dev"' {} \; | wc -l | tr -d ' ')
          STG_COUNT=$(find "$TMPDIR" -name '*.json' -exec grep -l '"env": "stg"' {} \; | wc -l | tr -d ' ')
          PRD_COUNT=$(find "$TMPDIR" -name '*.json' -exec grep -l '"env": "prd"' {} \; | wc -l | tr -d ' ')

          jq -n \
            --arg total "$TOTAL" \
            --arg success_rate "${SUCCESS_RATE}%" \
            --arg failures "$FAILURE" \
            --arg rollbacks "$ROLLBACKS" \
            --arg mean_dur "${MEAN_DURATION}s" \
            --arg by_env "dev: $DEV_COUNT | stg: $STG_COUNT | prd: $PRD_COUNT" \
            --arg days "$REPORT_DAYS" \
            '{
              attachments: [{
                color: "#36a64f",
                title: ":bar_chart: Weekly Deploy Metrics",
                fields: [
                  {title: "Total Deploys", value: $total, short: true},
                  {title: "Success Rate", value: $success_rate, short: true},
                  {title: "Failures", value: $failures, short: true},
                  {title: "Rollbacks", value: $rollbacks, short: true},
                  {title: "Mean Duration", value: $mean_dur, short: true},
                  {title: "By Env", value: $by_env, short: true}
                ],
                footer: ("SonarMD Deploy Metrics | Last " + $days + " days")
              }]
            }' > /tmp/slack-report.json

          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "success_rate=$SUCCESS_RATE" >> "$GITHUB_OUTPUT"

          rm -rf "$TMPDIR"

      - name: Post to Slack
        if: steps.metrics.outputs.has_data == 'true'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_METRICS_WEBHOOK_URL }}
        run: |
          curl -sf -X POST -H 'Content-type: application/json' \
            --data @/tmp/slack-report.json \
            "$SLACK_WEBHOOK" \
            || echo "::warning::Failed to post metrics to Slack"
          rm -f /tmp/slack-report.json

      - name: Summary
        env:
          HAS_DATA: ${{ steps.metrics.outputs.has_data }}
          TOTAL: ${{ steps.metrics.outputs.total }}
          SUCCESS_RATE: ${{ steps.metrics.outputs.success_rate }}
        run: |
          echo "### Weekly Deploy Metrics" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$HAS_DATA" = "true" ]; then
            echo "- **Total Deploys**: $TOTAL" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Success Rate**: ${SUCCESS_RATE}%" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No deploy data available for the reporting period." >> "$GITHUB_STEP_SUMMARY"
          fi
