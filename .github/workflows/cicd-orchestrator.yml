name: CI/CD

# ── Caller example ────────────────────────────────────────────────────────
#
# The caller is the SINGLE source of truth for GITHUB_TOKEN permissions.
# This orchestrator (and ci-core / cd-core) declares no permissions of its
# own — every internal job inherits the caller's grant. Add a new scope to
# the caller's workflow-level `permissions:` block and the orchestrator can
# use it; no change here required.
#
#   name: CI/CD
#   on:
#     pull_request:
#       branches: [master, 'release/**']
#     merge_group:
#       branches: [master, 'release/**']
#     push:
#       branches: ['release/**', master]
#       tags: ['prd-*-v*-b*']      # required — fires cut_release after a prd deploy
#   concurrency:
#     group: cicd-${{ github.event.pull_request.number || github.ref_name }}
#     cancel-in-progress: true
#   permissions:
#     contents: write     # cut release branches, push anchor tags, create GH releases
#     id-token: write     # OIDC for sigstore / artifact attestations
#     attestations: write # build provenance attestations
#     actions: read       # discover prior CI runs (cache probe)
#     packages: write     # push/pull release tarball via GHCR-backed artifact store
#     pull-requests: read # cut_release infers patch/minor from PR head ref
#     checks: write       # publish the CI evidence check run (feeds the Jira Builds panel via the connector)
#   jobs:
#     cicd:
#       uses: sonarmd/workflows/.github/workflows/cicd-orchestrator.yml@main
#       with:
#         setup: |
#           sudo apt-get update -qq && sudo apt-get install -y graphicsmagick
#         steps: |
#           yarn lint
#           yarn test:ci
#           yarn build
#       secrets: inherit
#
# Event routing (automatic — no config needed):
#   pull_request / merge_group  → CI only
#   push to release/**          → check CI status → CI (if needed) → CD (stg)
#   push to master              → check CI status → CI (if needed) → CD (prd)

on:
  workflow_call:
    inputs:
      setup:
        description: "Repo-specific setup shell (system deps, etc.)"
        required: false
        type: string
        default: ""
      steps:
        description: "Repo-specific lint/test/build shell."
        required: true
        type: string
      test_report_path:
        description: "JUnit XML path."
        required: false
        type: string
        default: "junit.xml"
      timeout:
        description: "CI job timeout in minutes."
        required: false
        type: number
        default: 10
      working_directory:
        required: false
        type: string
        default: "."
      runs_on:
        description: "Runner label for the build job. Defaults to ubuntu-24.04-arm; override to ubuntu-24.04 for repos whose toolchain ships x86_64-only binaries (e.g. react-native hermesc)."
        required: false
        type: string
        default: "ubuntu-24.04-arm"

# No `permissions:` block — the caller is the single source of truth for
# GITHUB_TOKEN scopes. Every job below inherits the caller's grant. See the
# header-block caller example for the scopes the caller must offer for the
# full CI/CD path (CI publish + CD pull from GHCR + anchor tag push + cut
# release branch push).

jobs:
  # ── Check: only runs on push events ──────────────────────────────────────
  # Looks for a prior passing CI run on this commit SHA.
  # Outputs:  none     → no CI found, run CI then CD
  #           success  → CI already passed, run CD only
  #           failure  → CI failed/cancelled, cancel this run
  check:
    if: github.event_name == 'push' && github.ref_type == 'branch'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    outputs:
      ci_status: ${{ steps.check.outputs.status }}
    steps:
      - name: Check CI status for this commit
        id: check
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.sha;

            const { data } = await github.rest.actions.listWorkflowRunsForRepo({
              owner, repo,
              head_sha: sha,
              per_page: 50,
            });

            const ciRuns = data.workflow_runs
              .filter(r => r.name === 'CI' && r.id !== context.runId)
              .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

            const run = ciRuns[ciRuns.length - 1];

            if (!run) {
              core.info('check: no CI run found — will run CI then CD');
              core.setOutput('status', 'none');
              return;
            }

            if (run.status === 'completed' && run.conclusion === 'success') {
              core.info(`check: CI already passed (run ${run.id}) — will run CD only`);
              core.setOutput('status', 'success');
            } else if (run.status === 'completed') {
              core.info(`check: CI concluded '${run.conclusion}' — cancelling`);
              core.setOutput('status', 'failure');
            } else {
              core.info(`check: CI is in progress (${run.status}) — will run CI+CD from scratch`);
              core.setOutput('status', 'none');
            }

  # ── CI: runs on PR/merge_group, or on push when no prior CI ──────────────
  # Job-level `timeout-minutes` is not valid on reusable-workflow callers
  # (jobs that use `uses:`). The 10-minute cap lives inside ci-core.yml's
  # actual run job via `timeout-minutes: ${{ inputs.timeout }}` (default
  # lowered to 10 in this stanza's `inputs.timeout` block above).
  ci:
    needs: check
    if: |
      always() &&
      needs.check.result != 'failure' &&
      (
        github.event_name != 'push' ||
        needs.check.outputs.ci_status == 'none'
      )
    uses: sonarmd/workflows/.github/workflows/ci-core.yml@main
    with:
      setup: ${{ inputs.setup }}
      steps: ${{ inputs.steps }}
      test_report_path: ${{ inputs.test_report_path }}
      timeout: ${{ inputs.timeout }}
      working_directory: ${{ inputs.working_directory }}
      runs_on: ${{ inputs.runs_on }}
    secrets: inherit

  # -- CD: runs on branch push only, after CI passes ------------------------
  # cd-core handles the promote-or-generate logic internally:
  #   release/** → always cuts a new prerelease (stg).
  #   master/main → finds the prerelease on HEAD's ancestry and promotes it
  #                 to a prd release. If none found, fails loudly — the
  #                 release/vX.Y.Z → master flow must precede master deploys.
  # Tag pushes are excluded here so the prd tag created by cd-core fires only
  # `cut_release` (below) and never re-enters CD in a loop.
  # Same rule as above: no `timeout-minutes` on reusable-workflow callers.
  # The cap lives inside cd-core.yml.
  cd:
    needs: [check, ci]
    # Only deploy machinery itself (check = prior CI/artifact resolution)
    # blocks CD. ci still runs and surfaces its result but is advisory;
    # it does not gate the deploy.
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref_type == 'branch' &&
      needs.check.result == 'success' &&
      needs.check.outputs.ci_status != 'failure'
    # cd-core takes no inputs — discovers the CI artifact by SHA.
    uses: sonarmd/workflows/.github/workflows/cd-core.yml@main
    secrets: inherit

  # -- Cut next release branch (triggered by prd tag push) ------------------
  # CD creates the tag `prd-<identifier>-vX.Y.Z-bN`. That tag push fires this
  # job, which parses the version out of the tag, bumps it, and cuts
  # `release/v<next>` from the default branch. The tag IS how we know the
  # version that just shipped — and therefore what to cut next.
  cut_release:
    if: |
      github.event_name == 'push' &&
      github.ref_type == 'tag' &&
      startsWith(github.ref_name, 'prd-')
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 2
    # Requires `contents: write` (push release/v<next> branch) and
    # `pull-requests: read` (infer patch/minor from the PR that shipped the
    # tag) from the caller's grant.
    steps:
      - name: Parse tag and resolve commit SHA
        id: parse
        uses: actions/github-script@v8
        env:
          IDENTIFIER_VAR: ${{ vars.DEPLOY_IDENTIFIER }}
        with:
          script: |
            const identifier = process.env.IDENTIFIER_VAR;
            if (!identifier) {
              core.setFailed('cut_release: repo variable DEPLOY_IDENTIFIER is not set (repo Settings → Variables → Actions)');
              return;
            }

            // Parse the tag itself — this IS the source of truth for what
            // version just shipped. `context.ref` is `refs/tags/<name>`.
            const tagName = context.ref.replace(/^refs\/tags\//, '');
            const m = tagName.match(/^prd-([^-]+)-v(\d+\.\d+\.\d+)-b\d+$/);
            if (!m) {
              core.setFailed(`cut_release: tag '${tagName}' does not match 'prd-<id>-vX.Y.Z-bN'`);
              return;
            }
            if (m[1] !== identifier) {
              core.setFailed(`cut_release: tag identifier '${m[1]}' != repo DEPLOY_IDENTIFIER '${identifier}' — refusing to act on a non-matching tag`);
              return;
            }
            const shippedVersion = m[2];

            // Annotated tags: `context.sha` is the tag object, not the commit.
            // Follow the tag object to the underlying commit.
            const { owner, repo } = context.repo;
            const { data: tagRef } = await github.rest.git.getRef({
              owner, repo, ref: `tags/${tagName}`,
            });
            let commitSha = tagRef.object.sha;
            if (tagRef.object.type === 'tag') {
              const { data: tagObj } = await github.rest.git.getTag({
                owner, repo, tag_sha: commitSha,
              });
              commitSha = tagObj.object.sha;
            }

            core.notice(`cut_release: tag=${tagName} shippedVersion=${shippedVersion} commit=${commitSha}`);
            core.setOutput('tag_name',         tagName);
            core.setOutput('shipped_version',  shippedVersion);
            core.setOutput('commit_sha',       commitSha);
            core.setOutput('identifier',       identifier);

      - name: Resolve default branch
        id: defbr
        uses: actions/github-script@v8
        with:
          script: |
            const { data } = await github.rest.repos.get({
              owner: context.repo.owner, repo: context.repo.repo,
            });
            core.setOutput('name', data.default_branch);

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.defbr.outputs.name }}
          fetch-depth: 0

      - name: Infer bump from the PR that shipped this tag
        id: bump
        uses: actions/github-script@v8
        env:
          COMMIT_SHA: ${{ steps.parse.outputs.commit_sha }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner, repo, commit_sha: process.env.COMMIT_SHA,
            });
            const merged = prs.find(p => p.merged_at);
            const sourceBranch = merged ? merged.head.ref : '';
            const bump = sourceBranch.startsWith('hotfix/') ? 'patch' : 'minor';
            core.notice(`cut_release: source_branch='${sourceBranch}' bump=${bump}`);
            core.setOutput('bump', bump);

      - name: Compute next version from shipped version
        id: nextver
        uses: sonarmd/workflows/actions/next-version@main
        with:
          identifier: ${{ steps.parse.outputs.identifier }}
          bump: ${{ steps.bump.outputs.bump }}
          previous_version: ${{ steps.parse.outputs.shipped_version }}

      - name: Cut release/v<next> from default and push
        env:
          NEXT_VERSION: ${{ steps.nextver.outputs.version }}
        run: |
          set -euo pipefail
          BRANCH="release/v${NEXT_VERSION}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "::notice::cut_release: $BRANCH already exists — no-op"
            exit 0
          fi
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          echo "::notice::cut_release: created $BRANCH"
