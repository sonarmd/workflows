name: CI/CD

# ── Caller example ────────────────────────────────────────────────────────
#
#   name: CI/CD
#   on:
#     pull_request:
#       branches: [master, 'release/**']
#     merge_group:
#       branches: [master, 'release/**']
#     push:
#       branches: ['release/**', master]
#   concurrency:
#     group: cicd-${{ github.event.pull_request.number || github.ref_name }}
#     cancel-in-progress: true
#   permissions:
#     contents: write
#     id-token: write
#     attestations: write
#     actions: read
#   jobs:
#     cicd:
#       uses: sonarmd/workflows/.github/workflows/ci-cd-core.yml@main
#       with:
#         setup: |
#           sudo apt-get update -qq && sudo apt-get install -y graphicsmagick
#         steps: |
#           yarn lint
#           yarn test:ci
#           yarn build
#       secrets: inherit
#
# Event routing (automatic — no config needed):
#   pull_request / merge_group  → CI only
#   push to release/**          → check CI status → CI (if needed) → CD (stg)
#   push to master              → check CI status → CI (if needed) → CD (prd)

on:
  workflow_call:
    inputs:
      setup:
        description: 'Repo-specific setup shell (system deps, etc.)'
        required: false
        type: string
        default: ''
      steps:
        description: 'Repo-specific lint/test/build shell.'
        required: true
        type: string
      test_report_path:
        description: 'JUnit XML path.'
        required: false
        type: string
        default: 'junit.xml'
      timeout:
        description: 'CI job timeout in minutes.'
        required: false
        type: number
        default: 15
      working_directory:
        required: false
        type: string
        default: '.'

permissions:
  contents: write
  id-token: write
  attestations: write
  actions: read

jobs:

  # ── Check: only runs on push events ──────────────────────────────────────
  # Looks for a prior passing CI run on this commit SHA.
  # Outputs:  none     → no CI found, run CI then CD
  #           success  → CI already passed, run CD only
  #           failure  → CI failed/cancelled, cancel this run
  check:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
    outputs:
      ci_status: ${{ steps.check.outputs.status }}
    steps:
      - name: Check CI status for this commit
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          RESULT=$(gh api "/repos/$REPO/actions/runs?head_sha=$SHA&per_page=50" \
            --jq '[.workflow_runs[] | select(.name == "CI")] | sort_by(.created_at) | last // empty | {status: .status, conclusion: .conclusion}' \
            2>/dev/null || echo "")

          if [ -z "$RESULT" ] || [ "$RESULT" = "null" ]; then
            echo "check: no CI run found for $SHA — will run CI then CD"
            echo "status=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          STATUS=$(echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['status'])")
          CONCLUSION=$(echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('conclusion') or '')")

          if [ "$STATUS" = "completed" ] && [ "$CONCLUSION" = "success" ]; then
            echo "check: CI already passed — will run CD only"
            echo "status=success" >> "$GITHUB_OUTPUT"
          elif [ "$STATUS" = "completed" ] && [ "$CONCLUSION" != "success" ]; then
            echo "check: CI concluded '$CONCLUSION' — cancelling"
            echo "status=failure" >> "$GITHUB_OUTPUT"
          else
            echo "check: CI is in progress ($STATUS) — will run CI+CD from scratch"
            echo "status=none" >> "$GITHUB_OUTPUT"
          fi

  # ── CI: runs on PR/merge_group, or on push when no prior CI ──────────────
  ci:
    needs: check
    if: |
      always() &&
      needs.check.result != 'failure' &&
      (
        github.event_name != 'push' ||
        needs.check.outputs.ci_status == 'none'
      )
    permissions:
      contents: read
      id-token: write
      attestations: write
      actions: read
    uses: sonarmd/workflows/.github/workflows/ci-core.yml@main
    with:
      setup:            ${{ inputs.setup }}
      steps:            ${{ inputs.steps }}
      test_report_path: ${{ inputs.test_report_path }}
      timeout:          ${{ inputs.timeout }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── CD: runs on push only, after CI passes (or was already done) ──────────
  cd:
    needs: [check, ci]
    if: |
      always() &&
      github.event_name == 'push' &&
      needs.check.result == 'success' &&
      needs.check.outputs.ci_status != 'failure' &&
      (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    permissions:
      contents: write
      actions: read
    uses: sonarmd/workflows/.github/workflows/cd-core.yml@main
    secrets: inherit
