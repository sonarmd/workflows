name: CI

# Convenience CI wrapper for projects that can express their quality gates
# as simple shell commands. Runs lint, typecheck, test, and build in sequence,
# then calls the contract gates with evidence.
#
# For projects with complex requirements (service containers, matrix sharding,
# monorepo path filtering), write a custom per-repo CI and call the gates directly.
#
# Usage — Node project:
#
#   jobs:
#     ci:
#       uses: sonarmd/workflows/.github/workflows/ci.yml@main
#       with:
#         node_version:      '18'
#         lint_command:      yarn lint
#         test_command:      yarn test --ci --reporters=default --reporters=jest-junit
#         typecheck_command: yarn tsc --noEmit
#         build_command:     yarn build
#         lint_glob:         'src/**/*.{ts,tsx,js,jsx}'
#
# Usage — Python project:
#
#   jobs:
#     ci:
#       uses: sonarmd/workflows/.github/workflows/ci.yml@main
#       with:
#         python_version:    '3.13'
#         install_command:   pip install -r requirements.txt
#         lint_command:      flake8 .
#         test_command:      pytest --junitxml=junit.xml --tb=short -q
#         typecheck_command: mypy .
#         lint_glob:         '**/*.py'

on:
  workflow_call:
    inputs:
      # ── Required ──────────────────────────────────────────────────────────
      lint_command:
        description: 'Command to lint the codebase (e.g. yarn lint, flake8 ., shellcheck scripts/)'
        required: true
        type: string

      test_command:
        description: |
          Command to run the test suite. Must produce a JUnit XML report at
          the path specified by test_report_path. The test gate parses it
          independently to verify tests actually ran.
          For Jest:   yarn test --ci --reporters=default --reporters=jest-junit
          For pytest: pytest --junitxml=junit.xml --tb=short -q
          For Mocha:  mocha --reporter mocha-junit-reporter
        required: true
        type: string

      lint_glob:
        description: |
          Glob pattern for files in scope for linting. Used to count lint targets
          as evidence for the static analysis gate. Must match at least 1 file.
          Examples: 'src/**/*.{ts,tsx}' | '**/*.py' | 'scripts/**/*.sh'
        required: true
        type: string

      # ── Optional quality gates ─────────────────────────────────────────
      typecheck_command:
        description: |
          Static type checking command. Leave empty for projects without a type
          system (e.g. plain JS, shell scripts).
          Examples: yarn tsc --noEmit | mypy . | npx tsc --noEmit
        required: false
        type: string
        default: ''

      build_command:
        description: |
          Command to produce a build artifact. Leave empty for projects where
          CI doesn't build (mobile apps built via EAS, infra repos, etc.).
          Examples: yarn build | python setup.py bdist_wheel | make
        required: false
        type: string
        default: ''

      test_report_path:
        description: |
          Path to the JUnit XML report produced by the test command.
          Relative to working_directory. The test gate downloads this artifact
          and parses it independently — this is the unfakeable evidence.
          For Jest (jest-junit):  junit.xml
          For pytest:             junit.xml (match --junitxml flag)
          For Mocha:              test-results.xml
        required: false
        type: string
        default: 'junit.xml'

      # ── Runtime setup ──────────────────────────────────────────────────
      node_version:
        description: |
          Node.js version to install. When set, enables the setup-node composite
          action which installs Node, runs yarn install --frozen-lockfile, and
          caches node_modules. Leave empty for non-Node projects.
        required: false
        type: string
        default: ''

      python_version:
        description: |
          Python version to install. When set, enables setup-python.
          Leave empty for non-Python projects.
        required: false
        type: string
        default: ''

      # ── Dependency install ─────────────────────────────────────────────
      pre_install_command:
        description: |
          Command to run before dependency install. Use for system packages or
          other prerequisites. Example: sudo apt-get install -y graphicsmagick
        required: false
        type: string
        default: ''

      install_command:
        description: |
          Dependency install command. For Node projects using node_version, omit
          this — setup-node handles yarn install automatically. Use this for
          non-Node installs (pip, gem, etc.) or when you need a custom install step.
        required: false
        type: string
        default: ''

      # ── Runner config ──────────────────────────────────────────────────
      working_directory:
        description: 'Working directory for all commands. Defaults to repo root.'
        required: false
        type: string
        default: '.'

      runs_on:
        description: 'GitHub Actions runner. Defaults to ubuntu-latest.'
        required: false
        type: string
        default: 'ubuntu-latest'

      timeout_minutes:
        description: 'Timeout for the CI job in minutes.'
        required: false
        type: number
        default: 30

permissions: {}

jobs:
  ci:
    name: ci
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    outputs:
      lint_result:      ${{ steps.lint.outcome }}
      lint_file_count:  ${{ steps.count-lint.outputs.file_count }}
      test_result:      ${{ steps.test.outcome }}
      typecheck_result: ${{ steps.typecheck.outcome }}
      build_result:     ${{ steps.build.outcome }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # Node.js — setup-node composite action handles install + caching.
      - name: Setup Node.js
        if: inputs.node_version != ''
        uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: ${{ inputs.node_version }}
          working-directory: ${{ inputs.working_directory }}

      # Python — setup-python handles install + caching.
      - name: Setup Python
        if: inputs.python_version != ''
        uses: actions/setup-python@v5  # TODO: pin to full commit SHA
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'

      # System or pre-build dependencies (e.g. apt packages).
      - name: Pre-install
        if: inputs.pre_install_command != ''
        run: ${{ inputs.pre_install_command }}

      # Explicit install step — for non-Node projects or custom install needs.
      - name: Install dependencies
        if: inputs.install_command != ''
        run: ${{ inputs.install_command }}

      # ── Evidence collection + quality gates ──────────────────────────────

      - name: Count lint targets
        id: count-lint
        run: |
          FILE_COUNT=$(find . -path './.git' -prune -o -type f -name '*.ts' -print -o -name '*.tsx' -print -o -name '*.js' -print -o -name '*.jsx' -print -o -name '*.py' -print -o -name '*.sh' -print | wc -l | tr -d ' ')
          echo "file_count=$FILE_COUNT" >> "$GITHUB_OUTPUT"

      - id: lint
        name: Lint
        run: ${{ inputs.lint_command }}

      - id: typecheck
        name: Typecheck
        if: inputs.typecheck_command != ''
        run: ${{ inputs.typecheck_command }}

      - id: test
        name: Test
        run: ${{ inputs.test_command }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: ${{ inputs.working_directory }}/${{ inputs.test_report_path }}
          if-no-files-found: warn

      - id: build
        name: Build
        if: inputs.build_command != ''
        run: ${{ inputs.build_command }}

  # Static analysis gate — validates lint + typecheck with evidence.
  static-analysis-gate:
    needs: ci
    if: always()
    uses: sonarmd/workflows/.github/workflows/static-analysis-gate.yml@main
    with:
      lint_result:      ${{ needs.ci.outputs.lint_result }}
      lint_file_count:  ${{ needs.ci.outputs.lint_file_count }}
      typecheck_result: ${{ needs.ci.outputs.typecheck_result }}

  # Test gate — downloads JUnit XML artifact, independently parses <testcase>
  # elements. Does NOT trust caller-provided counts.
  test-gate:
    needs: ci
    if: always()
    uses: sonarmd/workflows/.github/workflows/test-gate.yml@main
    with:
      test_result: ${{ needs.ci.outputs.test_result }}
