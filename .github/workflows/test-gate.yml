name: Test Gate

# Contract gate: verifies that tests passed by INDEPENDENTLY parsing the
# test report artifact. Does NOT trust caller-provided counts.
#
# The calling repo must upload JUnit XML test report(s) as artifact(s) whose
# name starts with 'test-report'. This gate downloads them all and counts
# <testcase> elements. No report = no evidence = gate blocked.
#
# For matrix/sharded jobs, upload each shard as 'test-report-shard-0', etc.
# The gate uses pattern matching to pick up all shards automatically.
#
# Usage (from a per-repo CI workflow):
#
#   test:
#     steps:
#       - run: yarn test --ci --reporters=default --reporters=jest-junit
#       - uses: actions/upload-artifact@v4
#         if: always()
#         with:
#           name: test-report
#           path: junit.xml
#
#   test-gate:
#     needs: [test]
#     if: always()
#     uses: sonarmd/workflows/.github/workflows/test-gate.yml@main
#     with:
#       test_result: ${{ needs.test.result }}

on:
  workflow_call:
    inputs:
      test_result:
        description: |
          Result of the test stage. Must be 'success'. Cannot be skipped.
          Accepts: 'success' | 'failure' | 'skipped' | 'cancelled'
        required: true
        type: string

      report_artifact:
        description: |
          Name prefix of the uploaded artifact(s) containing JUnit XML test reports.
          Defaults to 'test-report'. For single artifacts, upload as 'test-report'.
          For matrix/sharded jobs, upload each as 'test-report-shard-0', etc.
          The gate matches all artifacts starting with this prefix.
          Must contain at least one .xml file with <testcase> elements.
        required: false
        type: string
        default: 'test-report'

    outputs:
      gate_result:
        description: 'success or failure'
        value: ${{ jobs.validate.outputs.result }}

permissions: {}

jobs:
  validate:
    name: test-gate
    runs-on: ubuntu-latest
    permissions:
      actions: read   # required to download artifacts
    outputs:
      result: ${{ steps.evaluate.outputs.result }}
    steps:
      - name: Download test report
        id: download
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.report_artifact }}*
          path: _reports/
        continue-on-error: true

      - name: Evaluate test gate
        id: evaluate
        env:
          TEST_RESULT:     ${{ inputs.test_result }}
          DOWNLOAD_RESULT: ${{ steps.download.outcome }}
        run: |
          set -euo pipefail

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Test Gate"
          echo "  repo:   ${{ github.repository }}"
          echo "  sha:    ${{ github.sha }}"
          echo "  run:    ${{ github.run_id }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          FAILED=false

          # 1. Test job must have succeeded.
          case "$TEST_RESULT" in
            success)
              printf "  ✓  %-16s  %s\n" "test-status" "passed"
              ;;
            skipped|'')
              printf "  ✗  %-16s  BLOCKED — tests cannot be skipped\n" "test-status"
              FAILED=true
              ;;
            *)
              printf "  ✗  %-16s  %s\n" "test-status" "$TEST_RESULT"
              FAILED=true
              ;;
          esac

          # 2. Test report artifact must exist.
          if [[ "$DOWNLOAD_RESULT" != "success" ]]; then
            printf "  ✗  %-16s  BLOCKED — no test report artifact found\n" "test-report"
            printf "     Upload a JUnit XML artifact named '%s'\n" "${{ inputs.report_artifact }}"
            FAILED=true
          else
            printf "  ✓  %-16s  %s\n" "test-report" "artifact downloaded"

            # 3. Parse JUnit XML — count <testcase> elements independently.
            TEST_COUNT=0
            for xml in _reports/*.xml _reports/**/*.xml; do
              [[ -f "$xml" ]] || continue
              # Count testcase elements. grep -c counts lines matching the pattern.
              COUNT=$(grep -c '<testcase' "$xml" 2>/dev/null || true)
              TEST_COUNT=$(( TEST_COUNT + COUNT ))
            done

            if [[ "$TEST_COUNT" -gt 0 ]]; then
              printf "  ✓  %-16s  %s tests verified from report\n" "test-evidence" "$TEST_COUNT"
            else
              printf "  ✗  %-16s  BLOCKED — zero <testcase> elements in report\n" "test-evidence"
              FAILED=true
            fi
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [[ "$FAILED" == "true" ]]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "::error::Test gate blocked. See above."
            exit 1
          fi

          echo "result=success" >> "$GITHUB_OUTPUT"
          echo "  Test gate passed — $TEST_COUNT tests independently verified"
