name: Preflight

# Required workflow — circuit breaker for PR CI runs.
# If the last 3 CI runs on this branch all failed, blocks the PR
# to stop developers from burning CI minutes on broken code.
# Resets automatically when a passing run breaks the streak.
#
# Setup (org admin, one time):
#   Settings > Rulesets > New ruleset (or edit existing)
#   - Require workflows to pass > Add workflow
#   - Repository: sonarmd/workflows
#   - Workflow: .github/workflows/preflight.yml
#   - Ref: main

on:
  pull_request:
    branches: [master, 'release/**']

permissions: {}

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      actions: read
    steps:
      - name: Check recent CI history
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ github.head_ref }}"
          REPO="${{ github.repository }}"

          # Find the CI workflow file for this repo
          CI_FILE=$(gh api "repos/${REPO}/actions/workflows" \
            --jq '.workflows[] | select(.name == "CI") | .path' 2>/dev/null | head -1)

          if [ -z "$CI_FILE" ]; then
            echo "No CI workflow found — passing preflight"
            exit 0
          fi

          WORKFLOW_FILE=$(basename "$CI_FILE")

          CONCLUSIONS=$(gh api "repos/${REPO}/actions/workflows/${WORKFLOW_FILE}/runs?branch=${BRANCH}&per_page=3&status=completed" \
            --jq '[.workflow_runs[].conclusion] | join(",")' 2>/dev/null || echo "")

          echo "Last 3 CI runs on ${BRANCH}: ${CONCLUSIONS:-none yet}"

          if [ "$CONCLUSIONS" = "failure,failure,failure" ]; then
            echo "::error::Preflight FAILED — 3 consecutive CI failures on ${BRANCH}."
            echo "::error::Fix your code locally before pushing again."

            cat >> "$GITHUB_STEP_SUMMARY" <<'SUMMARY'
          ### Preflight: BLOCKED

          **Circuit breaker tripped.** The last 3 CI runs on this branch all failed.

          Fix the issue locally and push a clean commit to reset the breaker.
          SUMMARY
            exit 1
          fi

          echo "Preflight passed — CI history is clean"
