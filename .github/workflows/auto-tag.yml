name: Auto-Tag

# Creates an environment-prefixed, auto-incrementing tag. That's it.
# Does NOT build. Does NOT create a release. Does NOT notify.
# The tag push triggers draft-release.yml in the calling repo.
#
# Tag format: {env}-{repo_short}-{version}-b{N}
#   release/** merge -> stg-api-1.0.0-b42
#   master merge     -> prd-api-1.0.0-b42

on:
  workflow_call:
    inputs:
      repo_short:
        description: Short repo identifier for tag prefix (api, fe, mobile)
        type: string
        required: true
    outputs:
      tag:
        description: The created tag (e.g. stg-api-1.0.0-b42)
        value: ${{ jobs.tag.outputs.tag }}
      skipped:
        description: "'true' if tagging was skipped"
        value: ${{ jobs.tag.outputs.skipped }}
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: true

permissions: {}

jobs:
  tag:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.create.outputs.tag }}
      skipped: ${{ steps.create.outputs.skipped }}
    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@581a835fb51b8e7ec56b71cf2ffddd7e68bb25e0  # v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://smd_agora_shared/4skvt7l46qfd42ndku2ermwyly/appid
          APP_PRIVATE_KEY: op://smd_agora_shared/twqeia3cpwcinjptjrnft5m3y4/notesPlain
        with:
          export-env: true

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1
        with:
          app-id: ${{ env.APP_ID }}
          private-key: ${{ env.APP_PRIVATE_KEY }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Create tag
        id: create
        env:
          SHORT: ${{ inputs.repo_short }}
        shell: bash
        run: |
          set -euo pipefail

          # Skip directives
          LAST_MSG=$(git log -1 --pretty=%B)
          if echo "$LAST_MSG" | grep -qiE '\[skip[ -]tag\]|\[skip[ -]release\]|\[no[ -]tag\]'; then
            echo "Skip directive found. Not tagging."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Resolve environment from branch
          BRANCH="${GITHUB_REF#refs/heads/}"
          case "$BRANCH" in
            release/*) TAG_ENV="stg" ;;
            master|main) TAG_ENV="prd" ;;
            *)
              echo "::error::Auto-tag only runs on release/** and master. Got: $BRANCH"
              exit 1
              ;;
          esac

          # Detect version
          if [ -f package.json ]; then
            VERSION=$(python3 -c "import json; print(json.load(open('package.json')).get('version', '0.0.0'))")
          elif [ -f pyproject.toml ]; then
            VERSION=$(python3 -c "
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          with open('pyproject.toml', 'rb') as f:
              d = tomllib.load(f)
          print(d.get('project',{}).get('version', d.get('tool',{}).get('poetry',{}).get('version','0.0.0')))
          " 2>/dev/null || echo "0.0.0")
          else
            VERSION="0.0.0"
          fi

          # Increment build number
          PREFIX="${TAG_ENV}-${SHORT}-${VERSION}"
          LATEST_B=$(git tag -l "${PREFIX}-b*" | sed "s/${PREFIX}-b//" | sort -n | tail -1)
          TAG="${PREFIX}-b$(( ${LATEST_B:-0} + 1 ))"

          # Idempotency: skip if tag exists
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Skipping."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Create and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "skipped=false" >> "$GITHUB_OUTPUT"

          echo "### Auto-Tag: \`$TAG\`" >> "$GITHUB_STEP_SUMMARY"
