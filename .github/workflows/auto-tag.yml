name: Auto Tag

on:
  workflow_call:
    inputs:
      bump:
        description: "Version bump type (patch, minor, major). If empty, inferred from commit messages."
        type: string
        required: false
        default: ''
    outputs:
      tag:
        description: The created tag name (e.g., v2.1.1)
        value: ${{ jobs.tag.outputs.tag }}
      version:
        description: The version string without v prefix
        value: ${{ jobs.tag.outputs.version }}
      skipped:
        description: "true if tagging was skipped"
        value: ${{ jobs.tag.outputs.skipped }}

permissions: {}

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.auto-tag.outputs.tag }}
      version: ${{ steps.auto-tag.outputs.version }}
      skipped: ${{ steps.auto-tag.outputs.skipped }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Auto tag
        id: auto-tag
        env:
          BUMP_INPUT: ${{ inputs.bump }}
        run: |
          set -euo pipefail

          # Skip directives
          LAST_MSG=$(git log -1 --pretty=%B)
          if echo "$LAST_MSG" | grep -qiE '\[skip[ -]tag\]|\[skip[ -]release\]|\[no[ -]tag\]'; then
            echo "Skip directive found in commit message; not tagging."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Find latest version tag
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | grep -v '_rc$' | head -n 1)
          LATEST="${LATEST:-v0.0.0}"
          echo "Latest tag: $LATEST"

          # Parse version
          VERSION="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Determine bump type
          BUMP="${BUMP_INPUT}"
          if [ -z "$BUMP" ]; then
            # Infer from merge commit (squash or merge commit includes PR commits)
            MERGE_LOG=$(git log -1 --pretty=%B)
            if echo "$MERGE_LOG" | grep -qiE '^feat!:|BREAKING CHANGE'; then
              BUMP="major"
            elif echo "$MERGE_LOG" | grep -qiE '^feat:'; then
              BUMP="minor"
            else
              BUMP="patch"
            fi
          fi

          # Bump
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            *) echo "Unknown bump type: $BUMP"; exit 1 ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"

          # Check if tag exists
          if git tag -l "$NEW_TAG" | grep -q .; then
            echo "Tag $NEW_TAG already exists; skipping."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Create and push tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "skipped=false" >> "$GITHUB_OUTPUT"

          echo "### Auto Tag" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag**: \`$NEW_TAG\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Previous**: \`$LATEST\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Bump**: \`$BUMP\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit**: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
