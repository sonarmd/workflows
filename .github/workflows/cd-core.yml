name: CD

# ── Caller example ────────────────────────────────────────────────────────
#
#   name: CD
#   on:
#     push:
#       branches: [master, 'release/**']
#   concurrency:
#     group: cd-${{ github.ref_name }}
#     cancel-in-progress: false
#   jobs:
#     cd:
#       uses: sonarmd/workflows/.github/workflows/cd-core.yml
#       secrets: inherit
#
# Required repo variable: DEPLOY_IDENTIFIER (e.g. "api", "fe", "mobile")

on:
  workflow_call:
    secrets:
      SLACK_WEBHOOK_URL:
        required: false
      PLATFORM_TOKEN:
        required: false

permissions:
  contents: write
  actions: read

jobs:
  cd:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:

      - uses: actions/checkout@v4
        with:
          sparse-checkout: deploy.json
          sparse-checkout-cone-mode: false
          fetch-depth: 2

      - name: Checkout platform actions
        id: platform-checkout
        uses: actions/checkout@v4
        with:
          repository: sonarmd/workflows
          ref: main
          path: _platform
          token: ${{ secrets.PLATFORM_TOKEN || github.token }}
        continue-on-error: true

      - name: Assert platform checkout succeeded
        if: steps.platform-checkout.outcome != 'success'
        shell: bash
        run: |
          echo "::error::cd-core: failed to checkout sonarmd/workflows."
          echo "::error::  Create org secret PLATFORM_TOKEN with contents:read on sonarmd/workflows."
          exit 1

      - name: Resolve context
        id: ctx
        run: |
          set -euo pipefail

          IDENTIFIER="${{ vars.DEPLOY_IDENTIFIER }}"
          if [ -z "$IDENTIFIER" ]; then
            echo "::error::cd-core: repo variable DEPLOY_IDENTIFIER is not set"
            echo "::error::  Set it in repo Settings → Variables → Actions"
            exit 1
          fi

          case "${{ github.ref_name }}" in
            main|master)
              ENV=prd
              # Version from PR merge context (most reliable)
              VERSION="${{ github.event.pull_request.head.ref }}"
              if echo "$VERSION" | grep -qP '^release/v[0-9]+\.[0-9]+\.[0-9]+$'; then
                VERSION="${VERSION#release/v}"
              else
                # Fallback: merge commit message
                VERSION=$(git log -1 --pretty=%B | grep -oP 'release/v\K[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "")
              fi
              if [ -z "$VERSION" ]; then
                echo "::error::cd-core: cannot determine version for prd — merge must be from release/vX.Y.Z"
                exit 1
              fi
              ;;
            release/v*)
              ENV=stg
              VERSION="${{ github.ref_name }}"
              VERSION="${VERSION#release/v}"
              ;;
            *)
              echo "::error::cd-core: unexpected branch '${{ github.ref_name }}' — must be main, master, or release/vX.Y.Z"
              exit 1
              ;;
          esac

          TAG="${ENV}-${IDENTIFIER}-v${VERSION}-b${GITHUB_RUN_NUMBER}"

          echo "env=$ENV"               >> "$GITHUB_OUTPUT"
          echo "identifier=$IDENTIFIER" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"               >> "$GITHUB_OUTPUT"
          echo "cd-core: $TAG"

      - name: Download CI artifact
        uses: ./_platform/actions/download-ci-artifact

      - name: Create tag and release
        id: release
        uses: ./_platform/actions/create-tag-release
        with:
          tag:           ${{ steps.ctx.outputs.tag }}
          environment:   ${{ steps.ctx.outputs.env }}
          artifact_path: artifact/release.tar.gz

      - name: Notify Slack
        uses: ./_platform/actions/notify-slack
        with:
          webhook_url:    ${{ secrets.SLACK_WEBHOOK_URL }}
          status:         success
          app_name:       ${{ steps.ctx.outputs.identifier }}
          environment:    ${{ steps.ctx.outputs.env }}
          tag:            ${{ steps.ctx.outputs.tag }}
          deploy_command: 'deploy ${{ steps.ctx.outputs.env }} ${{ steps.ctx.outputs.identifier }} ${{ steps.ctx.outputs.tag }} ${{ steps.release.outputs.artifact_url }}'

      - name: Release lifecycle
        if: steps.ctx.outputs.env == 'prd'
        uses: ./_platform/actions/release-lifecycle
        with:
          token: ${{ github.token }}

      - name: Notify Slack on failure
        if: failure()
        uses: ./_platform/actions/notify-slack
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status:      failure
          app_name:    ${{ steps.ctx.outputs.identifier }}
          environment: ${{ steps.ctx.outputs.env }}
          tag:         ${{ steps.ctx.outputs.tag }}
          details:     'oh no failed on deploy: ${{ job.status }}'
