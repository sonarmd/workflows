name: CD

# ── Caller example ────────────────────────────────────────────────────────
#
#   name: CD
#   on:
#     push:
#       branches: [master, 'release/**']
#   concurrency:
#     group: cd-${{ github.ref_name }}
#     cancel-in-progress: false
#   jobs:
#     cd:
#       uses: sonarmd/workflows/.github/workflows/cd-core.yml@main
#       secrets: inherit
#       permissions:
#         contents: write   # create tags and GitHub releases
#         actions: read     # download CI artifacts
#
# Required repo variable: DEPLOY_IDENTIFIER (e.g. "api", "fe", "mobile")

on:
  workflow_call:
    inputs:
      pre_build:
        description: 'Shell commands to run before the build (e.g. apt installs). Only used for fallback builds.'
        type: string
        required: false
        default: ''
      build:
        description: 'Build command to run (e.g. yarn build). Required if fallback build is needed.'
        type: string
        required: false
        default: ''
      artifact_paths:
        description: 'Space-separated paths to include in the release tarball (e.g. "dist/ node_modules/ package.json"). Required if fallback build is needed.'
        type: string
        required: false
        default: ''
      node_version:
        description: 'Node.js version to use for fallback builds.'
        type: string
        required: false
        default: '22'
    secrets:
      SLACK_WEBHOOK_URL:
        required: false

# Workflow-level permissions are empty — permissions are declared at the job
# level so calling repos must explicitly grant contents: write and actions: read.
permissions: {}

jobs:
  cd:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # create tags and GitHub releases
      actions: read     # download CI artifacts

    steps:

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: deploy.json
          sparse-checkout-cone-mode: false
          fetch-depth: 2

      - name: Resolve context
        id: ctx
        shell: bash
        run: |
          set -euo pipefail

          IDENTIFIER="${{ vars.DEPLOY_IDENTIFIER }}"
          if [ -z "$IDENTIFIER" ]; then
            echo "::error::cd-core: repo variable DEPLOY_IDENTIFIER is not set"
            echo "::error::  Set it in repo Settings → Variables → Actions"
            exit 1
          fi

          case "${{ github.ref_name }}" in
            main|master)
              ENV=prd
              VERSION="${{ github.event.pull_request.head.ref }}"
              if echo "$VERSION" | grep -qP '^release/v[0-9]+\.[0-9]+\.[0-9]+$'; then
                VERSION="${VERSION#release/v}"
              else
                VERSION=$(git log -1 --pretty=%B | grep -oP 'release/v\K[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "")
              fi
              if [ -z "$VERSION" ]; then
                echo "::error::cd-core: cannot determine version for prd — merge must be from release/vX.Y.Z"
                exit 1
              fi
              ;;
            release/v*)
              ENV=stg
              VERSION="${{ github.ref_name }}"
              VERSION="${VERSION#release/v}"
              ;;
            *)
              echo "::error::cd-core: unexpected branch '${{ github.ref_name }}' — must be main, master, or release/vX.Y.Z"
              exit 1
              ;;
          esac

          TAG="${ENV}-${IDENTIFIER}-v${VERSION}-b${GITHUB_RUN_NUMBER}"

          echo "env=$ENV"               >> "$GITHUB_OUTPUT"
          echo "identifier=$IDENTIFIER" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"               >> "$GITHUB_OUTPUT"
          echo "cd-core: $TAG"

      - name: Download CI artifact
        id: download
        uses: sonarmd/workflows/actions/download-ci-artifact@main
        with:
          required: 'false'

      # ── Fallback build (runs only when no CI artifact exists) ────────────

      - name: Fallback — full checkout
        if: steps.download.outputs.found == 'false'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fallback — setup Node
        if: steps.download.outputs.found == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Fallback — install dependencies
        if: steps.download.outputs.found == 'false'
        shell: bash
        run: yarn install --frozen-lockfile

      - name: Fallback — pre-build
        if: steps.download.outputs.found == 'false' && inputs.pre_build != ''
        shell: bash
        run: ${{ inputs.pre_build }}

      - name: Fallback — build
        if: steps.download.outputs.found == 'false'
        shell: bash
        run: |
          if [ -z "${{ inputs.build }}" ]; then
            echo "::error::cd-core: no CI artifact found and no 'build' input provided — cannot proceed"
            exit 1
          fi
          ${{ inputs.build }}

      - name: Fallback — package artifact
        if: steps.download.outputs.found == 'false'
        shell: bash
        run: |
          if [ -z "${{ inputs.artifact_paths }}" ]; then
            echo "::error::cd-core: no CI artifact found and no 'artifact_paths' input provided — cannot proceed"
            exit 1
          fi
          mkdir -p artifact
          # shellcheck disable=SC2086
          tar -czf artifact/release.tar.gz ${{ inputs.artifact_paths }}
          echo "cd-core: fallback artifact packaged ($(du -sh artifact/release.tar.gz | cut -f1))"

      # ─────────────────────────────────────────────────────────────────────

      - name: Create tag and release
        id: release
        uses: sonarmd/workflows/actions/create-tag-release@main
        with:
          tag:           ${{ steps.ctx.outputs.tag }}
          environment:   ${{ steps.ctx.outputs.env }}
          artifact_path: artifact/release.tar.gz

      - name: Notify Slack
        uses: sonarmd/workflows/actions/notify-slack@main
        with:
          webhook_url:    ${{ secrets.SLACK_WEBHOOK_URL }}
          status:         success
          app_name:       ${{ steps.ctx.outputs.identifier }}
          environment:    ${{ steps.ctx.outputs.env }}
          tag:            ${{ steps.ctx.outputs.tag }}
          deploy_command: 'deploy ${{ steps.ctx.outputs.env }} ${{ steps.ctx.outputs.identifier }} ${{ steps.ctx.outputs.tag }} ${{ steps.release.outputs.artifact_url }}'

      - name: Release lifecycle
        if: steps.ctx.outputs.env == 'prd'
        uses: sonarmd/workflows/actions/release-lifecycle@main
        with:
          token: ${{ github.token }}

      - name: Notify Slack on failure
        if: failure()
        uses: sonarmd/workflows/actions/notify-slack@main
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status:      failure
          app_name:    ${{ steps.ctx.outputs.identifier }}
          environment: ${{ steps.ctx.outputs.env }}
          tag:         ${{ steps.ctx.outputs.tag }}
          details:     'oh no failed on deploy: ${{ job.status }}'
