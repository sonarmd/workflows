name: CD

# ── Caller example dumb af claudes stop touching my shit ────────────────────────────────────────────────────────
#
# In practice this is invoked by cicd-orchestrator.yml, not directly. If you
# do invoke it directly, the caller is the single source of truth for
# GITHUB_TOKEN scopes — declare them on the caller's `permissions:` block;
# this workflow declares none of its own.
#
#   name: CD
#   on:
#     push:
#       branches: ['release/**']
#   concurrency:
#     group: cd-${{ github.ref_name }}
#     cancel-in-progress: true
#   permissions:
#     contents: write   # create tags and GitHub releases
#     actions: read     # download CI artifacts
#     packages: read    # pull release tarball from GHCR-backed store
#   jobs:
#     cd:
#       uses: sonarmd/workflows/.github/workflows/cd-core.yml@main
#       secrets: inherit
#
# Required repo variable: DEPLOY_IDENTIFIER (e.g. "api", "fe", "mobile")

on:
  workflow_call:
    # No inputs. cd-core discovers the CI artifact by commit SHA.
    # The orchestrator gates CD on CI success, so the run is guaranteed
    # to be completed by the time we get here.
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: true

# No `permissions:` block — the caller's grant flows through unchanged.
# This workflow needs contents:write (create tags + GitHub releases),
# actions:read (discover prior workflow runs), and packages:read (pull
# release tarball from the GHCR-backed store). The caller must offer
# those scopes.

jobs:
  # Inner job name is `run`, not `cd`, so callers don't get a doubled
  # `cicd / cd / cd` segment in the check-run display. The middle `cd`
  # segment comes from the orchestrator's lane name; this inner segment
  # is the leaf's action ("run the deploy steps").
  cd-core:
    name: run
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    env:
      # Forward-compat: node20 action runtime deprecates 2026-06-02. Opt in
      # to node24 now so actions that haven't republished (download-artifact,
      # github-script, 1password/load-secrets) run on node24.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      # All secrets that the visibility surfaces and the existing failure
      # notifier need are GitHub repo/org secrets. Lift them to job-level env
      # vars here; downstream steps read them as env.X to match the existing
      # SLACK_WEBHOOK_URL precedent. 1password/load-secrets-action only
      # exports op:// refs, so direct GH secrets must come through this block.
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: deploy.json
          sparse-checkout-cone-mode: false
          fetch-depth: 2

      # Content address: HEAD's root tree hash identifies the artifact. On a
      # master/main promote this equals the release tip's tree (release is
      # always cut from master and runs ahead, so master is its ancestor and
      # the merge leaves the tree identical), so the stg artifact is found and
      # promoted without a rebuild. Invariant across SHA-rewriting merges.
      - name: Compute tree hash
        id: tree
        shell: bash
        run: echo "hash=$(git rev-parse HEAD^{tree})" >> "$GITHUB_OUTPUT"

      - name: Load secrets
        uses: 1password/load-secrets-action@581a835fb51b8e7ec56b71cf2ffddd7e68bb25e0 # v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        with:
          export-env: true

      - name: Resolve context
        id: ctx
        uses: actions/github-script@v8
        env:
          IDENTIFIER_VAR: ${{ vars.DEPLOY_IDENTIFIER }}
          TREE: ${{ steps.tree.outputs.hash }}
        with:
          script: |
            const identifier = process.env.IDENTIFIER_VAR;
            if (!identifier) {
              core.setFailed('cd-core: repo variable DEPLOY_IDENTIFIER is not set (repo Settings → Variables → Actions)');
              return;
            }
            const { owner, repo } = context.repo;
            const ref = context.ref.replace('refs/heads/', '');

            // ── release/vX.Y.Z → new prerelease on stg ──────────────────
            const releaseMatch = ref.match(/^release\/v(\d+\.\d+\.\d+)$/);
            if (releaseMatch) {
              const version = releaseMatch[1];
              core.notice(`cd-core: release/** → creating prerelease stg ${identifier} v${version}`);
              core.setOutput('env',        'stg');
              core.setOutput('identifier', identifier);
              core.setOutput('version',    version);
              return;
            }

            // -- master / main -> promote existing prerelease to prd ------
            if (ref === 'master' || ref === 'main') {
              // Content address: find the stg prerelease built from the same
              // tree as this master HEAD. release is always cut from master and
              // runs ahead, so master HEAD's tree equals the release tip's tree
              // -- the artifact is the same bytes no matter how the
              // release->master merge rewrote the commit SHA. Match on the
              // cd-core-tree body marker, not the SHA.
              const tree = process.env.TREE;
              if (!/^[0-9a-f]{40}$/.test(tree || '')) {
                core.setFailed(`cd-core: tree hash '${tree}' is not a 40-hex sha`);
                return;
              }
              const marker = `<!-- cd-core-tree:${tree} -->`;
              const prereleasePrefix = `stg-${identifier}-v`;

              let matched;
              let scanned = 0;
              let page = 1;
              while (!matched) {
                const { data } = await github.rest.repos.listReleases({
                  owner, repo, per_page: 100, page,
                });
                if (!Array.isArray(data) || data.length === 0) break;
                for (const r of data) {
                  if (r.prerelease && r.tag_name.startsWith(prereleasePrefix)) {
                    scanned += 1;
                    if (r.body && r.body.includes(marker)) { matched = r; break; }
                  }
                }
                if (data.length < 100) break;
                page += 1;
              }
              core.info(`cd-core: scanned ${scanned} stg-${identifier}-v* prereleases for tree ${tree}`);

              if (!matched) {
                // No stg artifact was built from this tree. Refuse to ship an
                // unversioned/unbuilt prd release -- fail loudly instead of the
                // old YOLO-v404 fallback that silently shipped "unknown version"
                // to prod. Run the release/vX.Y.Z -> master flow first.
                core.setFailed(
                  `cd-core: no stg-${identifier} prerelease was built from tree ${tree}. ` +
                  `Promote requires the matching stg artifact -- run the ` +
                  `release/vX.Y.Z -> master flow so the prerelease exists before ` +
                  `pushing to ${ref}. Refusing to ship an unversioned prd build.`
                );
                return;
              }

              // Strip the exact `stg-${identifier}-v` prefix rather than a regex,
              // so identifiers containing hyphens (e.g. `core-api`) parse correctly.
              const versionTail = matched.tag_name.slice(prereleasePrefix.length);
              const m = versionTail.match(/^(\d+\.\d+\.\d+)/);
              if (!m) {
                core.setFailed(`cd-core: matched prerelease '${matched.tag_name}' has no parseable version`);
                return;
              }
              const version = m[1];
              core.notice(`cd-core: master/main -> promoting ${matched.tag_name} -> prd ${identifier} v${version} (tree ${tree})`);
              core.setOutput('env',            'prd');
              core.setOutput('identifier',     identifier);
              core.setOutput('version',        version);
              core.setOutput('promoted_from',  matched.tag_name);
              return;
            }

            // ── release/* without parseable semver → YOLO stg prerelease ──
            // CD does not gatekeep on branch naming. If the ref is under
            // release/ but does not match release/vX.Y.Z, emit a v404 stg
            // prerelease ("unknown version"). The v404 marker is deliberately
            // not parseable as semver, so a downstream master/main promote
            // lookup cannot lift it into prd. YOLO stays on stg.
            if (ref.startsWith('release/')) {
              const version = '404';
              core.notice(`cd-core: release/** no version — YOLO prerelease stg ${identifier} v${version}`);
              core.setOutput('env',        'stg');
              core.setOutput('identifier', identifier);
              core.setOutput('version',    version);
              return;
            }

            core.setFailed(`cd-core: unexpected ref '${ref}' — cd should only run on release/*, master, or main`);

      - name: Derive build number
        id: build
        uses: actions/github-script@v8
        env:
          ENV: ${{ steps.ctx.outputs.env }}
          IDENTIFIER: ${{ steps.ctx.outputs.identifier }}
          VERSION: ${{ steps.ctx.outputs.version }}
        with:
          script: |
            const env        = process.env.ENV;
            const identifier = process.env.IDENTIFIER;
            const version    = process.env.VERSION;
            const { owner, repo } = context.repo;

            // Per-version scope: `prd-api-v1.8.0-b*` builds are numbered
            // independently from `prd-api-v1.7.0-b*`. Every new version
            // resets to b1. Cleaner semantics than a monotonic counter
            // across the whole env+identifier.
            const escapeRegExp = (value) => String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const prefix = `${env}-${identifier}-v${version}-b`;
            const bPattern = new RegExp(`^${escapeRegExp(prefix)}(\\d+)$`);

            let page = 1;
            let lastBuild = 0;
            while (true) {
              const { data } = await github.rest.repos.listReleases({
                owner, repo, per_page: 100, page,
              });
              if (data.length === 0) break;
              for (const r of data) {
                const m = r.tag_name.match(bPattern);
                if (m) lastBuild = Math.max(lastBuild, parseInt(m[1]));
              }
              if (data.length < 100) break;
              page++;
            }

            const buildNumber = lastBuild + 1;
            const tag = `${env}-${identifier}-v${version}-b${buildNumber}`;
            core.info(`cd-core: ${tag}`);
            core.setOutput('tag', tag);

      # Cache check: prefer an existing release asset for this tree hash over
      # the staged Actions artifact from the same workflow run. On cache hit
      # the CI job skipped bundle/sign/stage; pull straight from the release.
      # Keyed on the cd-core-tree body marker so an identical tree under a
      # rewritten SHA still hits (this is what lets prod reuse the stg bytes).
      - name: Probe release for tree hash
        id: probe
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TREE: ${{ steps.tree.outputs.hash }}
        shell: bash
        run: |
          set -euo pipefail
          tag=$(gh api -X GET "repos/$GH_REPO/releases" --paginate \
                | jq -r --arg marker "<!-- cd-core-tree:$TREE -->" \
                    '.[] | select(.body != null and (.body | contains($marker))) | .tag_name' \
                | head -n1)
          if [ -n "$tag" ] && gh release view "$tag" --repo "$GH_REPO" --json assets \
              | jq -e '.assets[] | select(.name == "release.tar.gz")' >/dev/null; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "tag=$tag"     >> "$GITHUB_OUTPUT"
            echo "release-probe: HIT - $tag"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "release-probe: MISS"
          fi

      - name: Pull release asset (cache hit)
        if: steps.probe.outputs.present == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.probe.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifact
          gh release download "$TAG" --repo "$GH_REPO" \
            --pattern 'release.tar.gz*' --dir artifact

      - name: Pull staged artifact (cache miss)
        if: steps.probe.outputs.present != 'true'
        uses: actions/download-artifact@v4
        with:
          name: release-${{ steps.tree.outputs.hash }}
          path: artifact

      - name: Create tag
        uses: sonarmd/workflows/actions/create-tag@main
        with:
          tag: ${{ steps.build.outputs.tag }}

      - name: Create release
        id: release
        uses: sonarmd/workflows/actions/create-release@main
        with:
          tag: ${{ steps.build.outputs.tag }}
          environment: ${{ steps.ctx.outputs.env }}
          tree_hash: ${{ steps.tree.outputs.hash }}

      - name: Upload artifact
        id: artifact
        uses: sonarmd/workflows/actions/upload-release-asset@main
        with:
          tag: ${{ steps.build.outputs.tag }}
          artifact_path: artifact/release.tar.gz
          release_id: ${{ steps.release.outputs.release_id }}

      # Visibility surfaces (open-deployment + slack-deploy-message) replace
      # the old single signal-deployment step. The Slack message keeps the
      # existing trigger text format ("deploy ENV APP TAG ARTIFACT_URL") in
      # its text fallback so the Ansible parser is unchanged. The GitHub
      # Deployment object lights up the repo Environments tab and the Jira
      # Deployments panel (via the Atlassian for GitHub app).

      - name: Open GitHub Deployment
        id: deployment
        # Visibility surface only (Environments tab + Jira Deployments
        # panel). The deploy itself is triggered by the Slack message
        # below; a GitHub-API hiccup here must not block the deploy.
        continue-on-error: true
        uses: sonarmd/workflows/actions/open-deployment@main
        with:
          environment: ${{ steps.ctx.outputs.env }}
          ref: ${{ github.sha }}
          description: "Deploying ${{ steps.ctx.outputs.identifier }} to ${{ steps.ctx.outputs.env }} (${{ steps.build.outputs.tag }})"
          production: ${{ steps.ctx.outputs.env == 'prd' && 'true' || 'false' }}

      - name: Slack deploy message
        id: slack
        uses: sonarmd/workflows/actions/slack-deploy-message@main
        with:
          bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
          webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
          channel: ${{ vars.SLACK_DEPLOY_CHANNEL }}
          app: ${{ steps.ctx.outputs.identifier }}
          env: ${{ steps.ctx.outputs.env }}
          tag: ${{ steps.build.outputs.tag }}
          sha: ${{ github.sha }}
          artifact_url: ${{ steps.artifact.outputs.artifact_url }}
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}

      - name: Notify Slack on failure
        if: failure()
        uses: sonarmd/workflows/actions/notify-slack@main
        with:
          webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
          status: failure
          app_name: ${{ steps.ctx.outputs.identifier }}
          environment: ${{ steps.ctx.outputs.env }}
          tag: ${{ steps.build.outputs.tag }}
          details: ${{ job.status }}
