name: CD

# ── Caller example ────────────────────────────────────────────────────────
#
#   name: CD
#   on:
#     push:
#       branches: ['release/**']
#   concurrency:
#     group: cd-${{ github.ref_name }}
#     cancel-in-progress: true
#   jobs:
#     cd:
#       permissions:
#         contents: write   # create tags and GitHub releases
#         actions: read     # download CI artifacts
#       uses: sonarmd/workflows/.github/workflows/cd-core.yml@main
#       secrets: inherit
#
# Required repo variable: DEPLOY_IDENTIFIER (e.g. "api", "fe", "mobile")

on:
  workflow_call:
    inputs:
      ci_run_id:
        description: |
          Run ID that produced the `release` artifact. When called from
          ci-cd-core, pass the current run id (internal CI path) or the
          external run id (external CI path). If empty, cd-core falls back
          to legacy discovery by SHA.
        required: false
        type: string
        default: ''
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: true

permissions: {}

jobs:
  cd:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # create tags and GitHub releases
      actions: read     # download CI artifacts

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: deploy.json
          sparse-checkout-cone-mode: false
          fetch-depth: 2

      - name: Load secrets
        uses: 1password/load-secrets-action@581a835fb51b8e7ec56b71cf2ffddd7e68bb25e0  # v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          export-env: true

      - name: Resolve context
        id: ctx
        shell: bash
        run: |
          set -euo pipefail

          IDENTIFIER="${{ vars.DEPLOY_IDENTIFIER }}"
          if [ -z "$IDENTIFIER" ]; then
            echo "::error::cd-core: repo variable DEPLOY_IDENTIFIER is not set"
            echo "::error::  Set it in repo Settings → Variables → Actions"
            exit 1
          fi

          case "${{ github.ref_name }}" in
            main|master)
              ENV=prd
              VERSION="${{ github.event.pull_request.head.ref }}"
              if echo "$VERSION" | grep -qP '^release/v[0-9]+\.[0-9]+\.[0-9]+$'; then
                VERSION="${VERSION#release/v}"
              else
                VERSION=$(git log -1 --pretty=%B | grep -oP 'release/v\K[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "")
              fi
              if [ -z "$VERSION" ]; then
                echo "::error::cd-core: cannot determine version for prd — merge must be from release/vX.Y.Z"
                exit 1
              fi
              ;;
            release/v*)
              ENV=stg
              VERSION="${{ github.ref_name }}"
              VERSION="${VERSION#release/v}"
              ;;
            *)
              echo "::error::cd-core: unexpected branch '${{ github.ref_name }}' — must be main, master, or release/vX.Y.Z"
              exit 1
              ;;
          esac

          echo "env=$ENV"               >> "$GITHUB_OUTPUT"
          echo "identifier=$IDENTIFIER" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"

      - name: Derive build number
        id: build
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        env:
          ENV:        ${{ steps.ctx.outputs.env }}
          IDENTIFIER: ${{ steps.ctx.outputs.identifier }}
          VERSION:    ${{ steps.ctx.outputs.version }}
        with:
          script: |
            const env        = process.env.ENV;
            const identifier = process.env.IDENTIFIER;
            const version    = process.env.VERSION;
            const { owner, repo } = context.repo;
            const prefix = `${env}-${identifier}-`;
            const bPattern = /^.+-b(\d+)$/;

            let page = 1;
            let lastBuild = 0;
            while (true) {
              const { data } = await github.rest.repos.listReleases({
                owner, repo, per_page: 100, page,
              });
              if (data.length === 0) break;
              for (const r of data) {
                if (!r.tag_name.startsWith(prefix)) continue;
                const m = r.tag_name.match(bPattern);
                if (m) lastBuild = Math.max(lastBuild, parseInt(m[1]));
              }
              if (data.length < 100) break;
              page++;
            }

            const buildNumber = lastBuild + 1;
            const tag = `${env}-${identifier}-v${version}-b${buildNumber}`;
            core.info(`cd-core: ${tag}`);
            core.setOutput('tag', tag);

      - name: Download CI artifact
        id: download
        uses: sonarmd/workflows/actions/download-ci-artifact@main
        with:
          run_id: ${{ inputs.ci_run_id }}

      - name: Create tag
        uses: sonarmd/workflows/actions/create-tag@main
        with:
          tag: ${{ steps.build.outputs.tag }}

      - name: Create release
        id: release
        uses: sonarmd/workflows/actions/create-release@main
        with:
          tag: ${{ steps.build.outputs.tag }}
          environment: ${{ steps.ctx.outputs.env }}

      - name: Upload artifact
        id: artifact
        uses: sonarmd/workflows/actions/upload-release-asset@main
        with:
          tag:        ${{ steps.build.outputs.tag }}
          artifact_path: artifact/release.tar.gz
          release_id: ${{ steps.release.outputs.release_id }}

      - name: Signal deployment
        uses: sonarmd/workflows/actions/signal-deployment@main
        with:
          webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
          app_name: ${{ steps.ctx.outputs.identifier }}
          environment: ${{ steps.ctx.outputs.env }}
          tag: ${{ steps.build.outputs.tag }}
          artifact_url: ${{ steps.artifact.outputs.artifact_url }}

      - name: Release lifecycle
        if: steps.ctx.outputs.env == 'prd'
        uses: sonarmd/workflows/actions/release-lifecycle@main
        with:
          token: ${{ github.token }}

      - name: Notify Slack on failure
        if: failure()
        uses: sonarmd/workflows/actions/notify-slack@main
        with:
          webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
          status: failure
          app_name: ${{ steps.ctx.outputs.identifier }}
          environment: ${{ steps.ctx.outputs.env }}
          tag: ${{ steps.build.outputs.tag }}
          details: ${{ job.status }}
