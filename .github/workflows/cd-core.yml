name: CD

# ── Caller example dumb af claudes stop touching my shit ────────────────────────────────────────────────────────
#
#   name: CD
#   on:
#     push:
#       branches: ['release/**']
#   concurrency:
#     group: cd-${{ github.ref_name }}
#     cancel-in-progress: true
#   jobs:
#     cd:
#       permissions:
#         contents: write   # create tags and GitHub releases
#         actions: read     # download CI artifacts
#       uses: sonarmd/workflows/.github/workflows/cd-core.yml@main
#       secrets: inherit
#
# Required repo variable: DEPLOY_IDENTIFIER (e.g. "api", "fe", "mobile")

on:
  workflow_call:
    # No inputs. cd-core discovers the CI artifact by commit SHA.
    # The orchestrator gates CD on CI success, so the run is guaranteed
    # to be completed by the time we get here.
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: true

permissions: {}

jobs:
  cd:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # create tags and GitHub releases
      actions: read     # download CI artifacts
    env:
      # Forward-compat: node20 action runtime deprecates 2026-06-02. Opt in
      # to node24 now so actions that haven't republished (download-artifact,
      # github-script, 1password/load-secrets) run on node24.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      # Slack webhook URL is a direct value, not an op:// reference, so it
      # must be set at job scope rather than routed through Load secrets —
      # 1password/load-secrets-action only exports op:// refs to $GITHUB_ENV.
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: deploy.json
          sparse-checkout-cone-mode: false
          fetch-depth: 2

      - name: Load secrets
        uses: 1password/load-secrets-action@581a835fb51b8e7ec56b71cf2ffddd7e68bb25e0  # v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        with:
          export-env: true

      - name: Resolve context
        id: ctx
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        env:
          IDENTIFIER_VAR: ${{ vars.DEPLOY_IDENTIFIER }}
        with:
          script: |
            const identifier = process.env.IDENTIFIER_VAR;
            if (!identifier) {
              core.setFailed('cd-core: repo variable DEPLOY_IDENTIFIER is not set (repo Settings → Variables → Actions)');
              return;
            }
            const { owner, repo } = context.repo;
            const ref = context.ref.replace('refs/heads/', '');

            // ── release/vX.Y.Z → new prerelease on stg ──────────────────
            const releaseMatch = ref.match(/^release\/v(\d+\.\d+\.\d+)$/);
            if (releaseMatch) {
              const version = releaseMatch[1];
              core.notice(`cd-core: release/** → creating prerelease stg ${identifier} v${version}`);
              core.setOutput('env',        'stg');
              core.setOutput('identifier', identifier);
              core.setOutput('version',    version);
              return;
            }

            // ── master / main → promote existing prerelease to prd ──────
            if (ref === 'master' || ref === 'main') {
              // Look at HEAD and HEAD's parents (merge-commit's second parent
              // is the release-branch tip when master gets a release merge).
              const { data: commit } = await github.rest.git.getCommit({
                owner, repo, commit_sha: context.sha,
              });
              const candidateShas = new Set([context.sha, ...commit.parents.map(p => p.sha)]);
              core.info(`cd-core: searching for prerelease on any of: ${[...candidateShas].join(', ')}`);

              const prereleases = [];
              const prereleasePrefix = `stg-${identifier}-v`;
              let page = 1;
              while (true) {
                const { data } = await github.rest.repos.listReleases({
                  owner, repo, per_page: 100, page,
                });
                if (!Array.isArray(data) || data.length === 0) break;
                for (const r of data) {
                  if (r.prerelease && r.tag_name.startsWith(prereleasePrefix)) {
                    prereleases.push(r);
                  }
                }
                if (data.length < 100) break;
                page += 1;
              }
              core.info(`cd-core: scanning ${prereleases.length} stg-${identifier}-v* prereleases for an ancestor-SHA match`);

              let matched;
              for (const pre of prereleases) {
                try {
                  const { data: tagRef } = await github.rest.git.getRef({
                    owner, repo, ref: `tags/${pre.tag_name}`,
                  });
                  let tagSha = tagRef.object.sha;
                  if (tagRef.object.type === 'tag') {
                    const { data: tagObj } = await github.rest.git.getTag({
                      owner, repo, tag_sha: tagSha,
                    });
                    tagSha = tagObj.object.sha;
                  }
                  if (candidateShas.has(tagSha)) {
                    matched = pre;
                    break;
                  }
                } catch (e) {
                  if (e.status !== 404) throw e;
                }
              }

              if (matched) {
                // Strip the exact `stg-${identifier}-v` prefix rather than a regex,
                // so identifiers containing hyphens (e.g. `core-api`) parse correctly.
                if (!matched.tag_name.startsWith(prereleasePrefix)) {
                  core.setFailed(`cd-core: matched prerelease '${matched.tag_name}' does not start with expected prefix '${prereleasePrefix}'`);
                  return;
                }
                const versionTail = matched.tag_name.slice(prereleasePrefix.length);
                const m = versionTail.match(/^(\d+\.\d+\.\d+)/);
                if (!m) {
                  core.setFailed(`cd-core: matched prerelease '${matched.tag_name}' has no parseable version`);
                  return;
                }
                const version = m[1];
                core.notice(`cd-core: master/main → promoting ${matched.tag_name} → prd ${identifier} v${version}`);
                core.setOutput('env',            'prd');
                core.setOutput('identifier',     identifier);
                core.setOutput('version',        version);
                core.setOutput('promoted_from',  matched.tag_name);
                return;
              }

              core.setFailed([
                'cd-core: no stg prerelease found on HEAD or its parents.',
                '         The release flow is: push to release/vX.Y.Z (prerelease) → merge release/vX.Y.Z to master (promote).',
                `         Looked for 'stg-${identifier}-v*' tags targeting SHAs: ${[...candidateShas].join(', ')}`,
              ].join('\n'));
              return;
            }

            // ── release/* without parseable semver → YOLO stg prerelease ──
            // CD does not gatekeep on branch naming. If the ref is under
            // release/ but does not match release/vX.Y.Z, emit a v404 stg
            // prerelease ("unknown version"). The v404 marker is deliberately
            // not parseable as semver, so a downstream master/main promote
            // lookup cannot lift it into prd. YOLO stays on stg.
            if (ref.startsWith('release/')) {
              const version = '404';
              core.notice(`cd-core: release/** no version — YOLO prerelease stg ${identifier} v${version}`);
              core.setOutput('env',        'stg');
              core.setOutput('identifier', identifier);
              core.setOutput('version',    version);
              return;
            }

            core.setFailed(`cd-core: unexpected ref '${ref}' — cd should only run on release/*, master, or main`);

      - name: Derive build number
        id: build
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        env:
          ENV:        ${{ steps.ctx.outputs.env }}
          IDENTIFIER: ${{ steps.ctx.outputs.identifier }}
          VERSION:    ${{ steps.ctx.outputs.version }}
        with:
          script: |
            const env        = process.env.ENV;
            const identifier = process.env.IDENTIFIER;
            const version    = process.env.VERSION;
            const { owner, repo } = context.repo;

            // Per-version scope: `prd-api-v1.8.0-b*` builds are numbered
            // independently from `prd-api-v1.7.0-b*`. Every new version
            // resets to b1. Cleaner semantics than a monotonic counter
            // across the whole env+identifier.
            const escapeRegExp = (value) => String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const prefix = `${env}-${identifier}-v${version}-b`;
            const bPattern = new RegExp(`^${escapeRegExp(prefix)}(\\d+)$`);

            let page = 1;
            let lastBuild = 0;
            while (true) {
              const { data } = await github.rest.repos.listReleases({
                owner, repo, per_page: 100, page,
              });
              if (data.length === 0) break;
              for (const r of data) {
                const m = r.tag_name.match(bPattern);
                if (m) lastBuild = Math.max(lastBuild, parseInt(m[1]));
              }
              if (data.length < 100) break;
              page++;
            }

            const buildNumber = lastBuild + 1;
            const tag = `${env}-${identifier}-v${version}-b${buildNumber}`;
            core.info(`cd-core: ${tag}`);
            core.setOutput('tag', tag);

      - name: Download CI artifact
        id: download
        uses: sonarmd/workflows/actions/download-ci-artifact@main

      - name: Create tag
        uses: sonarmd/workflows/actions/create-tag@main
        with:
          tag: ${{ steps.build.outputs.tag }}

      - name: Create release
        id: release
        uses: sonarmd/workflows/actions/create-release@main
        with:
          tag: ${{ steps.build.outputs.tag }}
          environment: ${{ steps.ctx.outputs.env }}

      - name: Upload artifact
        id: artifact
        uses: sonarmd/workflows/actions/upload-release-asset@main
        with:
          tag:        ${{ steps.build.outputs.tag }}
          artifact_path: artifact/release.tar.gz
          release_id: ${{ steps.release.outputs.release_id }}

      - name: Signal deployment
        uses: sonarmd/workflows/actions/signal-deployment@main
        with:
          webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
          app_name: ${{ steps.ctx.outputs.identifier }}
          environment: ${{ steps.ctx.outputs.env }}
          tag: ${{ steps.build.outputs.tag }}
          artifact_url: ${{ steps.artifact.outputs.artifact_url }}

      - name: Release lifecycle
        if: steps.ctx.outputs.env == 'prd'
        uses: sonarmd/workflows/actions/release-lifecycle@main
        with:
          token: ${{ github.token }}

      - name: Notify Slack on failure
        if: failure()
        uses: sonarmd/workflows/actions/notify-slack@main
        with:
          webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
          status: failure
          app_name: ${{ steps.ctx.outputs.identifier }}
          environment: ${{ steps.ctx.outputs.env }}
          tag: ${{ steps.build.outputs.tag }}
          details: ${{ job.status }}
