name: CD

# ── Caller example ────────────────────────────────────────────────────────
#
#   name: CD
#   on:
#     push:
#       branches: [master, 'release/**']
#   concurrency:
#     group: cd-${{ github.ref_name }}
#     cancel-in-progress: false
#   jobs:
#     cd:
#       uses: sonarmd/workflows/.github/workflows/cd-core.yml@main
#       with:
#         build: yarn build
#       secrets: inherit
#
# Required repo variable: DEPLOY_IDENTIFIER (e.g. "api", "fe", "mobile")

on:
  workflow_call:
    inputs:
      build:
        description: 'Shell command to produce the build output (e.g. yarn build).'
        required: true
        type: string
      setup:
        description: 'Repo-specific setup shell (system deps, etc.)'
        required: false
        type: string
        default: ''
      test_report_path:
        description: 'JUnit XML path to include in the release bundle.'
        required: false
        type: string
        default: 'junit.xml'
      working_directory:
        required: false
        type: string
        default: '.'
    secrets:
      SLACK_WEBHOOK_URL:
        required: false

permissions:
  contents: write
  actions: read

jobs:
  cd:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Setup Node.js
        if: hashFiles(format('{0}/yarn.lock', inputs.working_directory)) != ''
        uses: sonarmd/workflows/actions/setup-node@main

      - name: Setup
        if: inputs.setup != ''
        shell: bash
        run: ${{ inputs.setup }}

      - name: Resolve context
        id: ctx
        shell: bash
        run: |
          set -euo pipefail

          IDENTIFIER="${{ vars.DEPLOY_IDENTIFIER }}"
          if [ -z "$IDENTIFIER" ]; then
            echo "::error::cd-core: repo variable DEPLOY_IDENTIFIER is not set"
            echo "::error::  Set it in repo Settings → Variables → Actions"
            exit 1
          fi

          case "${{ github.ref_name }}" in
            main|master)
              ENV=prd
              VERSION="${{ github.event.pull_request.head.ref }}"
              if echo "$VERSION" | grep -qP '^release/v[0-9]+\.[0-9]+\.[0-9]+$'; then
                VERSION="${VERSION#release/v}"
              else
                VERSION=$(git log -1 --pretty=%B | grep -oP 'release/v\K[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "")
              fi
              if [ -z "$VERSION" ]; then
                echo "::error::cd-core: cannot determine version for prd — merge must be from release/vX.Y.Z"
                exit 1
              fi
              ;;
            release/v*)
              ENV=stg
              VERSION="${{ github.ref_name }}"
              VERSION="${VERSION#release/v}"
              ;;
            *)
              echo "::error::cd-core: unexpected branch '${{ github.ref_name }}' — must be main, master, or release/vX.Y.Z"
              exit 1
              ;;
          esac

          TAG="${ENV}-${IDENTIFIER}-v${VERSION}-b${GITHUB_RUN_NUMBER}"

          echo "env=$ENV"               >> "$GITHUB_OUTPUT"
          echo "identifier=$IDENTIFIER" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"               >> "$GITHUB_OUTPUT"
          echo "cd-core: $TAG"

      - name: Build
        shell: bash
        run: ${{ inputs.build }}

      - name: Bundle release
        uses: sonarmd/workflows/actions/bundle-release@main
        with:
          test_report_path: ${{ inputs.test_report_path }}

      - name: Create tag and release
        id: release
        uses: sonarmd/workflows/actions/create-tag-release@main
        with:
          tag:           ${{ steps.ctx.outputs.tag }}
          environment:   ${{ steps.ctx.outputs.env }}
          artifact_path: artifact/release.tar.gz

      - name: Notify Slack
        uses: sonarmd/workflows/actions/notify-slack@main
        with:
          webhook_url:    ${{ secrets.SLACK_WEBHOOK_URL }}
          status:         success
          app_name:       ${{ steps.ctx.outputs.identifier }}
          environment:    ${{ steps.ctx.outputs.env }}
          tag:            ${{ steps.ctx.outputs.tag }}
          deploy_command: 'deploy ${{ steps.ctx.outputs.env }} ${{ steps.ctx.outputs.identifier }} ${{ steps.ctx.outputs.tag }} ${{ steps.release.outputs.artifact_url }}'

      - name: Release lifecycle
        if: steps.ctx.outputs.env == 'prd'
        uses: sonarmd/workflows/actions/release-lifecycle@main
        with:
          token: ${{ github.token }}

      - name: Notify Slack on failure
        if: failure()
        uses: sonarmd/workflows/actions/notify-slack@main
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status:      failure
          app_name:    ${{ steps.ctx.outputs.identifier }}
          environment: ${{ steps.ctx.outputs.env }}
          tag:         ${{ steps.ctx.outputs.tag }}
          details:     'oh no failed on deploy: ${{ job.status }}'
