name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment: dev, stg, or prd'
        required: true
        type: string
      app_name:
        description: 'Application name'
        required: true
        type: string
      version:
        description: 'Version string'
        required: false
        type: string
        default: ''
      slack_channel:
        description: 'Slack channel'
        required: false
        type: string
        default: '#ops'
      artifact_url:
        description: 'Artifact download URL'
        required: false
        type: string
        default: ''

    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: true

permissions: {}

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Load Slack webhook from 1Password
        uses: 1password/load-secrets-action@v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SLACK_WEBHOOK_URL: op://smd_agora_shared/SLACK_WEBHOOK_URL/credential
        with:
          export-env: true

      - name: Notify Slack
        env:
          APP_NAME: ${{ inputs.app_name }}
          ENVIRONMENT: ${{ inputs.environment }}
          COMMIT: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
        run: |
          VERSION="${{ inputs.version }}"
          [ -z "$VERSION" ] && VERSION="${COMMIT:0:12}"

          ARTIFACT_URL="${{ inputs.artifact_url }}"
          [ -z "$ARTIFACT_URL" ] && ARTIFACT_URL="$RUN_URL"

          DEPLOY_MSG="@r2-d2 deploy $APP_NAME $ENVIRONMENT $VERSION $ARTIFACT_URL"

          PAYLOAD=$(jq -n \
            --arg channel "${{ inputs.slack_channel }}" \
            --arg deploy_msg "$DEPLOY_MSG" \
            --arg app "$APP_NAME" \
            --arg env "$ENVIRONMENT" \
            --arg version "$VERSION" \
            --arg commit "${COMMIT:0:12}" \
            --arg actor "$ACTOR" \
            --arg run_url "$RUN_URL" \
            '{
              channel: $channel,
              text: $deploy_msg,
              attachments: [{
                color: "#36a64f",
                fallback: ("Deploy " + $app + " " + $version + " to " + $env),
                title: ("Deploy: " + $app),
                fields: [
                  {title: "Environment", value: $env, short: true},
                  {title: "Version", value: ("`" + $version + "`"), short: true},
                  {title: "Commit", value: ("`" + $commit + "`"), short: true},
                  {title: "Triggered by", value: $actor, short: true}
                ],
                actions: [{type: "button", text: "View Run", url: $run_url}]
              }]
            }')

          curl -sf -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
          echo "Deploy notification sent: $DEPLOY_MSG"
