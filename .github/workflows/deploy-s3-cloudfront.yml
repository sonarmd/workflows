name: Deploy — S3 + CloudFront

on:
  workflow_call:
    inputs:
      environment:
        description: Target environment (dev, stg, prd)
        type: string
        required: true
      app-name:
        description: Application name (admin, patient, provider, seat)
        type: string
        required: true
      bucket:
        description: S3 bucket name
        type: string
        required: true
      build-artifact-name:
        description: Name of the build artifact to download
        type: string
        required: true
      distribution-id:
        description: CloudFront distribution ID (empty to skip invalidation)
        type: string
        default: ''
      aws-region:
        description: AWS region
        type: string
        default: 'us-east-2'
      aws-role-arn:
        description: IAM role ARN to assume via OIDC
        type: string
        required: true

    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          repository: sonarmd/workflows
          sparse-checkout: actions

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.build-artifact-name }}
          path: build/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws-role-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: Sync static assets to S3
        run: |
          aws s3 sync build/ "s3://${{ inputs.bucket }}" \
            --cache-control "max-age=604800, public" \
            --exclude index.html \
            --exclude asset-manifest.json

      - name: Upload index.html with short cache
        run: |
          aws s3api put-object \
            --bucket "${{ inputs.bucket }}" \
            --key index.html \
            --body build/index.html \
            --cache-control "max-age=300, public" \
            --content-type text/html

      - name: Upload asset-manifest.json with short cache
        run: |
          if [ -f build/asset-manifest.json ]; then
            aws s3api put-object \
              --bucket "${{ inputs.bucket }}" \
              --key asset-manifest.json \
              --body build/asset-manifest.json \
              --cache-control "max-age=300, public" \
              --content-type application/json
          fi

      - name: Invalidate CloudFront cache
        if: inputs.distribution-id != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ inputs.distribution-id }}" \
            --paths "/index.html" "/asset-manifest.json"
          echo "CloudFront invalidation created for ${{ inputs.distribution-id }}"
