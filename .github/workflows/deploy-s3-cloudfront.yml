name: Deploy — S3 + CloudFront

on:
  workflow_call:
    inputs:
      app-name:
        description: Application name (admin, patient, provider, seat)
        type: string
        required: true
      bucket:
        description: S3 bucket name
        type: string
        required: true
      build-artifact-name:
        description: Name of the build artifact to download
        type: string
        required: true
      distribution-id:
        description: CloudFront distribution ID (empty to skip invalidation)
        type: string
        default: ''
      aws-region:
        description: AWS region
        type: string
        default: 'us-east-2'

    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.build-artifact-name }}
          path: build/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws-region }}

      - name: Sync static assets to S3
        run: |
          aws s3 sync build/ "s3://${{ inputs.bucket }}" \
            --cache-control "max-age=604800, public" \
            --exclude index.html \
            --exclude asset-manifest.json

      - name: Upload index.html with short cache
        run: |
          aws s3api put-object \
            --bucket "${{ inputs.bucket }}" \
            --key index.html \
            --body build/index.html \
            --cache-control "max-age=300, public" \
            --content-type text/html

      - name: Upload asset-manifest.json with short cache
        run: |
          if [ -f build/asset-manifest.json ]; then
            aws s3api put-object \
              --bucket "${{ inputs.bucket }}" \
              --key asset-manifest.json \
              --body build/asset-manifest.json \
              --cache-control "max-age=300, public" \
              --content-type application/json
          fi

      - name: Invalidate CloudFront cache
        if: inputs.distribution-id != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ inputs.distribution-id }}" \
            --paths "/index.html" "/asset-manifest.json"
