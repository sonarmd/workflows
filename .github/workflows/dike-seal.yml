name: "Dike — Post-Merge Seal"

# Reusable workflow for Dike post-merge sealing on pull requests.
# Thin orchestrator: checks out agora, calls its parameterized scripts.
#
# Runs sequentially: nomos-seal.sh → nomos-synthesize.sh → seal.sh
# Writes to the calling repo's truth/ directory via GitHub Contents API.
#
# Usage (from a governed repo):
#
#   seal:
#     if: >-
#       github.event_name == 'pull_request' &&
#       github.event.action == 'closed' &&
#       github.event.pull_request.merged == true
#     uses: sonarmd/workflows/.github/workflows/dike-seal.yml@main
#     with:
#       namespace-mode: project
#     secrets:
#       OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN_AGORA }}
#
# For agora itself (namespace-mode: agora), the checkout-agora step is skipped
# and AGORA_GOVERNANCE_ROOT defaults to "." (the repo root).

on:
  workflow_call:
    inputs:
      agora-ref:
        description: 'Git ref of sonarmd/agora to use for governance scripts'
        type: string
        default: 'main'
      namespace-mode:
        description: '"agora" for the agora repo itself, "project" for governed repos'
        type: string
        default: 'project'
      logs-path:
        description: 'Path to engineer logs directory (relative to repo root)'
        type: string
        default: '.agora/engineers'
      truth-path:
        description: 'Path to truth directory (relative to repo root)'
        type: string
        default: '.agora/truth'
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        description: '1Password Service Account token for loading CI secrets'
        required: true

permissions:
  contents: write
  pull-requests: read
  id-token: write

jobs:
  seal:
    name: "Attestation Seal"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2
      - name: Checkout agora governance
        if: inputs.namespace-mode != 'agora'
        id: agora
        uses: ./actions/checkout-agora
        with:
          agora-ref: ${{ inputs.agora-ref }}
          token: ${{ github.token }}
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@8d0d610af187e78a2772c2d18d627f4c52d3fbfb # v3.1.0
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AGORA_APP_ID: op://smd_agora_shared/github-ci-app-id/credential
      - name: Load App private key
        run: |
          RAW=$(op read 'op://smd_agora_shared/github-ci-private-key/credential' 2>/dev/null)
          # Mask every line so GitHub Actions redacts if any leak to logs
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done <<< "$RAW"
          # Reconstruct PEM with proper line wrapping
          HEADER=$(printf '%s' "$RAW" | grep -o '-----BEGIN [A-Z ]*-----')
          FOOTER=$(printf '%s' "$RAW" | grep -o '-----END [A-Z ]*-----')
          BODY=$(printf '%s' "$RAW" | sed "s|$HEADER||;s|$FOOTER||" | tr -d ' \n' | fold -w 64)
          DELIM="ghenv_$(openssl rand -hex 8)"
          {
            echo "AGORA_PRIVATE_KEY<<${DELIM}"
            echo "$HEADER"
            echo "$BODY"
            echo "$FOOTER"
            echo "${DELIM}"
          } >> "$GITHUB_ENV"
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      - name: Generate Dike app token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ env.AGORA_APP_ID }}
          private-key: ${{ env.AGORA_PRIVATE_KEY }}
      - name: "Nomos — synthesize brain + append history"
        run: bash "${AGORA_GOVERNANCE_ROOT}/.github/scripts/nomos-seal.sh"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEAL_TOKEN: ${{ steps.app-token.outputs.token }}
          MERGE_SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          AGORA_GOVERNANCE_ROOT: ${{ inputs.namespace-mode == 'agora' && '.' || steps.agora.outputs.governance-root }}
          NAMESPACE_MODE: ${{ inputs.namespace-mode }}
          TRUTH_ROOT: ${{ inputs.truth-path }}
          LOGS_ROOT: ${{ inputs.logs-path }}
      - name: "Nomos — synthesize knowledge from Logos entries"
        run: bash "${AGORA_GOVERNANCE_ROOT}/.github/scripts/nomos-synthesize.sh"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEAL_TOKEN: ${{ steps.app-token.outputs.token }}
          MERGE_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          AGORA_GOVERNANCE_ROOT: ${{ inputs.namespace-mode == 'agora' && '.' || steps.agora.outputs.governance-root }}
          TRUTH_ROOT: ${{ inputs.truth-path }}
          LOGS_ROOT: ${{ inputs.logs-path }}
      - name: "Dike — attestation bundle + fingerprint chain"
        run: bash "${AGORA_GOVERNANCE_ROOT}/.github/scripts/seal.sh"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEAL_TOKEN: ${{ steps.app-token.outputs.token }}
          MERGE_SHA: ${{ github.sha }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          AGORA_GOVERNANCE_ROOT: ${{ inputs.namespace-mode == 'agora' && '.' || steps.agora.outputs.governance-root }}
          NAMESPACE_MODE: ${{ inputs.namespace-mode }}
          TRUTH_ROOT: ${{ inputs.truth-path }}
          LOGS_ROOT: ${{ inputs.logs-path }}
