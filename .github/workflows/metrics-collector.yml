name: Metrics Collector

on:
  workflow_call:
    inputs:
      repo:
        description: Repository name (e.g. sonarmd/frontend)
        type: string
        required: true
      environment:
        description: Target environment (dev, stg, prd)
        type: string
        required: true
      tag:
        description: Deploy tag
        type: string
        required: true
      status:
        description: Deploy status (success, failure)
        type: string
        required: true
      started:
        description: ISO 8601 timestamp when deploy started
        type: string
        required: true
      rollback:
        description: Whether this was a rollback deploy
        type: boolean
        default: false
      aws-region:
        description: AWS region
        type: string
        default: 'us-east-2'
      aws-role-arn:
        description: IAM role ARN to assume via OIDC
        type: string
        required: true
      metrics-bucket:
        description: S3 bucket for deploy metrics
        type: string
        default: 'sonarmd-deploy-metrics'

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws-role-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: Record deploy metrics
        run: |
          FINISHED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          STARTED="${{ inputs.started }}"

          # Calculate duration
          START_EPOCH=$(date -d "$STARTED" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$STARTED" +%s 2>/dev/null || echo "0")
          END_EPOCH=$(date -d "$FINISHED" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$FINISHED" +%s 2>/dev/null || echo "0")
          DURATION=$((END_EPOCH - START_EPOCH))

          # Build date path
          YEAR=$(date -u +"%Y")
          MONTH=$(date -u +"%m")
          DAY=$(date -u +"%d")
          UUID=$(cat /proc/sys/kernel/random/uuid 2>/dev/null || uuidgen || echo "${{ github.run_id }}")

          # Create metrics JSON
          cat > /tmp/deploy-metric.json <<EOJSON
          {
            "repo": "${{ inputs.repo }}",
            "env": "${{ inputs.environment }}",
            "tag": "${{ inputs.tag }}",
            "status": "${{ inputs.status }}",
            "started": "$STARTED",
            "finished": "$FINISHED",
            "duration_seconds": $DURATION,
            "run_id": "${{ github.run_id }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "actor": "${{ github.actor }}",
            "rollback": ${{ inputs.rollback }}
          }
          EOJSON

          # Upload to S3
          aws s3 cp /tmp/deploy-metric.json \
            "s3://${{ inputs.metrics-bucket }}/${YEAR}/${MONTH}/${DAY}/${UUID}.json" \
            --content-type application/json

          echo "### Deploy Metrics Recorded" >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/deploy-metric.json >> "$GITHUB_STEP_SUMMARY"
