name: Metrics Collector

on:
  workflow_call:
    inputs:
      repo:
        description: Repository name (e.g., sonarmd/frontend)
        type: string
        required: true
      environment:
        description: Target environment (dev, stg, prd)
        type: string
        required: true
      tag:
        description: Deployment tag
        type: string
        required: true
      status:
        description: Deploy status (success, failure)
        type: string
        required: true
      started:
        description: Deploy start time (ISO 8601)
        type: string
        required: true
      rollback:
        description: Whether this was a rollback deploy
        type: boolean
        default: false
      aws-region:
        description: AWS region
        type: string
        default: 'us-east-2'
      aws-role-arn:
        description: IAM role ARN for OIDC
        type: string
        required: true
      metrics-bucket:
        description: S3 bucket for metrics
        type: string
        default: 'sonarmd-deploy-metrics'

permissions: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ inputs.aws-role-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: Write deploy metrics
        env:
          METRIC_REPO: ${{ inputs.repo }}
          METRIC_ENV: ${{ inputs.environment }}
          METRIC_TAG: ${{ inputs.tag }}
          METRIC_STATUS: ${{ inputs.status }}
          METRIC_STARTED: ${{ inputs.started }}
          METRIC_ROLLBACK: ${{ inputs.rollback }}
          METRIC_RUN_ID: ${{ github.run_id }}
          METRIC_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          METRIC_ACTOR: ${{ github.actor }}
          S3_BUCKET: ${{ inputs.metrics-bucket }}
        run: |
          FINISHED=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          DATE_PATH=$(date -u +%Y/%m/%d)
          UUID=$(cat /proc/sys/kernel/random/uuid)

          # Calculate duration
          START_EPOCH=$(date -d "$METRIC_STARTED" +%s 2>/dev/null || echo 0)
          END_EPOCH=$(date +%s)
          DURATION=$((END_EPOCH - START_EPOCH))

          # Build JSON safely with jq
          jq -n \
            --arg repo "$METRIC_REPO" \
            --arg env "$METRIC_ENV" \
            --arg tag "$METRIC_TAG" \
            --arg status "$METRIC_STATUS" \
            --arg started "$METRIC_STARTED" \
            --arg finished "$FINISHED" \
            --argjson duration "$DURATION" \
            --arg run_id "$METRIC_RUN_ID" \
            --arg run_url "$METRIC_RUN_URL" \
            --arg actor "$METRIC_ACTOR" \
            --argjson rollback "${METRIC_ROLLBACK}" \
            '{
              repo: $repo,
              env: $env,
              tag: $tag,
              status: $status,
              started: $started,
              finished: $finished,
              duration_seconds: $duration,
              run_id: $run_id,
              run_url: $run_url,
              actor: $actor,
              rollback: $rollback
            }' > /tmp/deploy-metric.json

          aws s3 cp /tmp/deploy-metric.json \
            "s3://${S3_BUCKET}/${DATE_PATH}/${UUID}.json" \
            --content-type application/json

          echo "Metrics written to s3://${S3_BUCKET}/${DATE_PATH}/${UUID}.json"
          rm -f /tmp/deploy-metric.json
