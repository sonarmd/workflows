name: CI — Node.js

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version (default auto-detects from package.json)
        type: string
        default: ''
      working-directory:
        description: Directory containing the project
        type: string
        default: '.'
      install-command:
        description: Command to install dependencies
        type: string
        default: 'yarn install --frozen-lockfile'
      lint-command:
        description: Lint command (empty to skip)
        type: string
        default: 'yarn lint'
      test-command:
        description: Test command (empty to skip)
        type: string
        default: 'yarn test'
      build-command:
        description: Build command (empty to skip)
        type: string
        default: 'yarn build'
      pre-install-command:
        description: Command to run before install (e.g. build shared library)
        type: string
        default: ''
      artifact-name:
        description: Name for the build artifact (empty to skip upload)
        type: string
        default: ''
      artifact-path:
        description: Path to the build output to upload as artifact
        type: string
        default: ''

    outputs:
      artifact-name:
        description: Name of the uploaded build artifact
        value: ${{ jobs.build.outputs.artifact-name }}

permissions: {}

jobs:
  lint:
    if: inputs.lint-command != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: ${{ inputs.node-version }}
          working-directory: ${{ inputs.working-directory }}

      - name: Pre-install
        if: inputs.pre-install-command != ''
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.pre-install-command }}

      - name: Lint
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.lint-command }}

  test:
    if: inputs.test-command != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: ${{ inputs.node-version }}
          working-directory: ${{ inputs.working-directory }}

      - name: Pre-install
        if: inputs.pre-install-command != ''
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.pre-install-command }}

      - name: Test
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.test-command }}

  build:
    needs: [lint, test]
    # Allow build to run even if lint/test were skipped (when their commands are empty)
    if: |
      always() &&
      inputs.build-command != '' &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      artifact-name: ${{ inputs.artifact-name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: sonarmd/workflows/actions/setup-node@main
        with:
          node-version: ${{ inputs.node-version }}
          working-directory: ${{ inputs.working-directory }}

      - name: Pre-install
        if: inputs.pre-install-command != ''
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.pre-install-command }}

      - name: Build
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.build-command }}

      - name: Upload build artifact
        if: inputs.artifact-name != '' && inputs.artifact-path != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}
          retention-days: 7
