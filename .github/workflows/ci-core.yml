name: CI

# ── Caller example ───────────────────────────────────────────────────────
#
#   jobs:
#     ci:
#       uses: sonarmd/workflows/.github/workflows/ci-core.yml@main
#       with:
#         setup: |
#           sudo apt-get update -qq && sudo apt-get install -y graphicsmagick
#         steps: |
#           yarn lint
#           yarn test:ci
#           yarn build
#       secrets: inherit

on:
  workflow_call:
    inputs:
      setup:
        description: 'Repo-specific setup shell (system deps, etc.)'
        required: false
        type: string
        default: ''
      steps:
        description: 'Repo-specific lint/test/build shell.'
        required: true
        type: string
      test_report_path:
        description: 'JUnit XML path.'
        required: false
        type: string
        default: 'junit.xml'
      timeout:
        description: 'Job timeout in minutes.'
        required: false
        type: number
        default: 15
      working_directory:
        required: false
        type: string
        default: '.'
    secrets:
      CI_SIGNING_KEY:
        description: |
          Base64-encoded armored GPG private key used to sign
          submodule-checksums.txt inside the release artifact.
          Required when deploy.json is present (i.e. bundle-release runs).
        required: false
      GH_TOKEN:
        description: |
          GitHub token used for @sonarmd npm Packages auth.
          Falls back to github.token when not provided.
        required: false

# No `permissions:` block — the caller's grant flows through unchanged.
# This reusable workflow runs steps that need (at minimum): contents:read for
# the checkout, id-token:write + attestations:write for the signing/attestation
# actions, actions:read for the artifact-store probe, and packages:write for
# the GHCR-backed artifact-store push (only on push events). The caller must
# offer those scopes; see cicd-orchestrator.yml's header for the canonical list.

jobs:
  # Inner job name is `run`, not `ci`, so callers don't get a doubled
  # `cicd / ci / ci` segment in the check-run display. The middle `ci`
  # segment comes from the orchestrator's lane name; this inner segment
  # is the leaf's action ("run repo-specific install / test / build").
  run:
    name: run
    runs-on: ubuntu-24.04-arm
    timeout-minutes: ${{ inputs.timeout }}
    env:
      # Forward-compat: node20 action runtime deprecates 2026-06-02. Opt in
      # to node24 now so actions that haven't republished (setup-node@v4,
      # cache@v4, upload-artifact@v4) run on node24 without breakage.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      # secrets context is unavailable in step `if` expressions; capture
      # presence as a plain env bool so the Sign release step can gate on it.
      HAS_SIGNING_KEY: ${{ secrets.CI_SIGNING_KEY != '' }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # Cache check: if an artifact already exists for this SHA in the
      # durable store, skip bundle-release. lint/test/scans still run.
      - name: Probe artifact store
        id: probe
        if: hashFiles('deploy.json') != ''
        uses: sonarmd/workflows/actions/artifact-store-probe@main

      - name: Setup Node.js
        if: hashFiles(format('{0}/yarn.lock', inputs.working_directory)) != ''
        uses: sonarmd/workflows/actions/setup-node@main
        with:
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Setup
        if: inputs.setup != ''
        shell: bash
        run: ${{ inputs.setup }}

      - name: Steps
        shell: bash
        run: ${{ inputs.steps }}

      - name: Bundle release
        if: hashFiles('deploy.json') != '' && steps.probe.outputs.present != 'true'
        uses: sonarmd/workflows/actions/bundle-release@main
        with:
          test_report_path: ${{ inputs.test_report_path }}

      - name: Sign release
        if: hashFiles('deploy.json') != '' && steps.probe.outputs.present != 'true' && env.HAS_SIGNING_KEY == 'true'
        uses: sonarmd/workflows/actions/sign-release@main
        with:
          artifact_path: release.tar.gz
          signing_key: ${{ secrets.CI_SIGNING_KEY }}

#      # Push the SIGNED tarball to the durable store. Gated to push events
#      # so PRs / merge_group / fork runs never write to GHCR (no permission,
#      # and would inflate storage with non-deployable builds).
#      - name: Push to artifact store
#        if: |
#          hashFiles('deploy.json') != '' &&
#          steps.probe.outputs.present != 'true' &&
#          github.event_name == 'push' &&
#          github.ref_type == 'branch'
#        uses: sonarmd/workflows/actions/artifact-store-push@main

      - name: Cache hit — artifact already published
        if: steps.probe.outputs.present == 'true'
        shell: bash
        run: |
          echo "ci-core: artifact already exists for this SHA in the store — skipped rebuild."
          echo "ci-core: reference: ${{ steps.probe.outputs.reference }}"
