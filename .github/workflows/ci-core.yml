name: CI

# ── Caller example ───────────────────────────────────────────────────────
#
#   jobs:
#     ci:
#       uses: sonarmd/workflows/.github/workflows/ci-core.yml@main
#       with:
#         setup: |
#           sudo apt-get update -qq && sudo apt-get install -y graphicsmagick
#         steps: |
#           yarn lint
#           yarn test:ci
#           yarn build
#       secrets: inherit

on:
  workflow_call:
    inputs:
      setup:
        description: "Repo-specific setup shell (system deps, etc.)"
        required: false
        type: string
        default: ""
      steps:
        description: "Repo-specific lint/test/build shell."
        required: true
        type: string
      test_report_path:
        description: "JUnit XML path."
        required: false
        type: string
        default: "junit.xml"
      timeout:
        description: "Job timeout in minutes."
        required: false
        type: number
        default: 15
      working_directory:
        required: false
        type: string
        default: "."
      runs_on:
        description: "Runner label for the build job. Defaults to ubuntu-24.04-arm; override to ubuntu-24.04 for repos whose toolchain ships x86_64-only binaries (e.g. react-native hermesc)."
        required: false
        type: string
        default: "ubuntu-24.04-arm"
    secrets:
      CI_SIGNING_KEY:
        description: |
          Base64-encoded armored GPG private key used to sign
          submodule-checksums.txt inside the release artifact.
          Required when deploy.json is present (i.e. bundle-release runs).
        required: false
      GH_TOKEN:
        description: |
          GitHub token used for @sonarmd npm Packages auth.
          Falls back to github.token when not provided.
        required: false

# No `permissions:` block — the caller's grant flows through unchanged.
# This reusable workflow runs steps that need (at minimum): contents:read for
# the checkout, id-token:write + attestations:write for the signing/attestation
# actions, actions:read for the artifact-store probe, and packages:write for
# the GHCR-backed artifact-store push (only on push events). The caller must
# offer those scopes; see cicd-orchestrator.yml's header for the canonical list.

jobs:
  # Inner job name is `run`, not `ci`, so callers don't get a doubled
  # `cicd / ci / ci` segment in the check-run display. The middle `ci`
  # segment comes from the orchestrator's lane name; this inner segment
  # is the leaf's action ("run repo-specific install / test / build").
  ci-core:
    name: run
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: ${{ inputs.timeout }}
    env:
      # Forward-compat: node20 action runtime deprecates 2026-06-02. Opt in
      # to node24 now so actions that haven't republished (setup-node@v4,
      # cache@v4, upload-artifact@v4) run on node24 without breakage.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      # secrets context is unavailable in step `if` expressions; capture
      # presence as a plain env bool so the Sign release step can gate on it.
      HAS_SIGNING_KEY: ${{ secrets.CI_SIGNING_KEY != '' }}
      # Lifted to job env (matches cd-core) so the failure-notify step can read
      # it via env. Available through `secrets: inherit` from the caller.
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # Content address: the tree hash is the identity of the build, not the
      # commit SHA. It is invariant across squash/rebase merges that rewrite
      # the SHA while leaving the file tree identical, so test/stg/prod that
      # share a tree reuse one build and the artifact promotes without a
      # rebuild. Keyed on HEAD's root tree.
      - name: Compute tree hash
        id: tree
        shell: bash
        # Repo-root tree, to match cd-core (which content-addresses at root).
        # git rev-parse HEAD^{tree} returns the commit's root tree regardless
        # of cwd, but pin to the workspace root so the two never diverge.
        working-directory: ${{ github.workspace }}
        run: echo "hash=$(git rev-parse HEAD^{tree})" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: hashFiles(format('{0}/yarn.lock', inputs.working_directory)) != ''
        uses: sonarmd/workflows/actions/setup-node@main
        with:
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Setup
        if: inputs.setup != ''
        shell: bash
        run: ${{ inputs.setup }}

      - name: Steps
        shell: bash
        run: ${{ inputs.steps }}

      # Security visibility: semgrep (SAST) + gitleaks (secret scan) + trivy
      # (deps). Restored as REPORT-ONLY: fail_on_findings=false and
      # continue-on-error, so it surfaces findings as evidence but NEVER
      # blocks the build. Needs node_modules (@sonarmd/star-config) so gated
      # on yarn.lock. output_dir routes machine-readable reports into the
      # shared evidence dir for the SOC2 audit-evidence bundle below.
      - name: Security scan
        if: hashFiles(format('{0}/yarn.lock', inputs.working_directory)) != ''
        continue-on-error: true
        uses: sonarmd/workflows/actions/security-scan@main
        with:
          fail_on_findings: "false"
          output_dir: ci-evidence

      # Quality visibility: jscpd (copy-paste) + knip (dead code / unused
      # deps). Also REPORT-ONLY - reports, never blocks.
      - name: Quality scan
        if: hashFiles(format('{0}/yarn.lock', inputs.working_directory)) != ''
        continue-on-error: true
        uses: sonarmd/workflows/actions/quality-scan@main
        with:
          fail_on_findings: "false"
          output_dir: ci-evidence

      # Supply-chain evidence: CycloneDX SBOM into the evidence dir. Warning,
      # not a gate (the action itself never fails the build).
      - name: SBOM
        if: hashFiles(format('{0}/package.json', inputs.working_directory)) != ''
        continue-on-error: true
        uses: sonarmd/workflows/actions/sbom-generator@main
        with:
          output_file: ci-evidence/sbom.cyclonedx.json

      # SOC2 audit-evidence: consolidate SAST + SCA + secret scan + tests +
      # quality + SBOM into ONE labeled artifact (INDEX.md + manifest.json),
      # each file tagged with its control name and TSC reference. Evidence
      # only - never gates. Always runs so a missing control is recorded as
      # not-run rather than silently dropped.
      - name: Evidence bundle
        if: always() && hashFiles(format('{0}/yarn.lock', inputs.working_directory)) != ''
        continue-on-error: true
        uses: sonarmd/workflows/actions/ci-evidence-bundle@main
        with:
          evidence_dir: ci-evidence
          test_report_path: ${{ inputs.test_report_path }}

      # Publish the evidence bundle as a native GitHub Check Run: product-first
      # summary (secrets / high-crit vulns / failing tests) plus the full
      # labeled control matrix. The already-installed GitHub-for-Jira connector
      # reads GitHub checks with its own auth and surfaces this as a Build on
      # the linked issue - no extra credential. Report-only; needs
      # `checks: write` on the caller's token (continue-on-error so callers
      # that have not granted it yet are unaffected).
      - name: Publish evidence check
        if: always() && hashFiles(format('{0}/yarn.lock', inputs.working_directory)) != ''
        continue-on-error: true
        uses: sonarmd/workflows/actions/publish-evidence-check@main
        with:
          evidence_dir: ci-evidence

      # Cache check: if a GitHub Release already carries release.tar.gz for
      # this tree hash (cd-core-tree marker in the body), skip bundle/sign/
      # stage. CD will pull straight from the existing release asset. Keyed
      # on the tree hash so an identical tree under a rewritten SHA still hits.
      - name: Probe release for tree hash
        id: probe
        if: hashFiles('deploy.json') != ''
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TREE: ${{ steps.tree.outputs.hash }}
        shell: bash
        run: |
          set -euo pipefail
          # Prod path always rebuilds. The tree hash is NOT a complete content
          # address for env-baked apps: the frontend bakes VITE_APP_ENV (and
          # thus the API host) into the bundle at build time, so the stg-built
          # and prd-built artifacts differ despite an identical tree. Reusing
          # the tree-matched stg artifact on a master/main promote shipped the
          # STAGING bundle to prod (prod called api.stg.sonarmd.com). On the
          # prod path force a cache miss so bundle/sign/stage run on the fresh
          # build this run already produced with BUILD_ENV=prd. Runtime-env
          # apps (api/cdk) just rebuild to identical bytes -- harmless.
          if [ "${GITHUB_REF_NAME:-}" = "master" ] || [ "${GITHUB_REF_NAME:-}" = "main" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "release-probe: prod path (${GITHUB_REF_NAME}) - forcing fresh build, no stg-bytes reuse"
            exit 0
          fi
          tag=$(gh api -X GET "repos/$GH_REPO/releases" --paginate \
                | jq -r --arg marker "<!-- cd-core-tree:$TREE -->" \
                    '.[] | select(.body != null and (.body | contains($marker))) | .tag_name' \
                | head -n1)
          if [ -n "$tag" ] && gh release view "$tag" --repo "$GH_REPO" --json assets \
              | jq -e '.assets[] | select(.name == "release.tar.gz")' >/dev/null; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "tag=$tag"     >> "$GITHUB_OUTPUT"
            echo "release-probe: HIT - $tag"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "release-probe: MISS"
          fi

      # Validate deploy.json against the schema + check built bundle dirs
      # match declarations. Stripped by 996ffa2 ("inline ci-core - zero
      # composite deps"); restored as REPORT-ONLY (continue-on-error) - it
      # records the result but never blocks the build.
      - name: Validate release contract
        if: hashFiles('deploy.json') != '' && steps.probe.outputs.present != 'true'
        continue-on-error: true
        uses: sonarmd/workflows/actions/validate-release-contract@main

      - name: Bundle release
        if: hashFiles('deploy.json') != '' && steps.probe.outputs.present != 'true'
        uses: sonarmd/workflows/actions/bundle-release@main
        with:
          test_report_path: ${{ inputs.test_report_path }}

      - name: Sign release
        if: hashFiles('deploy.json') != '' && steps.probe.outputs.present != 'true' && env.HAS_SIGNING_KEY == 'true'
        uses: sonarmd/workflows/actions/sign-release@main
        with:
          artifact_path: release.tar.gz
          signing_key: ${{ secrets.CI_SIGNING_KEY }}

      # Stage the signed tarball for the CD job in the same workflow run.
      # Name is keyed by tree hash so CD's download-artifact picks the right
      # one. Skipped on cache hit -- CD pulls from the existing release.
      - name: Stage release artifact
        if: hashFiles('deploy.json') != '' && steps.probe.outputs.present != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.tree.outputs.hash }}
          path: |
            release.tar.gz
            release.tar.gz.sha512
            release.tar.gz.checksum
            release.tar.gz.sig
          if-no-files-found: error
          retention-days: 90

      - name: Cache hit - artifact reused from release
        if: steps.probe.outputs.present == 'true'
        shell: bash
        run: |
          echo "ci-core: release ${{ steps.probe.outputs.tag }} already has release.tar.gz for tree ${{ steps.tree.outputs.hash }} -- skipped rebuild."

      # -- Failure visibility -----------------------------------------------
      # CI failures were silent here, so the only Slack signal was cd-core's
      # advisory "Deploy failed" - which mislabels a build/test/lint break as a
      # deploy-server problem (no visibility into the real cause). Surface
      # WHAT failed, WHERE, and a deep link straight to the failed step's logs.
      - name: Resolve failure context
        id: failctx
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            let where = 'CI', stepName = 'unknown step', jobUrl = runUrl, excerpt = '';
            try {
              const { data } = await github.rest.actions.listJobsForWorkflowRun({
                owner, repo, run_id: context.runId, per_page: 100,
              });
              const failed = data.jobs.find((j) => j.conclusion === 'failure');
              if (failed) {
                where = failed.name;
                jobUrl = failed.html_url || runUrl;
                const step = (failed.steps || []).find((s) => s.conclusion === 'failure');
                if (step) stepName = step.name;
                // Spoon-feed: pull the failed job's log and surface the error
                // tail directly, so the reader sees WHAT broke without clicking.
                try {
                  const log = await github.rest.actions.downloadJobLogsForWorkflowJob({
                    owner, repo, job_id: failed.id,
                  });
                  // Guard: a job log can be many MB and contain anything. Keep
                  // ONLY the trailing bytes (where the error is), bounded, and
                  // tail-slice the buffer itself so we never materialize or
                  // split the whole blob. Cap the char count too.
                  const TAIL = 8000;
                  const d = log.data;
                  let raw = '';
                  if (typeof d === 'string') {
                    raw = d.slice(-TAIL);
                  } else if (d) {
                    const buf = Buffer.from(d);
                    raw = buf.subarray(Math.max(0, buf.length - TAIL)).toString('utf8');
                  }
                  const lines = raw
                    .split('\n')
                    .map((l) => l.replace(/^\S+\s/, '').trimEnd()) // strip leading timestamp
                    .filter((l) => l.trim().length > 0);
                  excerpt = lines.slice(-18).join('\n').slice(-1400);
                } catch (e) {
                  core.warning(`log fetch failed: ${e.message}`);
                }
              }
            } catch (e) {
              core.warning(`failure-context lookup failed: ${e.message}`);
            }
            const details =
              `CI broke in "${where}" at step "${stepName}" - build/lint/test failed, so NO ` +
              `artifact was produced and the deploy never started. Fix CI, not the deploy server.\n\n` +
              `Error tail:\n\`\`\`\n${excerpt || '(open the logs link)'}\n\`\`\`\n` +
              `Full logs: ${jobUrl}`;
            core.setOutput('details', details);

      - name: Notify Slack on CI failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        uses: sonarmd/workflows/actions/notify-slack@main
        with:
          webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
          status: failure
          app_name: ${{ vars.DEPLOY_IDENTIFIER || github.event.repository.name }}
          tag: ${{ github.ref_name }}
          details: ${{ steps.failctx.outputs.details }}
