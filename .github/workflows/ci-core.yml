name: CI

# ── Caller example ───────────────────────────────────────────────────────
#
#   jobs:
#     ci:
#       uses: sonarmd/workflows/.github/workflows/ci-core.yml@main
#       with:
#         setup: |
#           sudo apt-get update -qq && sudo apt-get install -y graphicsmagick
#         steps: |
#           yarn lint
#           yarn test:ci
#           yarn build
#       secrets: inherit

on:
  workflow_call:
    inputs:
      setup:
        description: 'Repo-specific setup shell (system deps, etc.)'
        required: false
        type: string
        default: ''
      steps:
        description: 'Repo-specific lint/test/build shell.'
        required: true
        type: string
      test_report_path:
        description: 'JUnit XML path.'
        required: false
        type: string
        default: 'junit.xml'
      timeout:
        description: 'Job timeout in minutes.'
        required: false
        type: number
        default: 15
      working_directory:
        required: false
        type: string
        default: '.'

permissions: {}

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout }}
    permissions:
      contents: read
      id-token: write
      attestations: write
      actions: read
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: hashFiles(format('{0}/yarn.lock', inputs.working_directory)) != ''
        uses: sonarmd/workflows/actions/setup-node@test/cicd-fix-chain

      - name: Setup
        if: inputs.setup != ''
        shell: bash
        run: ${{ inputs.setup }}

      - name: Steps
        shell: bash
        run: ${{ inputs.steps }}

      - name: Bundle release
        if: hashFiles('deploy.json') != ''
        uses: sonarmd/workflows/actions/bundle-release@main
        with:
          test_report_path: ${{ inputs.test_report_path }}
