name: CI

# ═══════════════════════════════════════════════════════════════════════════
# CI-CORE — sonarmd/workflows
# ═══════════════════════════════════════════════════════════════════════════
#
# Universal CI workflow. Every sonarmd project calls this.
#
# The repo provides:
#   - setup:  shell for environment prep (deps, system packages, etc.)
#   - steps:  shell for lint, test, build
#
# The platform owns everything else.
#
# ── Caller example ───────────────────────────────────────────────────────
#
#   jobs:
#     ci:
#       uses: sonarmd/workflows/.github/workflows/ci-core.yml@main
#       with:
#         setup: |
#           sudo apt-get update -qq && sudo apt-get install -y graphicsmagick
#           yarn install --frozen-lockfile
#         steps: |
#           yarn lint
#           yarn build
#           yarn test --ci --reporters=jest-junit
#       secrets: inherit
#
# ── Python project ───────────────────────────────────────────────────────
#
#   jobs:
#     ci:
#       uses: sonarmd/workflows/.github/workflows/ci-core.yml@main
#       with:
#         setup: |
#           pip install -r requirements.txt
#         steps: |
#           ruff check .
#           python -m build
#           pytest --junitxml=junit.xml -q
#       secrets: inherit

on:
  workflow_call:
    inputs:
      # ── Shell blocks ───────────────────────────────────────────
      setup:
        description: 'Repository-specific environment setup shell.'
        required: false
        type: string
        default: ''

      steps:
        description: 'Repository-specific validation/build/test shell. Required.'
        required: true
        type: string

      # ── Evidence ───────────────────────────────────────────────
      test_report_path:
        description: 'JUnit XML path produced by test command.'
        required: false
        type: string
        default: 'junit.xml'

      # ── Tuning ─────────────────────────────────────────────────
      timeout:
        description: 'Job timeout in minutes. Max 30, default 15.'
        required: false
        type: number
        default: 15

      working_directory:
        description: 'Working directory.'
        required: false
        type: string
        default: '.'

    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: false
      PLATFORM_TOKEN:
        description: 'GitHub token with read access to sonarmd/workflows (required for private repo). Use a GitHub App or PAT stored as an org secret.'
        required: false

permissions: {}

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout }}
    permissions:
      contents: read
      id-token: write
      attestations: write
      actions: read
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      # ═══════════════════════════════════════════════════════════
      # 1. CHECKOUT CALLING REPO
      # ═══════════════════════════════════════════════════════════
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # ═══════════════════════════════════════════════════════════
      # 2. CHECKOUT PLATFORM ACTIONS
      # Private composite actions can't be referenced by owner/repo@ref
      # from an external runner — they must be in the workspace.
      # ═══════════════════════════════════════════════════════════
      - name: Checkout platform actions
        id: platform-checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: sonarmd/workflows
          ref: main
          path: _platform
          token: ${{ secrets.PLATFORM_TOKEN || github.token }}
        continue-on-error: true

      - name: Assert platform checkout succeeded
        if: steps.platform-checkout.outcome != 'success'
        shell: bash
        run: |
          echo "::error::ci-core: failed to checkout sonarmd/workflows."
          echo "::error::  The GITHUB_TOKEN is repo-scoped and cannot access private org repos."
          echo "::error::  Fix: create an org secret PLATFORM_TOKEN (GitHub App token or PAT"
          echo "::error::  with 'contents: read' on sonarmd/workflows) and add to this repo."
          exit 1

      # ═══════════════════════════════════════════════════════════
      # 3. TIMEOUT HANDLER
      # ═══════════════════════════════════════════════════════════
      - name: Timeout handler
        uses: ./_platform/actions/timeout-handler
        with:
          timeout_minutes: ${{ inputs.timeout }}

      # ═══════════════════════════════════════════════════════════
      # 4. START MONITORING
      # ═══════════════════════════════════════════════════════════
      - name: Start monitoring
        id: monitoring
        uses: ./_platform/actions/start-monitoring
        with:
          repo_short: ${{ github.event.repository.name }}

      # ═══════════════════════════════════════════════════════════
      # 5. OPEN CI
      # ═══════════════════════════════════════════════════════════
      - name: Open CI
        id: open-ci
        uses: ./_platform/actions/open-ci

      # ═══════════════════════════════════════════════════════════
      # 6. SETUP NODE (if Node project)
      # ═══════════════════════════════════════════════════════════
      - name: Setup Node.js
        if: hashFiles(format('{0}/yarn.lock', inputs.working_directory)) != ''
        uses: ./_platform/actions/setup-node
        with:
          working-directory: ${{ inputs.working_directory }}

      # ═══════════════════════════════════════════════════════════
      # 7. RUN SHELL BLOCK — SETUP
      # ═══════════════════════════════════════════════════════════
      - name: Run setup
        if: inputs.setup != '' && steps.open-ci.outputs.should_skip != 'true'
        id: setup-block
        uses: ./_platform/actions/run-shell-block
        with:
          name: setup
          script: ${{ inputs.setup }}
          working_directory: ${{ inputs.working_directory }}

      # ═══════════════════════════════════════════════════════════
      # 8. RUN SHELL BLOCK — STEPS
      # ═══════════════════════════════════════════════════════════
      - name: Run steps
        if: steps.open-ci.outputs.should_skip != 'true'
        id: steps-block
        uses: ./_platform/actions/run-shell-block
        with:
          name: steps
          script: ${{ inputs.steps }}
          working_directory: ${{ inputs.working_directory }}

      # ═══════════════════════════════════════════════════════════
      # 9. VALIDATE RELEASE CONTRACT
      # ═══════════════════════════════════════════════════════════
      - name: Validate release contract
        if: steps.open-ci.outputs.should_skip != 'true'
        id: validate
        uses: ./_platform/actions/validate-release-contract

      # ═══════════════════════════════════════════════════════════
      # 10. BUNDLE PIPELINE
      # ═══════════════════════════════════════════════════════════
      - name: Bundle pipeline
        if: steps.open-ci.outputs.should_skip != 'true'
        id: bundles
        uses: ./_platform/actions/bundle-release
        with:
          test_report_path: ${{ inputs.test_report_path }}

      # ═══════════════════════════════════════════════════════════
      # 11. CLOSE CI
      # ═══════════════════════════════════════════════════════════
      - name: Close CI
        if: always()
        uses: ./_platform/actions/close-ci
        with:
          status: ${{ job.status }}
