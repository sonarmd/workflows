name: CD

# Reusable CD pipeline. Repos include this with one input.
#
# Per-repo cd.yml (that's the whole file):
#
#   jobs:
#     cd:
#       uses: sonarmd/workflows/.github/workflows/cd.yml@<sha>
#       with:
#         identifier: api
#       secrets: inherit
#
# Steps (sequential, fail loud):
#   1. autotag      — tag the merge commit: {prd|stg}-{identifier}-b{run}
#   2. grab artifact — download the artifact CI already built for this commit
#   3. release      — attach artifact to GitHub release
#   4. notify       — ping #ops: @r2-d2 deploy {env} {tag} {artifact_url}
#   5. next-branch  — cut release/b{n+1} from current staging (initial push skips CI)

on:
  workflow_call:
    inputs:
      identifier:
        description: 'Short repo identifier: api | fe | mobile | cdk'
        type: string
        required: true
      environment:
        description: 'Override env (stg/prd). Inferred from branch if empty.'
        type: string
        default: ''
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: true

permissions: {}

jobs:
  cd:
    name: cd
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:

      # ── Credentials ────────────────────────────────────────────────────────

      - name: Load secrets
        uses: 1password/load-secrets-action@v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID:            op://smd_agora_shared/4skvt7l46qfd42ndku2ermwyly/appid
          APP_PRIVATE_KEY:   op://smd_agora_shared/twqeia3cpwcinjptjrnft5m3y4/notesPlain
          SLACK_WEBHOOK_URL: op://smd_agora_shared/SLACK_WEBHOOK_URL/credential
        with:
          export-env: true

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ env.APP_ID }}
          private-key: ${{ env.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      # ── 1. Autotag ─────────────────────────────────────────────────────────

      - name: Resolve env and build tag
        id: tag
        run: |
          if [ -n "${{ inputs.environment }}" ]; then
            ENV="${{ inputs.environment }}"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            case "$BRANCH" in
              release/*) ENV="stg" ;;
              master|main) ENV="prd" ;;
              *)
                echo "::error::Cannot infer env from branch '$BRANCH'."
                exit 1
                ;;
            esac
          fi
          TAG="${ENV}-${{ inputs.identifier }}-b${{ github.run_number }}"
          echo "env=$ENV"   >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"   >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG:      ${{ steps.tag.outputs.tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      # ── 2. Grab CI artifact for this commit ────────────────────────────────
      # CI ran on the PR and uploaded release.tar.gz as a workflow artifact.
      # We find the run by commit SHA and download it.

      - name: Find CI artifact for this commit
        id: artifact
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SHA:      ${{ github.sha }}
        run: |
          echo "Looking for CI artifact on commit $SHA"

          # Find the most recent successful CI workflow run for this commit
          RUN_ID=$(gh api \
            "/repos/${{ github.repository }}/actions/runs?head_sha=$SHA&status=success&per_page=20" \
            --jq '[.workflow_runs[] | select(.name == "CI")] | first | .id // empty')

          if [ -z "$RUN_ID" ]; then
            echo "::error::No successful CI run found for commit $SHA. Did CI pass before merge?"
            exit 1
          fi

          echo "CI run: $RUN_ID"

          # Download the release artifact
          gh run download "$RUN_ID" \
            --repo "${{ github.repository }}" \
            --name release \
            --dir artifact/

          ls -lh artifact/

      # ── 3. Create GitHub release ───────────────────────────────────────────

      - name: Create GitHub release
        id: release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG:      ${{ steps.tag.outputs.tag }}
          ENV:      ${{ steps.tag.outputs.env }}
        run: |
          PRERELEASE=""
          [ "$ENV" != "prd" ] && PRERELEASE="--prerelease"

          gh release create "$TAG" artifact/release.tar.gz \
            --title "$TAG" \
            --generate-notes \
            $PRERELEASE

          URL="https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG"
          echo "artifact-url=$URL" >> "$GITHUB_OUTPUT"

      # ── 4. Notify Slack ────────────────────────────────────────────────────
      # @r2-d2 picks this up and triggers the Ansible deploy.
      # Format: @r2-d2 deploy {env} {tag} {artifact_url}

      - name: Notify Slack
        env:
          TAG:          ${{ steps.tag.outputs.tag }}
          ENV:          ${{ steps.tag.outputs.env }}
          ARTIFACT_URL: ${{ steps.release.outputs.artifact-url }}
          RUN_URL:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR:        ${{ github.actor }}
        run: |
          DEPLOY_MSG="@r2-d2 deploy $ENV $TAG $ARTIFACT_URL"

          PAYLOAD=$(jq -n \
            --arg text     "$DEPLOY_MSG" \
            --arg env      "$ENV" \
            --arg tag      "$TAG" \
            --arg actor    "$ACTOR" \
            --arg run_url  "$RUN_URL" \
            '{
              channel: "#ops",
              text: $text,
              attachments: [{
                color: "#36a64f",
                fields: [
                  {title: "Tag",    value: ("`" + $tag + "`"), short: false},
                  {title: "Env",    value: $env,   short: true},
                  {title: "Actor",  value: $actor, short: true}
                ],
                actions: [{type: "button", text: "View Run", url: $run_url}]
              }]
            }')

          curl -sf -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      # ── 5. Cut next release branch ─────────────────────────────────────────
      # Only runs on prd deploys. Creates release/b{n+1} from current master.
      # [skip ci] on the initial push so CI doesn't fire on an empty branch.

      - name: Cut next release branch
        if: steps.tag.outputs.env == 'prd'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          NEXT_B=${{ github.run_number }}
          BRANCH="release/b${NEXT_B}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git commit --allow-empty -m "chore: open release branch $BRANCH [skip ci]"
          git push origin "$BRANCH"
          echo "Created $BRANCH — CI suppressed on initial push via [skip ci]"

      # ── Failure notification ───────────────────────────────────────────────

      - name: Notify Slack on failure
        if: failure()
        env:
          ENV:     ${{ steps.tag.outputs.env }}
          TAG:     ${{ steps.tag.outputs.tag }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR:   ${{ github.actor }}
        run: |
          PAYLOAD=$(jq -n \
            --arg env     "$ENV" \
            --arg tag     "$TAG" \
            --arg actor   "$ACTOR" \
            --arg run_url "$RUN_URL" \
            '{
              channel: "#ops",
              text: (":x: CD failed — " + $tag),
              attachments: [{
                color: "#dc3545",
                fields: [
                  {title: "Tag",   value: ("`" + $tag + "`"), short: false},
                  {title: "Env",   value: $env,   short: true},
                  {title: "Who",   value: $actor, short: true},
                  {title: "What",  value: "CD pipeline failure", short: true},
                  {title: "When",  value: "'$(date -u +"%Y-%m-%d %H:%M UTC")'", short: true}
                ],
                actions: [{type: "button", text: "View Failure", url: $run_url}]
              }]
            }')

          curl -sf -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true
