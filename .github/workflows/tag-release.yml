name: Tag Release

on:
  workflow_call:
    inputs:
      repo-short:
        description: Short repo identifier (fe, api, mobile)
        type: string
        required: true
      environment:
        description: 'Environment prefix (dev, stg, prd). If empty, inferred from branch: release/* → stg, master/main → prd.'
        type: string
        default: ''
      working-directory:
        description: Directory containing package.json with version
        type: string
        default: '.'

    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        description: 1Password service account token
        required: true

    outputs:
      tag:
        description: The created tag name
        value: ${{ jobs.tag.outputs.tag }}
      version:
        description: The version from package.json
        value: ${{ jobs.tag.outputs.version }}

permissions: {}

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.create-tag.outputs.tag }}
      version: ${{ steps.create-tag.outputs.version }}
    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://smd_agora_shared/4skvt7l46qfd42ndku2ermwyly/appid
          APP_PRIVATE_KEY: op://smd_agora_shared/twqeia3cpwcinjptjrnft5m3y4/notesPlain
        with:
          export-env: true

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ env.APP_ID }}
          private-key: ${{ env.APP_PRIVATE_KEY }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Create release tag
        id: create-tag
        env:
          REPO_SHORT: ${{ inputs.repo-short }}
          ENV_INPUT: ${{ inputs.environment }}
          WORKING_DIR: ${{ inputs.working-directory }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [ -n "$ENV_INPUT" ]; then
            TAG_ENV="$ENV_INPUT"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            case "$BRANCH" in
              release/*) TAG_ENV="stg" ;;
              master|main) TAG_ENV="prd" ;;
              *) echo "::error::Cannot infer environment from branch '$BRANCH'. Pass environment input explicitly."; exit 1 ;;
            esac
          fi

          VERSION=$(node -p "require('./${WORKING_DIR}/package.json').version")
          TAG="${TAG_ENV}-${REPO_SHORT}-${VERSION}-b${RUN_NUMBER}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          echo "Creating tag: $TAG"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Auto-release $TAG"
          git push origin "$TAG"

          echo "### Tag Created" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag**: \`$TAG\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version**: \`$VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Build**: \`$RUN_NUMBER\`" >> "$GITHUB_STEP_SUMMARY"
