name: Tag Release

on:
  workflow_call:
    inputs:
      repo-short:
        description: Short repo identifier (fe, api, mobile)
        type: string
        required: true
      environment:
        description: 'Environment prefix (dev, stg, prd). If empty, inferred from branch.'
        type: string
        default: ''
      working-directory:
        description: Directory containing package.json with version
        type: string
        default: '.'
      build:
        description: 'Build command. If empty, release has source only.'
        type: string
        default: ''
      artifact-paths:
        description: 'Paths to tar into release asset'
        type: string
        default: 'dist/ node_modules/ package.json'
      pre-build:
        description: 'System deps before build'
        type: string
        default: ''
      node-version:
        description: Node version
        type: string
        default: '22'

    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        description: 1Password service account token
        required: true

    outputs:
      tag:
        value: ${{ jobs.tag.outputs.tag }}
      version:
        value: ${{ jobs.tag.outputs.version }}
      release-url:
        value: ${{ jobs.tag.outputs.release-url }}

permissions: {}

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      release-url: ${{ steps.release.outputs.url }}
    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://smd_agora_shared/4skvt7l46qfd42ndku2ermwyly/appid
          APP_PRIVATE_KEY: op://smd_agora_shared/twqeia3cpwcinjptjrnft5m3y4/notesPlain
        with:
          export-env: true

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ env.APP_ID }}
          private-key: ${{ env.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Resolve tag
        id: resolve
        run: |
          if [ -n "${{ inputs.environment }}" ]; then
            TAG_ENV="${{ inputs.environment }}"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            case "$BRANCH" in
              release/*) TAG_ENV="stg" ;;
              master|main) TAG_ENV="prd" ;;
              *) echo "::error::Cannot infer env from '$BRANCH'"; exit 1 ;;
            esac
          fi
          VERSION=$(node -p "require('./${{ inputs.working-directory }}/package.json').version")
          TAG="${TAG_ENV}-${{ inputs.repo-short }}-${VERSION}-b${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Pre-build
        if: inputs.pre-build != ''
        run: ${{ inputs.pre-build }}

      - uses: sonarmd/workflows/actions/setup-node@main
        if: inputs.build != ''
        with:
          node-version: ${{ inputs.node-version }}

      - name: Build
        if: inputs.build != ''
        run: ${{ inputs.build }}

      - name: Package
        if: inputs.build != ''
        run: tar czf release.tar.gz ${{ inputs.artifact-paths }}

      - name: Create tag + release
        id: release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Auto-release $TAG"
          git push origin "$TAG"
          if [ -f release.tar.gz ]; then
            gh release create "$TAG" release.tar.gz --title "$TAG" --generate-notes
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
          echo "url=https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" >> "$GITHUB_OUTPUT"
