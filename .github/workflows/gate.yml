name: Gate

# Required workflow — configured at org level via repository rulesets.
# Projects do NOT add this to their workflows. It runs automatically.
#
# Checks for a ci-attestation artifact uploaded by ci-sign.
# If the attestation exists and the commit SHA matches, the gate passes.
# If ci-sign was never called (or any step before it failed), no
# attestation exists, and this blocks the merge.
#
# Setup (org admin, one time):
#   Settings > Rulesets > New ruleset
#   - Target: All repositories (or specific repos)
#   - Branch: default branch
#   - Require workflows to pass > Add workflow
#   - Repository: sonarmd/workflows
#   - Workflow: .github/workflows/gate.yml
#   - Ref: main

on:
  merge_group:
  pull_request:

permissions: {}

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      actions: read
    steps:
      - name: Check for CI attestation
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_COMMIT: ${{ github.sha }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          echo ""
          echo "============================================="
          echo "  CI GATE"
          echo "  repo:   $REPO"
          echo "  commit: ${EXPECTED_COMMIT:0:12}"
          echo "============================================="
          echo ""

          # Find the CI workflow run for this commit.
          # The attestation artifact lives on the caller's workflow run,
          # not this gate run. Look for it across all runs at this SHA.
          ARTIFACT_URL=$(gh api \
            "repos/$REPO/actions/artifacts?name=ci-attestation&per_page=5" \
            --jq ".artifacts[]
                   | select(.workflow_run.head_sha == \"$EXPECTED_COMMIT\")
                   | .archive_download_url" \
            2>/dev/null | head -1)

          if [ -z "$ARTIFACT_URL" ]; then
            echo "  attestation: NOT FOUND"
            echo ""
            echo "============================================="
            echo "  FAILED"
            echo "============================================="
            echo ""
            echo "  No CI attestation found for commit ${EXPECTED_COMMIT:0:12}."
            echo ""
            echo "  Your CI workflow must call ci-sign as its last step:"
            echo ""
            echo "    - uses: sonarmd/workflows/actions/ci-sign@main"
            echo ""
            echo "  If ci-sign is already there, a step before it failed."
            echo "  Check your CI workflow run for errors."
            echo ""
            exit 1
          fi

          # Download and verify the attestation
          echo "  attestation: found, downloading..."
          gh api "$ARTIFACT_URL" > /tmp/attestation.zip 2>/dev/null
          cd /tmp && unzip -qo attestation.zip

          if [ ! -f attestation.json ]; then
            echo "  attestation: CORRUPT (no attestation.json in archive)"
            exit 1
          fi

          # Verify commit SHA
          GOT_COMMIT=$(python3 -c "import json; print(json.load(open('attestation.json'))['commit'])")
          GOT_REPO=$(python3 -c "import json; print(json.load(open('attestation.json'))['repository'])")
          SCHEMA=$(python3 -c "import json; print(json.load(open('attestation.json')).get('schema','unknown'))")

          if [ "$SCHEMA" != "sonarmd/ci-attestation/v1" ]; then
            echo "  attestation: INVALID SCHEMA ($SCHEMA)"
            echo "  Expected sonarmd/ci-attestation/v1"
            exit 1
          fi

          if [ "$GOT_COMMIT" != "$EXPECTED_COMMIT" ]; then
            echo "  attestation: COMMIT MISMATCH"
            echo "  expected: ${EXPECTED_COMMIT:0:12}"
            echo "  got:      ${GOT_COMMIT:0:12}"
            echo ""
            echo "  The attestation is from a different commit."
            echo "  Push your latest changes and let CI re-run."
            exit 1
          fi

          if [ "$GOT_REPO" != "$REPO" ]; then
            echo "  attestation: REPO MISMATCH"
            echo "  expected: $REPO"
            echo "  got:      $GOT_REPO"
            exit 1
          fi

          TIMESTAMP=$(python3 -c "import json; print(json.load(open('attestation.json'))['timestamp'])")
          ACTOR=$(python3 -c "import json; print(json.load(open('attestation.json')).get('actor','unknown'))")
          SBOM_DIGEST=$(python3 -c "import json; print(json.load(open('attestation.json')).get('sbom_digest',''))" 2>/dev/null)
          SBOM_COMPONENTS=$(python3 -c "import json; print(json.load(open('attestation.json')).get('sbom_components',0))" 2>/dev/null)
          BUILD_DIGEST=$(python3 -c "import json; print(json.load(open('attestation.json')).get('build_digest',''))" 2>/dev/null)
          BUILD_FILES=$(python3 -c "import json; print(json.load(open('attestation.json')).get('build_file_count',0))" 2>/dev/null)

          echo "  commit:  ${GOT_COMMIT:0:12} verified"
          echo "  repo:    $GOT_REPO verified"
          echo "  schema:  $SCHEMA"
          echo "  signed:  $TIMESTAMP"
          echo "  actor:   $ACTOR"

          # SBOM verification
          if [ -n "$SBOM_DIGEST" ]; then
            # Verify the BOM file exists and its digest matches
            if [ -f bom.json ]; then
              ACTUAL_BOM_DIGEST=$(sha256sum bom.json | cut -d' ' -f1)
              if [ "$ACTUAL_BOM_DIGEST" = "$SBOM_DIGEST" ]; then
                echo "  sbom:    $SBOM_COMPONENTS components, digest verified"
              else
                echo "  sbom:    DIGEST MISMATCH (attestation: ${SBOM_DIGEST:0:16}, actual: ${ACTUAL_BOM_DIGEST:0:16})"
                exit 1
              fi
            else
              echo "  sbom:    referenced in attestation but bom.json missing from artifact"
              exit 1
            fi
          else
            echo "  sbom:    not generated (no package manager detected)"
          fi

          # Build digest
          if [ -n "$BUILD_DIGEST" ]; then
            echo "  build:   $BUILD_FILES files, digest ${BUILD_DIGEST:0:16}..."
          else
            echo "  build:   no build artifact"
          fi

          echo ""
          echo "============================================="
          echo "  PASSED"
          echo "============================================="

          # Job summary — visible on the Actions dashboard
          if [ -n "$SBOM_DIGEST" ]; then
            SBOM_SUMMARY="$SBOM_COMPONENTS components — digest verified"
          else
            SBOM_SUMMARY="not generated"
          fi

          if [ -n "$BUILD_DIGEST" ]; then
            BUILD_SUMMARY="$BUILD_FILES files — \`${BUILD_DIGEST:0:24}...\`"
          else
            BUILD_SUMMARY="no build artifact"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<SUMMARY
          ### Gate: PASSED

          | Check | Result |
          |-------|--------|
          | Commit | \`${GOT_COMMIT:0:12}\` verified |
          | Repository | $GOT_REPO verified |
          | Schema | \`$SCHEMA\` |
          | SBOM | $SBOM_SUMMARY |
          | Build | $BUILD_SUMMARY |
          | Signed | $TIMESTAMP |
          | Actor | $ACTOR |
          SUMMARY
