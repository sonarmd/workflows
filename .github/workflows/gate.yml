name: Gate

# Runs in merge_group context. Verifies that CI evidence exists for the HEAD
# commit and that the job passed. This is the ONLY thing standing between a PR
# and the target branch. If this fails, the merge is blocked.
#
# This is a reusable workflow so repos can call it from their own merge_group trigger,
# but it can also be used directly via branch protection required checks.

on:
  workflow_call:
    inputs:
      require_sbom:
        description: 'Fail if SBOM was not generated'
        type: boolean
        required: false
        default: false
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: true

permissions: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      actions: read
    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@581a835fb51b8e7ec56b71cf2ffddd7e68bb25e0  # v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://smd_agora_shared/4skvt7l46qfd42ndku2ermwyly/appid
          APP_PRIVATE_KEY: op://smd_agora_shared/twqeia3cpwcinjptjrnft5m3y4/notesPlain
        with:
          export-env: true

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1
        with:
          app-id: ${{ env.APP_ID }}
          private-key: ${{ env.APP_PRIVATE_KEY }}

      - name: Find CI evidence
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail

          HEAD_SHA="${{ github.sha }}"
          echo "Verifying CI evidence for $HEAD_SHA"

          # Find artifact for this exact commit
          ARTIFACT_ID=$(gh api \
            "/repos/${{ github.repository }}/actions/artifacts" \
            --paginate \
            --jq ".artifacts[]
              | select(.name == \"ci-evidence\")
              | select(.workflow_run.head_sha == \"$HEAD_SHA\")
              | select(.expired == false)
              | .id" \
            | head -1)

          if [ -z "$ARTIFACT_ID" ]; then
            echo "::error::No CI evidence artifact found for $HEAD_SHA"
            echo "::error::CI must pass before merge is allowed."
            exit 1
          fi

          echo "Found ci-evidence artifact: $ARTIFACT_ID"
          echo "artifact_id=$ARTIFACT_ID" >> "$GITHUB_ENV"

      - name: Download and verify evidence
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REQUIRE_SBOM: ${{ inputs.require_sbom }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p /tmp/ci-evidence
          gh api \
            "/repos/${{ github.repository }}/actions/artifacts/${{ env.artifact_id }}/zip" \
            > /tmp/ci-evidence.zip
          cd /tmp/ci-evidence && unzip -o ../ci-evidence.zip

          # 1. Check job status
          if [ ! -f job_status.txt ]; then
            echo "::error::Evidence bundle is missing job_status.txt"
            exit 1
          fi

          JOB_STATUS=$(cat job_status.txt)
          if [ "$JOB_STATUS" != "success" ]; then
            echo "::error::CI job status was '$JOB_STATUS', not 'success'"
            exit 1
          fi
          echo "CI job status: $JOB_STATUS"

          # 2. Verify digest integrity
          if [ -f digest.sha256 ]; then
            cd /tmp/ci-evidence
            # Verify all files in the digest still match
            if sha256sum -c digest.sha256 --quiet 2>/dev/null; then
              echo "Evidence digest integrity: verified"
            else
              echo "::error::Evidence digest mismatch. Artifact may be tampered."
              exit 1
            fi
          else
            echo "::warning::No digest.sha256 found in evidence (older ci-sign version?)"
          fi

          # 3. Check SBOM (optional)
          if [ "$REQUIRE_SBOM" = "true" ]; then
            if [ -f sbom-missing.txt ] || [ ! -f sbom.json ]; then
              echo "::error::SBOM is required but was not generated"
              exit 1
            fi
          fi

          # 4. Check metadata matches
          if [ -f metadata.json ]; then
            EVIDENCE_SHA=$(python3 -c "import json; print(json.load(open('metadata.json'))['sha'])")
            if [ "$EVIDENCE_SHA" != "${{ github.sha }}" ]; then
              echo "::error::Evidence SHA ($EVIDENCE_SHA) does not match merge queue SHA (${{ github.sha }})"
              exit 1
            fi
            echo "Commit SHA match: confirmed"
          fi

          echo "### Gate: PASSED" >> "$GITHUB_STEP_SUMMARY"
          echo "Evidence artifact verified for \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
