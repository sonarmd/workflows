name: tests

# Self-test workflow for sonarmd/workflows. NOT a caller-style ci.yml.
# Authorized by the narrow exception in ~/.claude/directives/cicd.md:
# this file lints + tests the three reusable workflows and composite
# actions in THIS repo, and exists solely to validate the meta-tooling.
# It must not duplicate ci-core / cd-core / cicd-orchestrator responsibilities.

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: actionlint + yamllint + shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          filter: blob:none

      - name: actionlint (workflow files in this PR's scope)
        run: |
          set -euo pipefail
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.7
          # Scope to workflow files introduced/modified by the canary work.
          # Pre-existing workflows with known issues are out of scope for
          # this PR (separate cleanup PR).
          ./actionlint -color -shellcheck=shellcheck \
            .github/workflows/tests.yml \
            .github/workflows/cicd-orchestrator.yml

      - name: yamllint (canary composite actions + docs)
        run: |
          set -euo pipefail
          pip install --quiet yamllint==1.35.1
          # actionlint misclassifies action.yml files as workflows when passed
          # explicitly. yamllint catches syntax/structure issues; the sandbox
          # integration test below exercises the actual bash logic.
          yamllint -d "{extends: relaxed, rules: {line-length: disable, indentation: {indent-sequences: consistent}, document-start: disable}}" \
            actions/canary-verify/action.yml \
            actions/canary-anchor/action.yml \
            actions/canary-reconcile/action.yml \
            actions/canary-seed/action.yml \
            actions/canary-purge-orphans/action.yml \
            docs/caller-canary-ops.yml.template

  canary-integration:
    name: canary anchor → rewrite → verify (sandbox)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build sandbox repo + assert verify catches rewrite
        shell: bash
        env:
          ACTIONS_PATH: ${{ github.workspace }}/actions
        run: |
          set -euo pipefail

          SANDBOX="$RUNNER_TEMP/canary-sandbox"
          rm -rf "$SANDBOX"
          mkdir -p "$SANDBOX"
          cd "$SANDBOX"

          git init -q -b main
          git config user.email "test@example.com"
          git config user.name  "test"

          # Build a small linear history.
          for i in 1 2 3 4 5; do
            echo "commit-$i" > "file-$i.txt"
            git add "file-$i.txt"
            git commit -q -m "commit $i"
          done

          HEAD_SHA=$(git rev-parse HEAD)
          MID_SHA=$(git rev-parse HEAD~2)

          # Simulate canary-anchor: tag HEAD as anchor/main-<sha>-test.
          short="${HEAD_SHA:0:7}"
          tag="anchor/main-${short}-test"
          git tag "$tag" "$HEAD_SHA"

          echo "Anchored $tag → $HEAD_SHA"

          # Verify: assert anchor sha is ancestor of HEAD. Should pass.
          if ! git merge-base --is-ancestor "$HEAD_SHA" HEAD; then
            echo "::error::Initial verify failed unexpectedly"
            exit 1
          fi
          echo "✓ Pre-rewrite verify passed."

          # Simulate force-push that rewrites history: reset to MID_SHA and
          # rebuild forward with different commits. New HEAD does NOT contain
          # the original HEAD_SHA in its ancestry.
          git reset --hard "$MID_SHA"
          for i in 3a 4a 5a; do
            echo "rewritten-$i" > "file-rewritten-$i.txt"
            git add "file-rewritten-$i.txt"
            git commit -q -m "rewritten commit $i"
          done

          # Verify: anchor sha is no longer ancestor of HEAD. Should fail.
          if git merge-base --is-ancestor "$HEAD_SHA" HEAD 2>/dev/null; then
            echo "::error::Verify failed to detect rewrite — anchor still appears as ancestor"
            exit 1
          fi
          echo "✓ Post-rewrite verify correctly flagged orphan."
          echo "::notice::Canary integration test PASSED."
